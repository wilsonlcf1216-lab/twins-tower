  if (isPhoneLayout && !validPanel) currentMobileTopPanel = 'none';

  if (!isPhoneLayout) {
    [tabs, mobileSelectors, topLeftGroup, buildingContainer, deptPanel, exceptionalPanel, calendarWrap].forEach((el) => {
      if (el) el.style.display = '';
    });
    if (calendarPanel) calendarPanel.style.display = '';

  }

  if (tabs) tabs.style.setProperty('display', 'grid', 'important');
  if (mobileSelectors) mobileSelectors.style.setProperty('display', 'grid', 'important');
  if (topLeftGroup) {
    topLeftGroup.style.setProperty('display', 'none', 'important');
  }
  if (buildingContainer) {
    buildingContainer.style.setProperty('display', 'flex', 'important');
    buildingContainer.style.setProperty('position', 'relative', 'important');
    buildingContainer.style.setProperty('inset', 'auto', 'important');
    buildingContainer.style.setProperty('width', '100%', 'important');
    buildingContainer.style.setProperty('min-height', '72vh', 'important');
    buildingContainer.style.setProperty('height', 'auto', 'important');
    buildingContainer.style.setProperty('overflow', 'auto', 'important');
  }

  if (deptPanel) {
    const show = currentMobileTopPanel === 'dept';
    deptPanel.classList.toggle('hidden', !show);
    deptPanel.style.setProperty('display', show ? 'flex' : 'none', 'important');
  }
  if (exceptionalPanel) {
    const show = currentMobileTopPanel === 'exceptional';
    exceptionalPanel.classList.toggle('hidden', !show);
    exceptionalPanel.style.setProperty('display', show ? 'flex' : 'none', 'important');
  }
  if (calendarWrap) {

    calendarWrap.classList.toggle('hidden', !show);
    calendarWrap.classList.toggle('expanded', !!show);

function syncPhoneLayoutPanels() {
  const mainView = document.querySelector('.main-view');
  if (!mainView) return;
  const phoneLayout = mainView.classList.contains('phone-layout');
  if (phoneLayout) {
    dockWardConnectionPanel();
    dockCalendarPanel();
    const stack = document.querySelector('.top-search-floating');
    const searchBox = document.querySelector('.top-search-box');
    const mobileSelectors = document.getElementById('mobileBuildingSelectors');
    const tabs = document.getElementById('mobileTopTabs');
    const deptPanel = document.getElementById('topDeptPanel');
    const exceptionalPanel = document.getElementById('topExceptionalPanel');
    const wrap = document.getElementById('topCalendarPanel');
    const panel = document.getElementById('calendarPanel');
    const linked = document.querySelector('.top-linked-panel');
    if (stack) {
      ensurePanelPlaceholder('calendarMobileRestore', wrap);
      ensurePanelPlaceholder('linkedMobileRestore', linked);
      if (searchBox) stack.appendChild(searchBox);
      if (linked) stack.appendChild(linked);
      if (mobileSelectors) stack.appendChild(mobileSelectors);
      if (tabs) stack.appendChild(tabs);
      if (deptPanel) stack.appendChild(deptPanel);
      if (exceptionalPanel) stack.appendChild(exceptionalPanel);
      if (wrap) stack.appendChild(wrap);
    }
    syncMobileBuildingSelectorLabels();
    syncAllBuildingSelectorStates();
    stabilizePhoneLayoutVisibility();
    if (tabs) {
      tabs.querySelectorAll('.mobile-top-tab').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset && btn.dataset.panel === currentMobileTopPanel);
      });
    }
    if (linked) {
      const fixedHeight = getMobileConnectionPanelFixedHeight();
      linked.style.height = `${fixedHeight}px`;
      mainView.style.setProperty('--mobile-link-panel-h', `${fixedHeight}px`);
    }
    if (deptPanel) deptPanel.classList.toggle('hidden', currentMobileTopPanel !== 'dept');
    if (exceptionalPanel) exceptionalPanel.classList.toggle('hidden', currentMobileTopPanel !== 'exceptional');
    if (wrap) wrap.classList.toggle('hidden', currentMobileTopPanel !== 'calendar');
    isCalendarPanelVisible = currentMobileTopPanel === 'calendar';
    if (!isCalendarPanelVisible) {
      if (panel) panel.classList.add('hidden');
      if (wrap) wrap.classList.remove('expanded');
    } else {
      if (panel) panel.classList.remove('hidden');
      if (wrap) wrap.classList.add('expanded');
    }
    isDeptContentCollapsed = false;
    syncDeptPanelCollapsedState();
    if (exceptionalPanel) exceptionalPanel.classList.toggle('expanded', currentMobileTopPanel === 'exceptional');
    updateDeptListVisibility(currentDeptSide);
    populateDeptList(currentDeptSide);
    syncMobileDeptSummary();
    return;
  }
  restorePanelFromPlaceholder('calendarMobileRestore', document.getElementById('topCalendarPanel'));
  restorePanelFromPlaceholder('linkedMobileRestore', document.querySelector('.top-linked-panel'));
  currentMobileTopPanel = 'none';
  syncMobileBuildingSelectorLabels();
  syncAllBuildingSelectorStates();
  stabilizePhoneLayoutVisibility();
  const deptPanel = document.getElementById('topDeptPanel');
  const exceptionalPanel = document.getElementById('topExceptionalPanel');
  if (deptPanel) {
    deptPanel.classList.remove('hidden', 'mobile-subdept-mode');
  }
  if (exceptionalPanel) {
    exceptionalPanel.classList.remove('hidden');
    syncExceptionalPanelState();
  }
  enableWardConnectionDrag();
  if (isCalendarPanelVisible) {
    enableCalendarResize();
  }
}

function getPhoneDesktopSpaceWidth(space) {
  if (!space) return null;
  if (String(space.dataset.wing || '') === 'mcbtc2030') {
    const desktopPx = Math.max(0, parseInt(space.dataset.desktopPx || '0', 10));
    if (desktopPx > 0) return desktopPx;
  }
  const widthClassList = Array.from(space.classList || []);
  return getDesktopWidthForWidthClassList(widthClassList, {
    tower: String(space.dataset.tower || ''),
    building: String(space.dataset.building || ''),
    floor: String(space.dataset.floor || '')
  });
}

function getDesktopWidthForWidthClassList(widthClassList, context = {}) {
  const specialWidthMap = {
    'ward-a': 130,
    'ward-b': 130,
    'ward-c': 115,
    'shared-facilities-width': 75,
    'l06-private-ward': 260,
    'l06-ssu': 115,
    'l06-shared': 75,
    'l01-auditorium': 260,
    'l01-shroff': 115,
    'l01-pharmacy': 75,
    'l00-25': 25,
    'l00-30': 29,
    'l00-35': 33,
    'l00-36': 36,
    'l00-37': 37,
    'l00-38': 38,
    'l00-39': 39,
    'l00-39a': 39,
    'l00-40': 40,
    'l00-40a': 40,
    'l00-42': 42,
    'l00-43': 43,
    'l00-45': 45,
    'l00-50': 49,
    'b01-plant': 260,
    'b01-tunnel': 190
  };
  const upperWardMap = {
    'ward-a': 104,
    'ward-b': 120,
    'ward-c': 131,
    'shared-facilities-width': 65
  };
  const building = String(context.building || '');
  const floor = String(context.floor || '');
  const tower = String(context.tower || '');
  const isMcbtcUpperWard = tower === 'left'
    && building === '0'
    && ['7', '8', '9', '10', '11', '12'].includes(floor);
  for (let i = 0; i < widthClassList.length; i += 1) {
    const cls = widthClassList[i];
    if (isMcbtcUpperWard && Object.prototype.hasOwnProperty.call(upperWardMap, cls)) {
      return upperWardMap[cls];
    }
    if (Object.prototype.hasOwnProperty.call(specialWidthMap, cls)) {
      return specialWidthMap[cls];
    }
    const numericMatch = cls.match(/^(?:w|csb|dtb|sb)-(\d+)$/);
    if (numericMatch) {
      return Number(numericMatch[1]);
    }
  }
  return null;
}

function initWardConnectionFloating() {

  const mainRect = mainView.getBoundingClientRect();

  let top = panelRect.top - mainRect.top;

    localStorage.removeItem('wardConnectionPos');
  } catch (e) {}

  panel.classList.add('ward-floating');
  panel.style.left = `${Math.max(0, Math.round(left))}px`;

function clampWardConnectionToBounds() {
  const mainView = document.querySelector('.main-view');
  const panel = document.querySelector('.top-linked-panel.ward-floating');
  if (!mainView || !panel) return;
  const maxLeft = Math.max(0, mainView.clientWidth - panel.offsetWidth);
  const maxTop = Math.max(0, mainView.clientHeight - panel.offsetHeight);
  const currentLeft = parseFloat(panel.style.left || '0') || 0;
  const currentTop = parseFloat(panel.style.top || '0') || 0;
  const nextLeft = Math.max(0, Math.min(currentLeft, maxLeft));
  const nextTop = Math.max(0, Math.min(currentTop, maxTop));
  panel.style.left = `${Math.round(nextLeft)}px`;
  panel.style.top = `${Math.round(nextTop)}px`;
}

function autoSizeWardConnectionPanel() {
  const mainView = document.querySelector('.main-view');
  const linkedWardsList = document.getElementById('linkedWardsList');
  if (!mainView) return;
  if (mainView.classList.contains('phone-layout')) {
    const panel = document.querySelector('.top-linked-panel');
    const linkDisplay = panel ? panel.querySelector('.link-display') : null;
    if (!panel || !linkDisplay) return;
    const fixedHeight = getMobileConnectionPanelFixedHeight();
    panel.style.height = `${fixedHeight}px`;
    mainView.style.setProperty('--mobile-link-panel-h', `${fixedHeight}px`);
    linkDisplay.style.height = '100%';
    linkDisplay.style.overflowY = 'auto';
    return;
  }
  const panel = document.querySelector('.top-linked-panel.ward-floating');
  const linkDisplay = panel ? panel.querySelector('.link-display') : null;
  const title = linkDisplay ? linkDisplay.querySelector('h4') : null;
  if (!panel || !linkDisplay) return;
  const panelTop = parseFloat(panel.style.top || '0') || 0;
  const maxHeight = Math.max(72, mainView.clientHeight - panelTop - 6);
  const styles = window.getComputedStyle(linkDisplay);
  const padTop = parseFloat(styles.paddingTop || '0') || 0;
  const padBottom = parseFloat(styles.paddingBottom || '0') || 0;
  const titleStyles = title ? window.getComputedStyle(title) : null;
  const titleHeight = title ? title.offsetHeight : 0;
  const titleMarginBottom = titleStyles ? (parseFloat(titleStyles.marginBottom || '0') || 0) : 0;
  const listHeight = linkedWardsList ? linkedWardsList.scrollHeight : 0;
  const contentHeight = padTop + titleHeight + titleMarginBottom + listHeight + padBottom + 15;
  const desiredHeight = Math.max(72, Math.min(maxHeight, Math.ceil(contentHeight)));
  if (Math.abs(panel.offsetHeight - desiredHeight) > 1) {
    panel.style.height = `${desiredHeight}px`;
  }
  linkDisplay.style.overflowY = 'auto';
  clampWardConnectionToBounds();
}

function enableWardConnectionDrag() {
  if (isPhoneLayoutMode()) {
    dockWardConnectionPanel();
    return;
  }
  initWardConnectionFloating();
  const mainView = document.querySelector('.main-view');
  const panel = document.querySelector('.top-linked-panel.ward-floating');
  if (!mainView || !panel) return;
  if (!wardConnectionResizeObserver && typeof ResizeObserver !== 'undefined') {
    wardConnectionResizeObserver = new ResizeObserver(() => {
      clampWardConnectionToBounds();
    });
    wardConnectionResizeObserver.observe(panel);
  }
  enablePanelResize(panel, { minW: 240, minH: 72, clamp: clampWardConnectionToBounds });
  const handle = panel.querySelector('.link-display h4');
  if (!handle) return;
  if (panel.dataset.dragInit === '1') return;
  panel.dataset.dragInit = '1';

  let dragging = false;
  let startX = 0;
  let startY = 0;
  let startLeft = 0;
  let startTop = 0;

  const onMove = (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    const maxLeft = Math.max(0, mainView.clientWidth - panel.offsetWidth);
    const maxTop = Math.max(0, mainView.clientHeight - panel.offsetHeight);
    const nextLeft = Math.max(0, Math.min(startLeft + dx, maxLeft));
    const nextTop = Math.max(0, Math.min(startTop + dy, maxTop));
    panel.style.left = `${Math.round(nextLeft)}px`;
    panel.style.top = `${Math.round(nextTop)}px`;
  };

  const onEnd = () => {
    if (!dragging) return;
    dragging = false;
    panel.classList.remove('ward-dragging');
    clampWardConnectionToBounds();
  };

  handle.addEventListener('pointerdown', (e) => {
    if (isPhoneLayoutMode()) return;

    dragging = true;
    startX = e.clientX;
    startY = e.clientY;

  });

  handle.addEventListener('pointermove', onMove);
  handle.addEventListener('pointerup', onEnd);
  handle.addEventListener('pointercancel', onEnd);
  window.addEventListener('resize', () => clampWardConnectionToBounds());

function enablePanelResize(panel, opts) {
  if (!panel) return;
  if (panel.dataset.resizeInit === '1') return;
  panel.dataset.resizeInit = '1';
  const handle = document.createElement('div');
  handle.className = 'panel-resize-handle';
  panel.appendChild(handle);

  const minW = (opts && opts.minW) || 240;
  const minH = (opts && opts.minH) || 72;
  const clamp = (opts && opts.clamp) || (() => {});

  let resizing = false;
  let startX = 0;
  let startY = 0;
  let startW = 0;
  let startH = 0;

  const onMove = (e) => {
    if (!resizing) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    const nextW = Math.max(minW, startW + dx);
    const nextH = Math.max(minH, startH + dy);
    panel.style.width = `${Math.round(nextW)}px`;
    panel.style.height = `${Math.round(nextH)}px`;
    clamp();
  };

  const onEnd = () => {
    if (!resizing) return;
    resizing = false;
    clamp();
  };

  handle.addEventListener('pointerdown', (e) => {
    if (isPhoneLayoutMode()) return;
    if (e.button != null && e.button !== 0) return;
    resizing = true;
    startX = e.clientX;
    startY = e.clientY;
    startW = panel.offsetWidth;
    startH = panel.offsetHeight;
    try {
      handle.setPointerCapture(e.pointerId);
    } catch (err) {}
    e.preventDefault();
  });
  handle.addEventListener('pointermove', onMove);
  handle.addEventListener('pointerup', onEnd);
  handle.addEventListener('pointercancel', onEnd);
}

// 選擇病房
function selectWard(wardName) {
  const resultsEl = document.getElementById('deptSearchResults');
  if (resultsEl) {
    resultsEl.style.display = 'none';
    resultsEl.innerHTML = '';
  }
  deptSearchForceHidden = true;
  selectedSpaces.clear();
  currentLinkedGroup = null;
  currentExceptionalLinkGroup = null;
  currentClickedSpace = null;
  
  const foundSpaces = [];
  
  document.querySelectorAll('.space').forEach(space => {
    const spaceText = space.textContent;
    if (spaceText.includes(wardName) || wardName.includes(spaceText.split(' ')[0])) {
      const wing = space.dataset.wing || '';
      const tower = space.dataset.tower;
      const floor = space.dataset.floor;
      const index = parseInt(space.dataset.index, 10);
      const building = parseInt(space.dataset.building || currentLeftBuilding, 10);
      
      let key;
      if (tower === 'left') {
        key = `left-${building}-${floor}-${wing}-${index}`;
      } else {
        key = `right-${floor}-${wing}-${index}`;
      }
      selectedSpaces.add(key);
      
      foundSpaces.push({ tower, building, floor, index, wing });
    }
  });
  
  // 檢查連結
  const linkedGroups = [];
  
  foundSpaces.forEach(space => {
    linkedSpaces.forEach(link => {
       if (space.tower === 'left') {
         if (link.left.some(l => l.building === space.building && l.floor === space.floor && l.index === space.index)) {
           linkedGroups.push({ link, source: space });
         }
       } else {
         if (link.right.some(r => r.floor === space.floor && r.wing === space.wing && r.index === space.index)) {
           linkedGroups.push({ link, source: space });
         }
       }
    });
  });
  
  if (linkedGroups.length > 0) {
    currentLinkedGroup = { right: [], left: [] };
    
    linkedGroups.forEach(({ link, source }) => {
       // 添加右塔連結空間
       link.right.forEach(s => {
         const exists = currentLinkedGroup.right.some(ex => ex.floor === s.floor && ex.wing === s.wing && ex.index === s.index);
         if (!exists) currentLinkedGroup.right.push(s);
         
         const key = `right-${s.floor}-${s.wing}-${s.index}`;
         selectedSpaces.add(key);
       });
       
       // 添加左塔連結空間
       link.left.forEach(s => {
         // 應用單向連結邏輯
         if (source.tower === 'left') {
            // 如果是由左塔觸發，只添加當前空間（不添加同組其他左塔空間）
            if (s.building === source.building && s.floor === source.floor && s.index === source.index) {
               const exists = currentLinkedGroup.left.some(ex => ex.building === s.building && ex.floor === s.floor && ex.index === s.index);
               if (!exists) currentLinkedGroup.left.push(s);
            }
         } else {
            // 如果是由右塔觸發，添加所有連結的左塔空間
             const exists = currentLinkedGroup.left.some(ex => ex.building === s.building && ex.floor === s.floor && ex.index === s.index);
             if (!exists) currentLinkedGroup.left.push(s);
             
             const key = `left-${s.building}-${s.floor}--${s.index}`;
             selectedSpaces.add(key);
         }
       });
    });
  }
  
  document.querySelectorAll('.ward-btn').forEach(btn => {
    if (btn.textContent === wardName) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
  updateDisplay();
  updateLinkDisplay();
}

// 切換建築
function switchLeftBuilding(index, options = {}) {
  const preservePan = !!options.preservePan || shouldPreserveCurrentView();
  const defaultPan = getDefaultPanOffsets();
  const savedPanX = panX;
  const savedPanY = panY;
  const savedScrollLeft = buildingContainer ? (buildingContainer.scrollLeft || 0) : 0;
  const savedScrollTop = buildingContainer ? (buildingContainer.scrollTop || 0) : 0;
  if (!preservePan) {
    panX = defaultPan.x;
    panY = defaultPan.y;
    if (buildingContainer) {
      buildingContainer.scrollLeft = 0;
      buildingContainer.scrollTop = 0;
    }
  }
  currentLeftBuilding = index;

  if (index === 0 && currentRightBuilding === 1) {
    currentRightBuilding = 0;
  }
  syncAllBuildingSelectorStates();
  
  const buildingName = leftBuildingsData[index].name;
  document.getElementById('modeIndicator').textContent = '左塔：' + buildingName + ' | 右塔：' + (currentRightBuilding === 1 ? 'MCBTC (2030)' : 'IPEB');
  
  renderBuilding(null, currentLeftBuilding);
  if (preservePan) {
    panX = savedPanX;
    panY = savedPanY;
    if (buildingContainer) {
      buildingContainer.scrollLeft = savedScrollLeft;
      buildingContainer.scrollTop = savedScrollTop;
    }
    fitBuildingToViewport({ preserveView: true });
  } else {
    fitBuildingToViewport();
  }
  
  // 如果當前有連結組，重新選擇
  if (currentLinkedGroup) {
    selectedSpaces.clear();
    
    currentLinkedGroup.right.forEach(space => {
      const key = `right-${space.floor}-${space.wing}-${space.index}`;
      selectedSpaces.add(key);
    });
    
    currentLinkedGroup.left.forEach(space => {
      const key = `left-${space.building}-${space.floor}--${space.index}`;
      selectedSpaces.add(key);
    });
    
    updateDisplay();
  }
}

  syncAllBuildingSelectorStates();
}

                linkLeft: l,
                clicked: clickedSpace,
                comparisons: { b: [bStr, cBStr], f: [fStr, cFStr], i: [iStr, cIStr] }
            });
        }
        
        return bMatch && fMatch && iMatch;
      });
      if (match) {
        console.log('Found link match (Left->Right):', link);
        linkedGroups.push(link);
      }
    } else {
      if (link.right.some(r => 
        String(r.floor) === String(clickedSpace.floor) && 
        (r.wing || '') === clickedSpace.wing &&
        String(r.index) === String(clickedSpace.index)
      )) {
        console.log('Found link match (Right->Left):', link);
        linkedGroups.push(link);
      }
    }
  });
  
  if (linkedGroups.length > 0) {
    currentLinkedGroup = {
      right: [],
      left: []
    };
    
    linkedGroups.forEach(group => {
      group.right.forEach(space => {
        if (!currentLinkedGroup.right.some(s => 
          s.floor === space.floor && s.wing === space.wing && s.index === space.index
        )) {
          currentLinkedGroup.right.push(space);
        }
      });
    });
    currentLinkedGroup.right = sortRightSpacesByPreferredTarget(currentLinkedGroup.right);
    
    // 處理左塔空間（單向連結邏輯）
    if (tower === 'left') {
      // 如果點擊左塔，只顯示被點擊的左塔空間（不顯示同組的其他左塔兄弟空間）
      currentLinkedGroup.left.push({
        building: clickedSpace.buildingIndex,
        floor: clickedSpace.floor,
        index: clickedSpace.index
      });
    } else {
      // 如果點擊右塔，顯示所有連結的左塔空間
      linkedGroups.forEach(group => {
        group.left.forEach(space => {
          if (!currentLinkedGroup.left.some(s => 
            s.building === space.building && 
            s.floor === space.floor && 
            s.index === space.index
          )) {
            currentLinkedGroup.left.push(space);
          }
        });
      });
    }

    currentLinkedGroup.right.forEach(space => {
      const key = `right-${space.floor}-${space.wing}-${space.index}`;
      selectedSpaces.add(key);
    });
    
    currentLinkedGroup.left.forEach(space => {
      const key = `left-${space.building}-${space.floor}--${space.index}`;
      selectedSpaces.add(key);
    });

    // 自動導航：滾動到連結的空間
    if (tower === 'left' && currentLinkedGroup.right.length > 0) {
      const target = currentLinkedGroup.right[0];
      scrollToSpace('right', target.floor, target.index, null, target.wing, false);
    } else if (tower === 'right' && currentLinkedGroup.left.length > 0) {
      const currentBuildingSpace = currentLinkedGroup.left.find(s => s.building === currentLeftBuilding);
      const target = currentBuildingSpace || currentLinkedGroup.left[0];
      scrollToSpace('left', target.floor, target.index, target.building, '', false);
    }
  }
  
  document.querySelectorAll('.timeline-period').forEach(period => {
    period.classList.remove('active');
  });
  selectedTimePeriod = null;
  
  const exceptionalCase = getExceptionalCaseMigration(clickedSpace);
  if (exceptionalCase) {
    showExceptionalCaseInfo(exceptionalCase);
  }
  updateDisplay();
  updateLinkDisplay();
}

// 選擇時間段
function selectTimePeriod(period) {
  selectedSpaces.clear();
  currentLinkedGroup = null;
  currentExceptionalLinkGroup = null;
  currentClickedSpace = null;
  
  document.querySelectorAll('.timeline-period').forEach(p => {
    if (p.dataset.period === period) {
      p.classList.add('active');
    } else {
      p.classList.remove('active');
    }
  });
  
  if (selectedTimePeriod === period) {
    selectedTimePeriod = null;
    document.querySelectorAll('.timeline-period').forEach(p => {
      p.classList.remove('active');
    });
  } else {
    selectedTimePeriod = period;
    
    const timelineLink = timelineLinks[period];
    if (timelineLink) {
      timelineLink.left.forEach(space => {
        const key = `left-${space.building}-${space.floor}--${space.index}`;
        selectedSpaces.add(key);
      });
      
      timelineLink.right.forEach(space => {
        const key = `right-${space.floor}-${space.wing}-${space.index}`;
        selectedSpaces.add(key);
      });
    }
  }
  
  updateDisplay();
  updateLinkDisplay();
}

// 獲取空間信息
function getSpaceInfo(tower, floor, index, buildingIndex = null, wing = '') {
  if (tower === 'left') {
    const buildingIdx = buildingIndex !== null ? buildingIndex : currentLeftBuilding;
    const floors = leftBuildingsData[buildingIdx].floors;
    
    // 特殊處理 CSB 3/F
    if (floor == 3 && buildingIdx == 1) {
      const csb3FData = floors[3];
      if (csb3FData.upper && csb3FData.lower) {
        const upperCount = csb3FData.upper.length;
        if (index < upperCount) {
          const space = csb3FData.upper[index];
          return {
            name: typeof space === 'object' ? space.name : space,
            floor: floor
          };
        } else {
          const space = csb3FData.lower[index - upperCount];
          return {
            name: typeof space === 'object' ? space.name : space,
            floor: floor
          };
        }
      }
    }
    
    if (floors[floor] && floors[floor][index]) {
      const space = floors[floor][index];
      return {
        name: typeof space === 'object' ? space.name : space,
        floor: floor
      };
    }
  } else {
    if (wing === 'mcbtc2030') {
      const floorData = mcbtc2030Floors[String(floor)] || mcbtc2030Floors[floor];
      if (!floorData || !floorData[index]) return null;
      const space = floorData[index];
      return {
        name: typeof space === 'object' ? space.name : space,
        floor: floor
      };
    }
    const floorData = rightTowerData[floor];
    if (!floorData) return null;
    
    if (wing && floorData[wing] && floorData[wing][index]) {
      const space = floorData[wing][index];
      return {
        name: typeof space === 'object' ? space.name : space,
        floor: floor
      };
    }
  }
  return null;
}

              });

            switchLeftBuilding(item.buildingIndex);
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                scrollToSpace(item.tower, item.floor, item.index, item.buildingIndex, item.wing);

      location.textContent = metaText || `${item.floor}F`;
      const name = document.createElement('div');
      name.className = 'ward-name';
      name.textContent = item.displayName || item.name;
      wardInfo.appendChild(location);
      wardInfo.appendChild(name);
      wardItem.appendChild(wardInfo);
      col.appendChild(wardItem);
    };

    const appendBuildingSection = (col, buildingName, spaces, metaBuilder) => {
      const buildingHeader = document.createElement('div');
      buildingHeader.className = 'building-tag';
      buildingHeader.innerHTML = `<span class="building-tag-icon">🏢</span> ${buildingName}`;
      col.appendChild(buildingHeader);
      spaces.forEach((item) => {
        if (item.suppressDisplay) return;
        appendNavItem(col, item, metaBuilder(item), true);
      });
    };

    const sourceByBuilding = {};
    (currentExceptionalLinkGroup.sourceItems || []).forEach((item) => {
      if (!sourceByBuilding[item.building]) sourceByBuilding[item.building] = [];
      sourceByBuilding[item.building].push(item);
    });
    Object.keys(sourceByBuilding).forEach((buildingName) => {
      appendBuildingSection(sourceCol, buildingName, sourceByBuilding[buildingName], (item) => {
        const wingText = formatRightWingLabel(item.wing);
        if (item.metaOverride) return item.metaOverride;
        return wingText ? `${item.floor}F · ${wingText}` : `${item.floor}F`;
      });
    });
    (currentExceptionalLinkGroup.sourceNotes || []).forEach((noteText) => {
      const noteDisplay = formatExceptionalNoteDisplay(currentExceptionalLinkGroup, { year: currentExceptionalLinkGroup.activeYear }, noteText);
      if (noteDisplay.building) {
        const noteBuildingHeader = document.createElement('div');
        noteBuildingHeader.className = 'building-tag';
        noteBuildingHeader.innerHTML = `<span class="building-tag-icon">🏢</span> ${noteDisplay.building}`;
        sourceCol.appendChild(noteBuildingHeader);
      }
      const noteItem = {
        name: noteDisplay.name,
        floor: '',
        wing: ''
      };
      appendNavItem(sourceCol, noteItem, noteDisplay.meta, false);
    });
    linkedWardsList.appendChild(sourceCol);

    (currentExceptionalLinkGroup.moveGroups || []).forEach((move, idx) => {
      const col = document.createElement('div');
      col.className = 'linked-building-column linked-right-col';
      if (idx === 0) col.classList.add('linked-side-divider');
      const moveHeader = document.createElement('div');
      moveHeader.className = 'building-tag linked-column-header move-tag';
      moveHeader.innerHTML = `<span class="building-tag-icon">↗</span> ${(move.year || '').trim()}`.trim();
      col.appendChild(moveHeader);
      const byBuilding = {};
      (move.items || []).forEach((item) => {
        if (!byBuilding[item.building]) byBuilding[item.building] = [];
        byBuilding[item.building].push(item);
      });
      Object.keys(byBuilding).forEach((buildingName) => {
        appendBuildingSection(col, buildingName, byBuilding[buildingName], (item) => {
          const wingText = formatRightWingLabel(item.wing);
          if (item.metaOverride) return item.metaOverride;
          return wingText ? `${item.floor}F · ${wingText}` : `${item.floor}F`;
        });
      });
      (move.notes || []).forEach((noteText) => {
        const noteDisplay = formatExceptionalNoteDisplay(currentExceptionalLinkGroup, move, noteText);
        if (noteDisplay.building) {
          const noteBuildingHeader = document.createElement('div');
          noteBuildingHeader.className = 'building-tag';
          noteBuildingHeader.innerHTML = `<span class="building-tag-icon">🏢</span> ${noteDisplay.building}`;
          col.appendChild(noteBuildingHeader);
        }
        const noteItem = {
          name: noteDisplay.name,
          floor: '',
          wing: ''
        };
        appendNavItem(col, noteItem, noteDisplay.meta, false);
      });
      linkedWardsList.appendChild(col);
    });
    applyWardFilter();
    autoSizeWardConnectionPanel();
    return;
  }
  
  let linkedList = [];
  
  if (currentLinkedGroup) {
    currentLinkedGroup.left.forEach(leftSpace => {
      const spaceInfo = getSpaceInfo('left', leftSpace.floor, leftSpace.index, leftSpace.building);
      if (spaceInfo) {
        linkedList.push({
          tower: 'left',
          floor: leftSpace.floor,
          index: leftSpace.index,
          buildingIndex: leftSpace.building,
          wing: '',
          name: spaceInfo.name,
          building: leftBuildingsData[leftSpace.building].name
        });
      }
    });
    
    currentLinkedGroup.right.forEach(rightSpace => {
      const spaceInfo = getSpaceInfo('right', rightSpace.floor, rightSpace.index, null, rightSpace.wing);
      if (spaceInfo) {
        const rightBuildingName = rightSpace.wing === 'mcbtc2030' ? 'MCBTC2030' : 'IPEB';
        linkedList.push({
          tower: 'right',
          floor: rightSpace.floor,
          index: rightSpace.index,
          buildingIndex: null,
          wing: rightSpace.wing,
          name: spaceInfo.name,
          building: rightBuildingName
        });
      }
    });
  }
  
  if (linkedList.length === 0) {
    linkDisplay.classList.add('empty');
    if (linkCount) linkCount.textContent = '0';
    if (linkedWardsList) linkedWardsList.innerHTML = '';
    return;
  }
  
  linkDisplay.classList.remove('empty');
  linkCount.textContent = linkedList.length;
  
  linkedWardsList.innerHTML = '';
  
  const appendBuildingSection = (col, buildingName, spaces) => {
    const buildingHeader = document.createElement('div');
    buildingHeader.className = 'building-tag';
    buildingHeader.innerHTML = `<span class="building-tag-icon">🏢</span> ${buildingName}`;
    col.appendChild(buildingHeader);
    spaces.forEach(item => {
      const wardItem = document.createElement('div');
      wardItem.className = 'linked-ward-item';
      wardItem.onclick = () => {
        const desiredRight = item.tower === 'right' ? (item.wing === 'mcbtc2030' ? 1 : 0) : currentRightBuilding;
        if (item.tower === 'right' && currentRightBuilding !== desiredRight) {
          switchRightBuilding(desiredRight);
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              toggleSpace(item.tower, item.floor, item.index, item.buildingIndex, item.wing);
              scrollToSpace(item.tower, item.floor, item.index, item.buildingIndex, item.wing);
            });
          });
          return;
        }
        toggleSpace(item.tower, item.floor, item.index, item.buildingIndex, item.wing);
        scrollToSpace(item.tower, item.floor, item.index, item.buildingIndex, item.wing);
      };
      const wardInfo = document.createElement('div');
      wardInfo.className = 'ward-info';
      const location = document.createElement('div');
      location.className = 'ward-location';
      const wingText = formatRightWingLabel(item.wing);
      location.textContent = wingText ? `${item.floor}F · ${wingText}` : `${item.floor}F`;
      const name = document.createElement('div');
      name.className = 'ward-name';
      name.textContent = item.name;
      wardInfo.appendChild(location);
      wardInfo.appendChild(name);
      wardItem.appendChild(wardInfo);
      col.appendChild(wardItem);
    });
  };

  const leftByBuilding = {};
  const rightByBuilding = {};
  linkedList.forEach(item => {
    const buildingName = item.building;
    if (item.tower === 'right' || buildingName === 'IPEB' || buildingName === 'MCBTC2030') {
      if (!rightByBuilding[buildingName]) rightByBuilding[buildingName] = [];
      rightByBuilding[buildingName].push(item);
      return;
    }
    if (!leftByBuilding[buildingName]) leftByBuilding[buildingName] = [];
    leftByBuilding[buildingName].push(item);
  });

  const leftOrder = (leftBuildingsData || []).map(b => (b && b.name) ? b.name : '').filter(Boolean);
  Object.keys(leftByBuilding).forEach(name => {
    if (!leftOrder.includes(name)) leftOrder.push(name);
  });
  const leftBuildingNames = leftOrder.filter(name => Array.isArray(leftByBuilding[name]) && leftByBuilding[name].length > 0);
  const preferredRightBuilding = getPreferredRightWing() === 'mcbtc2030' ? 'MCBTC2030' : 'IPEB';
  const rightOrder = preferredRightBuilding === 'MCBTC2030' ? ['MCBTC2030', 'IPEB'] : ['IPEB', 'MCBTC2030'];
  const rightBuildingNames = rightOrder.filter(name => Array.isArray(rightByBuilding[name]) && rightByBuilding[name].length > 0);
  const rightSpaces = rightBuildingNames.flatMap(name => rightByBuilding[name] || []);
  const hasRight = rightSpaces.length > 0;

  const leftColsCount = Math.min(2, leftBuildingNames.length);
  const totalCols = leftColsCount + (hasRight ? 1 : 0);
  if (totalCols > 0) {
    linkedWardsList.style.gridTemplateColumns = Array.from({ length: totalCols }).map(() => 'minmax(0, 1fr)').join(' ');
  }

  const leftCols = [];
  for (let i = 0; i < leftColsCount; i += 1) {
    const col = document.createElement('div');
    col.className = 'linked-building-column linked-left-col';
    leftCols.push(col);
    linkedWardsList.appendChild(col);
  }

  if (leftColsCount === 1) {
    leftBuildingNames.forEach(name => appendBuildingSection(leftCols[0], name, leftByBuilding[name]));
  } else if (leftColsCount === 2) {
    appendBuildingSection(leftCols[0], leftBuildingNames[0], leftByBuilding[leftBuildingNames[0]]);
    appendBuildingSection(leftCols[1], leftBuildingNames[1], leftByBuilding[leftBuildingNames[1]]);
    for (let i = 2; i < leftBuildingNames.length; i += 1) {
      const name = leftBuildingNames[i];
      appendBuildingSection(leftCols[1], name, leftByBuilding[name]);
    }
  }

  if (hasRight) {
    const rightCol = document.createElement('div');
    rightCol.className = 'linked-building-column linked-right-col';
    if (leftColsCount > 0) rightCol.classList.add('linked-side-divider');
    rightBuildingNames.forEach(name => appendBuildingSection(rightCol, name, rightByBuilding[name]));
    linkedWardsList.appendChild(rightCol);
  }
  applyWardFilter();
  autoSizeWardConnectionPanel();
}

// 滾動到指定空間
function scrollToSpace(tower, floor, index, buildingIndex = null, wing = '', flash = true, preserveView = shouldPreserveCurrentView()) {
  if (flash) {
    document.querySelectorAll('.space').forEach(el => {
      el.classList.remove('highlight');
      el.classList.remove('flash-red');
    });
  }
  
  if (tower === 'right') {
    const desiredRight = wing === 'mcbtc2030' ? 1 : 0;
    if (currentRightBuilding !== desiredRight) {
      switchRightBuilding(desiredRight, { preservePan: preserveView });
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          highlightSpace(tower, floor, index, buildingIndex, wing, flash, preserveView);
        });
      });
      return;
    }
  }

  if (tower === 'left' && buildingIndex !== null && buildingIndex !== currentLeftBuilding) {
    switchLeftBuilding(buildingIndex, { preservePan: preserveView });
    setTimeout(() => {
      highlightSpace(tower, floor, index, buildingIndex, wing, flash, preserveView);
    }, 300);
  } else {
    highlightSpace(tower, floor, index, buildingIndex, wing, flash, preserveView);
  }
}

// 高亮空間
function highlightSpace(tower, floor, index, buildingIndex, wing = '', flash = true, preserveView = false) {
  let selector;
  if (tower === 'left') {
    selector = `[data-tower="${tower}"][data-floor="${floor}"][data-index="${index}"][data-building="${buildingIndex || currentLeftBuilding}"]`;
  } else {
    selector = `[data-tower="${tower}"][data-floor="${floor}"][data-wing="${wing}"][data-index="${index}"]`;
  }
  
  const targetSpace = document.querySelector(selector);
  
  if (targetSpace) {
    if (!preserveView) {
      targetSpace.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
    }
    if (flash) {
      setTimeout(() => {
        targetSpace.classList.remove('flash-red');
        void targetSpace.offsetWidth;
        targetSpace.classList.add('flash-red');
        setTimeout(() => {
          targetSpace.classList.remove('flash-red');
        }, 2000);
      }, 120);
    }
  }
}

// 滑鼠拖拽功能
function startDrag(e) {
  if (e.button !== 0) return;
  isDragging = true;
  dragMoved = false;
  startX = e.pageX;
  startY = e.pageY;
  panStartX = panX;
  panStartY = panY;
  buildingContainer.style.cursor = 'grabbing';
}

function drag(e) {
  if (!isDragging) return;
  
  const x = e.pageX;
  const y = e.pageY;
  const dx = x - startX;
  const dy = y - startY;
  if (!dragMoved && (Math.abs(dx) + Math.abs(dy)) < 4) return;
  dragMoved = true;
  e.preventDefault();
  
  panX = panStartX + dx;
  panY = panStartY + dy;
  applyPanScale();
}

function endDrag() {
  if (dragMoved) suppressSpaceClickOnce = true;
  isDragging = false;
  buildingContainer.style.cursor = 'grab';
  forceCrispText();
}

// 觸摸設備處理
let initialDist = 0;
let initialScaleRef = 1;
let pinchAnchorContentX = 0;
let pinchAnchorContentY = 0;

function getTouchDistance(touches) {
  if (!touches || touches.length < 2) return 0;
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.hypot(dx, dy);
}

function getTouchMidpoint(touches) {
  if (!touches || touches.length < 2) return null;
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2,
    y: (touches[0].clientY + touches[1].clientY) / 2
  };
}

function syncScaleControls() {
  const slider = document.getElementById('scaleSlider');
  const valueEl = document.getElementById('scaleValue');
  const activeScaleMax = getActiveScaleMax();
  if (userScale > activeScaleMax) {
    userScale = activeScaleMax;
  }
  if (slider) {
    slider.max = String(activeScaleMax);
    slider.value = String(userScale);
  }
  if (valueEl) valueEl.textContent = userScale.toFixed(2) + '×';
}

function getActiveScaleMax() {
  return isPhoneLayoutMode() ? Math.max(scaleMax, phoneScaleMax) : scaleMax;
}

function clampUserScale(nextUserScale) {
  return Math.min(Math.max(nextUserScale, minUserScale), getActiveScaleMax());
}

function getEffectiveScaleForUserScale(nextUserScale) {
  const container = document.getElementById('buildingContainer');
  const building = document.getElementById('building');
  if (!container || !building) return effectiveScale || 1;
  ensureBaselineMeasured();
  const contentW = building.scrollWidth || 0;
  const contentH = building.scrollHeight || 0;
  const refW = baselineContentW || contentW || 1;
  const refH = baselineContentH || contentH || 1;
  const availW = Math.max(1, container.clientWidth - 8);
  const availH = Math.max(1, container.clientHeight - 8);
  const autoScale = Math.min(availW / refW, availH / refH);
  return Math.min(autoScale * nextUserScale, getActiveScaleMax());
}

function isZoomInteractionActive() {
  return isPinching || (performance.now() - lastZoomTs < 220);
}

function zoomToClientPoint(nextUserScale, clientX, clientY) {
  const container = document.getElementById('buildingContainer');
  const building = document.getElementById('building');
  if (!container || !building) return;
  const rect = container.getBoundingClientRect();
  const fallbackClientX = rect.left + (container.clientWidth / 2);
  const fallbackClientY = rect.top + (container.clientHeight / 2);
  const anchorClientX = Number.isFinite(clientX) ? clientX : fallbackClientX;
  const anchorClientY = Number.isFinite(clientY) ? clientY : fallbackClientY;
  const prevScale = effectiveScale || getEffectiveScaleForUserScale(userScale) || 1;
  if (!(prevScale > 0)) return;
  const anchorContentX = (anchorClientX - rect.left + (container.scrollLeft || 0) - panX) / prevScale;
  const anchorContentY = (anchorClientY - rect.top + (container.scrollTop || 0) - panY) / prevScale;
  const clamped = clampUserScale(nextUserScale);
  const nextEffectiveScale = getEffectiveScaleForUserScale(clamped);
  userScale = clamped;
  effectiveScale = nextEffectiveScale;
  panX = (anchorClientX - rect.left + (container.scrollLeft || 0)) - (anchorContentX * nextEffectiveScale);
  panY = (anchorClientY - rect.top + (container.scrollTop || 0)) - (anchorContentY * nextEffectiveScale);
  syncScaleControls();
  applyPanScale();
  lastZoomTs = performance.now();
}

function handleTouchStart(e) {
  if (e.touches.length === 1) {
    isDragging = true;
    isPinching = false;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    panStartX = panX;
    panStartY = panY;
    buildingContainer.style.cursor = 'grabbing';
    // e.preventDefault(); // Allow click/scroll if not handled? But standard is prevent for drag.
  } else if (e.touches.length === 2) {
    isDragging = false;
    isPinching = true;
    initialDist = getTouchDistance(e.touches);
    initialScaleRef = userScale;
    const midpoint = getTouchMidpoint(e.touches);
    const rect = buildingContainer.getBoundingClientRect();
    const scale = effectiveScale || getEffectiveScaleForUserScale(userScale) || 1;
    if (midpoint && scale > 0) {
      pinchAnchorContentX = (midpoint.x - rect.left + (buildingContainer.scrollLeft || 0) - panX) / scale;
      pinchAnchorContentY = (midpoint.y - rect.top + (buildingContainer.scrollTop || 0) - panY) / scale;
    }
    e.preventDefault();
  }
}

function handleTouchMove(e) {
  if (e.touches.length === 1 && isDragging) {
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - startX;
    const dy = y - startY;
    panX = panStartX + dx;
    panY = panStartY + dy;
    applyPanScale();
    e.preventDefault();
  } else if (e.touches.length === 2) {
    const dist = getTouchDistance(e.touches);
    if (initialDist > 0) {
      e.preventDefault();
      const ratio = dist / initialDist;
      const nextUserScale = initialScaleRef * ratio;
      const clamped = clampUserScale(nextUserScale);
      const midpoint = getTouchMidpoint(e.touches);
      const rect = buildingContainer.getBoundingClientRect();
      const nextEffectiveScale = getEffectiveScaleForUserScale(clamped);
      userScale = clamped;
      effectiveScale = nextEffectiveScale;
      if (midpoint && nextEffectiveScale > 0) {
        panX = (midpoint.x - rect.left + (buildingContainer.scrollLeft || 0)) - (pinchAnchorContentX * nextEffectiveScale);
        panY = (midpoint.y - rect.top + (buildingContainer.scrollTop || 0)) - (pinchAnchorContentY * nextEffectiveScale);
      }
      syncScaleControls();
      applyPanScale();
      lastZoomTs = performance.now();
    }
  }
}

function handleTouchEnd(e) {
  if (e && e.touches && e.touches.length === 1) {
    isDragging = true;
    isPinching = false;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    panStartX = panX;
    panStartY = panY;
  } else {
    isDragging = false;
    isPinching = false;
  }
  initialDist = 0;
  buildingContainer.style.cursor = 'grab';
  forceCrispText();
}

function switchRightBuilding(index, options = {}) {
  const preservePan = !!options.preservePan || shouldPreserveCurrentView();
  if (index === 1 && currentLeftBuilding === 0) {
    switchLeftBuilding(2, { preservePan });
  }
  const savedPanX = panX;
  const savedPanY = panY;
  const savedScrollLeft = buildingContainer ? (buildingContainer.scrollLeft || 0) : 0;
  const savedScrollTop = buildingContainer ? (buildingContainer.scrollTop || 0) : 0;
  currentRightBuilding = index;
  syncAllBuildingSelectorStates();
  renderBuilding(null, currentLeftBuilding);
  if (preservePan) {
    panX = savedPanX;
    panY = savedPanY;
    if (buildingContainer) {
      buildingContainer.scrollLeft = savedScrollLeft;
      buildingContainer.scrollTop = savedScrollTop;
    }
    fitBuildingToViewport({ preserveView: true });
  } else {
    fitBuildingToViewport();
  }
}

function updateTopPanelSizing() {
  const mainView = document.querySelector('.main-view');
  if (!mainView) return;
  const vw = mainView.clientWidth;
  const baseGap = 2;
  const baseRowH = 124;
  const baseBuildingW = 200;
  const baseDeptW = 320;
  const baseCalendarW = 210;
  const baseTotal = baseBuildingW + baseDeptW + baseCalendarW + baseGap * 2;

  const desiredWard = Math.min(640, Math.max(360, Math.floor(vw * 0.62)));
  const wardW = Math.min(vw, desiredWard);
  const scale = Math.max(0.7, Math.min(1.15, wardW / baseTotal));
  const shrink = Math.min(1, effectiveScale || 1);
  const gap = Math.max(2, Math.round(baseGap * scale));

  let buildingW = Math.max(170, Math.round(baseBuildingW * scale));
  let deptW = Math.max(220, Math.round(baseDeptW * scale));
  const maxCalendarW = Math.max(160, wardW - buildingW - deptW - gap * 2);
  let calendarW = Math.max(160, Math.round(baseCalendarW * scale));
  calendarW = Math.min(calendarW, maxCalendarW);
  const rowH = Math.max(124, Math.min(160, Math.round(baseRowH * scale)));

  mainView.style.setProperty('--top-gap', `${gap}px`);
  mainView.style.setProperty('--top-row-h', `${rowH}px`);
  mainView.style.setProperty('--top-building-w', `${buildingW}px`);
  mainView.style.setProperty('--top-dept-w', `${deptW}px`);
  mainView.style.setProperty('--top-calendar-w', `${calendarW}px`);
  mainView.style.setProperty('--top-linked-w', `${wardW}px`);
  mainView.style.setProperty('--top-linked-h', `${rowH + 35}px`);
  mainView.style.setProperty('--ui-scale', String(shrink));
  autoSizeWardConnectionPanel();
  clampWardConnectionToBounds();
  clampCalendarToBounds();
}

function updateEmbeddedLayout() {

let mcbtcRefContentW = null;
let csbBaselineContentW = null;
let csbBaselineContentH = null;
let sizingMeasureRoot = null;
function getSizingMeasureRoot() {
  if (sizingMeasureRoot) return sizingMeasureRoot;
  const el = document.createElement('div');
  el.style.position = 'absolute';
  el.style.left = '-10000px';
  el.style.top = '-10000px';
  el.style.visibility = 'hidden';
  el.style.pointerEvents = 'none';
  document.body.appendChild(el);
  sizingMeasureRoot = el;
  return sizingMeasureRoot;
}

function measureWidthForSpaceWidthClass(widthClass) {
  const fixedWidth = getDesktopWidthForWidthClassList([String(widthClass || '')]);
  if (Number.isFinite(fixedWidth) && fixedWidth > 0) return fixedWidth;
  const root = getSizingMeasureRoot();
  const el = document.createElement('div');
  el.className = `space ${widthClass || ''}`.trim();
  root.appendChild(el);
  const w = Math.ceil(el.getBoundingClientRect().width || 0);
  root.removeChild(el);
  return w;
}

function forceCrispText() {
  const b = document.getElementById('building');
  if (!b) return;
  const prev = b.style.transformOrigin;
  b.style.transformOrigin = '0px 0px';
  void b.offsetWidth;
  b.style.transformOrigin = prev || 'top left';
}

function applyPanScale() {
  const building = document.getElementById('building');
  const scale = effectiveScale || 1;
  const dpr = window.devicePixelRatio || 1;
  const tx = Math.round(panX * dpr) / dpr;
  const ty = Math.round(panY * dpr) / dpr;
  if (building) building.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

function measureFloorNumberWidth() {
  return 25;
}

function getLeftTowerMaxRowWidth(buildingIndex) {
  const floors = (leftBuildingsData[buildingIndex] && leftBuildingsData[buildingIndex].floors) || {};
  let maxW = 0;
  Object.entries(floors).forEach(([floorKey, data]) => {
    const floorNum = parseInt(floorKey, 10);
    const isMcbtc712 = buildingIndex === 0 && !Number.isNaN(floorNum) && floorNum >= 7 && floorNum <= 12;
    if (floorKey === '3' && buildingIndex === 1 && data && data.upper && data.lower) {
      const upperW = (data.upper || []).reduce((sum, s) => sum + measureWidthForSpaceWidthClass(s && s.widthClass ? s.widthClass : 'normal'), 0);
      const lowerW = (data.lower || []).reduce((sum, s) => sum + measureWidthForSpaceWidthClass(s && s.widthClass ? s.widthClass : 'normal'), 0);
      maxW = Math.max(maxW, upperW, lowerW);
      return;
    }
    if (!Array.isArray(data)) return;
    if (data.length === 0) return;
    const rowW = data.reduce((sum, s) => {
      const widthClass = s && s.widthClass ? s.widthClass : 'normal';
      let w = measureWidthForSpaceWidthClass(widthClass);
      if (isMcbtc712 && (widthClass === 'ward-a' || widthClass === 'ward-b' || widthClass === 'ward-c' || widthClass === 'shared-facilities-width')) {
        if (widthClass === 'ward-a') w = 104;
        else if (widthClass === 'ward-b') w = 120;
        else if (widthClass === 'ward-c') w = 131;
        else if (widthClass === 'shared-facilities-width') w = 65;
      }
      return sum + w;
    }, 0);
    if (rowW > maxW) maxW = rowW;
  });
  return maxW;
}

function getRightTowerMaxRowWidth() {
  let maxW = 0;
  const dividerW = 1;
  Object.entries(rightTowerData || {}).forEach(([floorKey, floorData]) => {
    if (!floorData) return;
    const floorNum = parseInt(floorKey, 10);
    const hasNoDividers = !Number.isNaN(floorNum) && floorNum >= 8 && floorNum <= 19;

    const nwing = (floorData.nwing || []).filter(Boolean);
    const sewing = (floorData.sewing || []).filter(Boolean);
    const swwing = (floorData.swwing || []).filter(Boolean);

    let rowW = 0;
    nwing.forEach(s => { rowW += measureWidthForSpaceWidthClass(s && s.widthClass ? s.widthClass : 'normal'); });
    if (!hasNoDividers && rowW > 0 && sewing.length > 0) rowW += dividerW;
    sewing.forEach(s => { rowW += measureWidthForSpaceWidthClass(s && s.widthClass ? s.widthClass : 'normal'); });
    if (!hasNoDividers && rowW > 0 && swwing.length > 0) rowW += dividerW;
    swwing.forEach(s => { rowW += measureWidthForSpaceWidthClass(s && s.widthClass ? s.widthClass : 'normal'); });

    if (rowW > maxW) maxW = rowW;
  });
  return maxW;
}

function getMcbtc2030MaxRowWidth() {
  let maxW = 0;
  Object.entries(mcbtc2030Floors || {}).forEach(([floor, spaces]) => {
    if (!Array.isArray(spaces) || spaces.length === 0) return;
    let rowW = spaces.reduce((sum, s) => sum + Math.max(0, Math.round(Number((s && s.px) || 0))), 0);
    const floorNum = parseInt(String(floor), 10);
    if (!Number.isNaN(floorNum) && floorNum >= 7 && floorNum <= 12) {
      rowW += 20;
    }
    if (rowW > maxW) maxW = rowW;
  });
  return maxW;
}

function ensureMcbtcRefContentWidth() {
  if (mcbtcRefContentW) return mcbtcRefContentW;
  const leftW = getLeftTowerMaxRowWidth(1);
  const rightW = getRightTowerMaxRowWidth();
  const floorNumW = measureFloorNumberWidth();

}

function ensureCsbBaselineMeasured() {
  if (csbBaselineContentW && csbBaselineContentH) return true;

  root.removeChild(wrapper);
  return !!(csbBaselineContentW && csbBaselineContentH);
}

function ensureBaselineMeasured() {
  if (baselineContentW && baselineContentH) return true;
  const root = getSizingMeasureRoot();
  if (!root) return false;
  const wrapper = document.createElement('div');
  const buildingEl = document.createElement('div');
  buildingEl.className = 'building';
  wrapper.appendChild(buildingEl);
  root.appendChild(wrapper);
  const savedRight = currentRightBuilding;
  const combos = [
    { leftIdx: 2, rightIdx: 0 },
    { leftIdx: 2, rightIdx: 1 },
    { leftIdx: 3, rightIdx: 0 },
    { leftIdx: 3, rightIdx: 1 }
  ];
  let maxW = 0;
  let maxH = 0;
  combos.forEach(({ leftIdx, rightIdx }) => {
    currentRightBuilding = rightIdx;
    renderBuilding(buildingEl, leftIdx, { update: false, setModeIndicatorId: false });
    maxW = Math.max(maxW, buildingEl.scrollWidth || 0);
    maxH = Math.max(maxH, buildingEl.scrollHeight || 0);
  });
  currentRightBuilding = savedRight;
  baselineContentW = maxW || baselineContentW;
  baselineContentH = maxH || baselineContentH;
  root.removeChild(wrapper);
  return !!(baselineContentW && baselineContentH);
}

function fitBuildingToViewport(options = {}) {
  const container = document.getElementById('buildingContainer');
  const building = document.getElementById('building');
  if (!container || !building) return;
  const preserveView = !!options.preserveView;
  const phoneLayout = isPhoneLayoutMode();
  const zooming = isZoomInteractionActive();
  const availW = container.clientWidth - 8;
  const availH = container.clientHeight - 8;
  const contentW = building.scrollWidth;
  const contentH = building.scrollHeight;
  if (contentW === 0 || contentH === 0) return;
  ensureBaselineMeasured();
  const refW = baselineContentW || contentW;
  const refH = baselineContentH || contentH;

  const autoScaleW = availW / refW;
  const autoScaleH = availH / refH;
  const autoScale = Math.min(autoScaleW, autoScaleH);
  const activeScaleMax = getActiveScaleMax();
  if (userScale > activeScaleMax) {
    userScale = activeScaleMax;
  }
  const effective = Math.min(autoScale * userScale, activeScaleMax);
  effectiveScale = effective;
  updateTopPanelSizing();
  if (!preserveView && !isDragging && !zooming) {
    const defaultPan = getDefaultPanOffsets();
    panX = defaultPan.x;
    panY = defaultPan.y;
  }
  applyPanScale();
  forceCrispText();
  const scaledActualW = building.getBoundingClientRect().width;
  const fits = scaledActualW <= container.clientWidth + 0.5;
  container.style.justifyContent = (phoneLayout || fits) ? 'flex-start' : 'center';
  if (fits) {
    if (phoneLayout) {
      if (!preserveView && !zooming) {
        requestAnimationFrame(() => requestAnimationFrame(alignPhoneBuildingToExceptionalTab));
      }
    } else {
      if (!preserveView && !zooming) container.scrollLeft = 0;
      if (!preserveView && !isDragging && !zooming) {
        requestAnimationFrame(alignToReference);
      }
    }
    return;
  }
  if (phoneLayout) {
    if (!preserveView && !zooming) {
      requestAnimationFrame(() => requestAnimationFrame(alignPhoneBuildingToExceptionalTab));
    }
    return;
  }
  if (!preserveView && !isDragging && !zooming) {
    requestAnimationFrame(centerUsingBaseline);
      requestAnimationFrame(alignToReference);
  }
}

function alignToReference() {
  if (isPhoneLayoutMode()) return;
  const container = document.getElementById('buildingContainer');
  const building = document.getElementById('building');
  const topBelowRow = document.querySelector('.top-below-row');
  if (!container || !building || !topBelowRow) return;
  const preferredFloors = ['16', '15', '14', '13', '12', '11', '10', '9', '8', '7', '6', '5', '4', '3'];
  const nums = building.querySelectorAll('.floor-number');
  let row = null;
  for (let i = 0; i < preferredFloors.length; i += 1) {
    const floor = preferredFloors[i];
    for (let j = 0; j < nums.length; j += 1) {
      const el = nums[j];
      if ((el.textContent || '').trim() === floor) {
        row = el.closest('.floor-row');
        break;
      }
    }
    if (row) break;
  }
  if (!row) return;
  const refRect = topBelowRow.getBoundingClientRect();
  const rowRect = row.getBoundingClientRect();
  const delta = rowRect.top - (refRect.bottom + 20);
  if (!Number.isFinite(delta) || Math.abs(delta) < 1) return;
  const scale = effectiveScale || 1;
  const deltaScroll = delta / scale;
  const maxScroll = Math.max(0, container.scrollHeight - container.clientHeight);
  const next = Math.max(0, Math.min(container.scrollTop + deltaScroll, maxScroll));
  container.scrollTop = next;
}

}

function alignBuildingToReference() {
  if (isPhoneLayoutMode()) return;
  if (currentLeftBuilding !== 1) return;
  const container = document.getElementById('buildingContainer');
  const topBelowRow = document.querySelector('.top-below-row');
  if (!container || !topBelowRow) return;

  const space = document.querySelector('.space[data-tower="left"][data-building="1"][data-floor="11"]');
  if (!space) return;
  const row = space.closest('.floor-row');
  if (!row) return;

  const rowRect = row.getBoundingClientRect();
  const refRect = topBelowRow.getBoundingClientRect();
  const delta = rowRect.top - (refRect.bottom + 20);
  if (!Number.isFinite(delta) || Math.abs(delta) < 1) return;

  const maxScroll = Math.max(0, container.scrollHeight - container.clientHeight);
  const next = Math.max(0, Math.min(container.scrollTop + delta, maxScroll));
  container.scrollTop = next;
}

function getFloorColumnAvgX() {
  const container = document.getElementById('buildingContainer');
  const building = document.getElementById('building');
  if (!container || !building) return;
  const nums = building.querySelectorAll('.floor-number');
  if (!nums || nums.length === 0) return;
  let sum = 0;
  let count = 0;
  let width = nums[0].offsetWidth || 0;
  nums.forEach(el => {
    const x = el.offsetLeft;
    if (typeof x === 'number') {
      sum += x;
      count += 1;
      width = el.offsetWidth || width;
    }
  });
  if (count === 0) return null;
  return { avgX: sum / count, width };
}

function getCenteredTextStartX(el) {
  if (!el) return null;
  const rect = el.getBoundingClientRect();
  const text = String(el.textContent || '').trim();
  if (!text) return rect.left;
  const probe = document.createElement('span');
  probe.textContent = text;
  const style = window.getComputedStyle(el);
  probe.style.position = 'fixed';
  probe.style.left = '-99999px';
  probe.style.top = '0';
  probe.style.visibility = 'hidden';
  probe.style.whiteSpace = 'nowrap';
  probe.style.fontFamily = style.fontFamily;
  probe.style.fontSize = style.fontSize;
  probe.style.fontWeight = style.fontWeight;
  probe.style.letterSpacing = style.letterSpacing;
  document.body.appendChild(probe);
  const width = probe.getBoundingClientRect().width || 0;
  document.body.removeChild(probe);
  return rect.left + Math.max(0, (rect.width - width) / 2);
}

function alignPhoneBuildingToExceptionalTab() {
  if (!isPhoneLayoutMode()) return;
  if (isZoomInteractionActive()) return;
  const container = document.getElementById('buildingContainer');
  const building = document.getElementById('building');
  const exceptionalTab = document.getElementById('mobileTabExceptional');
  if (!container || !building || !exceptionalTab) return;
  const floorEl = Array.from(building.querySelectorAll('.floor-number')).find((el) => !!(el && el.offsetParent));
  if (!floorEl) return;
  const targetX = getCenteredTextStartX(exceptionalTab) - 12;
  if (!Number.isFinite(targetX)) return;
  const floorRect = floorEl.getBoundingClientRect();
  const delta = floorRect.left - targetX;
  if (!Number.isFinite(delta) || Math.abs(delta) < 1) return;
  const scale = effectiveScale || 1;
  const viewportInContentUnits = container.clientWidth / scale;
  const maxScroll = Math.max(0, building.scrollWidth - viewportInContentUnits);
  if (maxScroll <= 1) return;
  const next = Math.max(0, Math.min(container.scrollLeft + (delta / scale), maxScroll));
  container.scrollLeft = Math.round(next);
}

function centerUsingBaseline() {
  const container = document.getElementById('buildingContainer');
  const building = document.getElementById('building');
  if (!container || !building) return;
  const mainView = document.querySelector('.main-view');
  const scale = effectiveScale || 1;
  const viewportInContentUnits = container.clientWidth / scale;
  const maxScroll = Math.max(0, building.scrollWidth - viewportInContentUnits);
  if (mainView && mainView.classList.contains('compact-layout')) {
    const desiredCenter = Math.max(0, (building.scrollWidth - viewportInContentUnits) / 2);
    container.scrollLeft = Math.floor(Math.min(desiredCenter, maxScroll));
    return;
  }
  const info = getFloorColumnAvgX();
  if (!info) return;
  const targetX = info.avgX;
  const halfViewportInContentUnits = container.clientWidth / (2 * scale);
  const desired = Math.max(0, Math.min(targetX - halfViewportInContentUnits + (info.width || 0) / 2, maxScroll));
  container.scrollLeft = Math.floor(desired);
}

function nudgeScale(delta, clientX, clientY) {
  const container = document.getElementById('buildingContainer');
  const rect = container ? container.getBoundingClientRect() : null;
  const centerX = rect ? (rect.left + (container.clientWidth / 2)) : undefined;
  const centerY = rect ? (rect.top + (container.clientHeight / 2)) : undefined;
  const pointerX = Number.isFinite(clientX) ? clientX : centerX;
  const pointerY = Number.isFinite(clientY) ? clientY : centerY;
  zoomToClientPoint(userScale + delta, pointerX, pointerY);
}
