<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>雙塔建築視覺化系統 4.0 - CSB 3/F 分層版本</title>
<style>
:root {
  /* Building Colors */
  --color-ipeb: #E6E6FA; /* Lavender */
  --color-ipeb-border: #9370DB; /* MediumPurple */
  --color-mcbtc: #FFC0CB; /* Pink */
  --color-mcbtc-border: #FF69B4; /* HotPink */
  --color-csb: #FFFACD; /* LemonChiffon */
  --color-csb-border: #F0E68C; /* Khaki */
  --color-dtb: #E0FFFF; /* LightCyan */
  --color-dtb-border: #87CEEB; /* SkyBlue */
  --color-sb: #F0FFF0; /* Honeydew */
  --color-sb-border: #90EE90; /* LightGreen */
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 15px;
  overflow: hidden;
  touch-action: none;
}

:root {
  --top-gap: 2px;
  --top-row-h: 124px;
  --top-building-w: 200px;
  --top-dept-w: 320px;
  --top-calendar-w: 210px;
  --top-search-w: 200px;
  --top-linked-w: 552px;
  --top-linked-h: 159px;
  --ui-scale: 1;
}

.container {
  display: flex;
  gap: 15px;
  max-width: 100%;
  margin: 0 auto;
  height: calc(100vh - 30px);
  flex-wrap: nowrap;
}

.control-panel {
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  width: 280px;
  transition: all 0.3s ease;
  position: relative;
  overflow-y: auto;
  flex-shrink: 0;
  max-height: 100%;
}

.control-panel.collapsed {
  width: 50px;
  padding: 20px 10px;
}

.control-panel.collapsed .panel-content {
  display: none;
}

.toggle-btn {
  position: absolute;
  right: 10px;
  top: 10px;
  background: #667eea;
  color: white;
  border: none;
  width: 30px;
  height: 30px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s ease;
  z-index: 100;
}

.toggle-btn:hover {
  background: #5568d3;
  transform: scale(1.1);
}

h2 {
  color: #667eea;
  margin-bottom: 8px;
  font-size: 16px;
  border-bottom: 3px solid #667eea;
  padding-bottom: 4px;
}

.control-section {
  margin-bottom: 5px;
}

.control-section h3 {
  color: #764ba2;
  font-size: 12px;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.building-selector {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 8px;
}

.building-btn {
  padding: 8px;
  border: 2px solid #667eea;
  background: white;
  color: #667eea;
  border-radius: 8px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  transition: all 0.3s ease;
  text-align: left;
  line-height: 1.2;
}

.building-btn:hover {
  background: #667eea;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(102,126,234,0.3);
}

.building-btn.active {
  background: #764ba2;
  border-color: #764ba2;
  color: white;
}

.button-group {
  display: flex;
  gap: 6px;
  justify-content: space-between;
}

.button-group .control-btn {
  flex: 1;
}

.control-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px;
  align-items: center;
  margin-top: 4px;
}

.range-input {
  width: 100%;
  accent-color: #667eea;
}

.select-input {
  padding: 6px;
  border: 2px solid var(--brand1);
  border-radius: 8px;
  font-size: 10px;
  color: var(--brand1);
  background: white;
}
.control-btn {
  padding: 8px 6px;
  border: 2px solid #667eea;
  background: white;
  color: #667eea;
  border-radius: 8px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.control-btn:hover {
  background: #667eea;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(102,126,234,0.3);
}

.control-btn.active {
  background: #667eea;
  border-color: #667eea;
  color: white;
}

.dept-btn {
  padding: 8px;
  border: 2px solid #28a745;
  background: white;
  color: #28a745;
  border-radius: 8px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  transition: all 0.3s ease;
  margin-bottom: 5px;
}

.dept-group {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
}

.dept-list {
  display: none;
  margin-top: 6px;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  width: 100%;
}

.dept-item {
  padding: 4px 6px;
  border: 2px solid #28a745;
  background: white;
  color: #28a745;
  border-radius: 8px;
  cursor: pointer;
  font-size: 9px;
  font-weight: 600;
  text-align: center;
  min-height: 24px;
  height: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 0;
  max-width: 100%;
  overflow: hidden;
  white-space: normal;
  overflow-wrap: anywhere;
  line-height: 1.05;
}

.dept-item.active {
  background: #28a745;
  border-color: #28a745;
  color: white;
}

.dept-btn:hover {
  background: #28a745;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(40,167,69,0.3);
}

.dept-btn.active {
  background: #28a745;
  border-color: #28a745;
  color: white;
}

.dept-group .dept-btn {
  padding: 4px 8px;
  font-size: 9px;
  height: 24px;
  border-radius: 6px;
}

.ward-btn {
  padding: 4px 6px;
  border: 2px solid #ffc107;
  background: white;
  color: #856404;
  border-radius: 6px;
  cursor: pointer;
  font-size: 9px;
  font-weight: 600;
  transition: all 0.3s ease;
  margin: 1px;
  height: 24px;
  display: inline-flex;
  box-sizing: border-box;
  min-width: 0;
  max-width: 100%;
  overflow: hidden;
  align-items: center;
  justify-content: flex-start;
  text-align: left;
}

.ward-btn.ward-btn-doctor-lounge {
  justify-content: center;
  text-align: center;
  white-space: normal;
  overflow: hidden;
  overflow-wrap: anywhere;
  font-size: 8px;
  line-height: 1.05;
  padding: 2px 4px;
}

.ward-btn.ward-btn-rehab-shop {
  justify-content: center;
  text-align: center;
  white-space: normal;
  overflow: hidden;
  overflow-wrap: anywhere;
  font-size: 8px;
  line-height: 1.05;
  padding: 2px 4px;
}

.ward-btn:hover {
  background: #ffc107;
  color: #856404;
  transform: scale(1.05);
}

.ward-btn.active {
  background: #ffc107;
  border-color: #ffc107;
  color: #856404;
  font-weight: bold;
}

.ward-building-row {
  display: flex;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 4px;
  margin: 2px 0;
}

.ward-building-row .dept-item {
  flex: 0 0 auto;
  min-width: 64px;
}

.ward-building-label {
  width: auto;
  font-weight: bold;
  color: #667eea;
  font-size: 10px;
  text-align: left;
  flex-shrink: 0;
  margin: 2px 0;
}

.ward-items-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  justify-items: stretch;
  align-items: start;
  gap: 2px;
  width: 100%;
  padding-left: 0;
  margin-left: 0;
}

.ward-items-grid.ward-items-grid-2col {
  grid-template-columns: repeat(2, 1fr);
}

.ward-items-grid.ward-items-grid-day {
  grid-template-columns: minmax(0, 1fr);
  gap: 2px;
}

.ward-btn.ward-btn-day {
  justify-content: center;
  text-align: center;
  white-space: normal;
  overflow: hidden;
  height: 24px;
  padding: 2px 4px;
  font-size: 8px;
  line-height: 1.05;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.ward-btn.ward-btn-day:hover {
  transform: none;
}

.ward-items-container.ward-buildings-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px 8px;
  align-content: start;
}

.ward-items-container.ward-buildings-grid.single-col {
  grid-template-columns: minmax(0, 1fr);
}

.ward-building-block {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.ward-building-block.span-2 {
  grid-column: 1 / -1;
}

.ward-items-grid .ward-btn {
  width: 100%;
}

.ward-empty {
  font-size: 10px;
  color: #777;
  text-align: center;
  padding: 4px 2px;
}

.ward-items-container {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.dept-search-results {
  display: none;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 6px;
  background: #fff;
  max-height: 95px;
  overflow: auto;
}

.dept-search-header {
  font-weight: 700;
  font-size: 10px;
  color: #764ba2;
  margin: 2px 0;
}

.dept-search-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 4px 6px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid transparent;
  font-size: 10px;
}

.dept-search-item:hover {
  background: rgba(102,126,234,0.08);
  border-color: rgba(102,126,234,0.25);
}

.space.flash-red::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  animation: flash-red 2s ease-in-out;
}

@keyframes flash-red {
  0% { box-shadow: inset 0 0 0 0 rgba(255, 59, 48, 0); }
  10% { box-shadow: inset 0 0 0 2px rgba(255, 59, 48, 0.95), inset 0 0 0 4px rgba(255, 59, 48, 0.45); }
  100% { box-shadow: inset 0 0 0 0 rgba(255, 59, 48, 0); }
}

.private-ward-info-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 4500;
}

.private-ward-info-modal.visible {
  display: flex;
}

.private-ward-info-box {
  background: white;
  color: #222;
  padding: 0;
  border-radius: 16px;
  max-width: min(92vw, 820px);
  box-shadow: 0 18px 60px rgba(0,0,0,0.35);
  user-select: none;
  overflow: hidden;
}

.private-ward-card-header {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.private-ward-card-title {
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.2px;
}

.private-ward-card-hint {
  font-size: 11px;
  opacity: 0.9;
  white-space: nowrap;
}

.private-ward-card-body {
  padding: 12px 14px 14px;
}

.private-ward-card-summary {
  font-size: 13px;
  font-weight: 700;
  color: #333;
  margin-bottom: 10px;
}

.private-ward-flow {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.private-ward-step {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(102,126,234,0.08);
  border: 1px solid rgba(102,126,234,0.18);
}

.private-ward-year {
  flex: 0 0 auto;
  background: rgba(102,126,234,0.95);
  color: white;
  border-radius: 999px;
  padding: 2px 10px;
  font-size: 12px;
  font-weight: 800;
  line-height: 18px;
  min-width: 54px;
  text-align: center;
}

.private-ward-dest {
  flex: 1 1 auto;
  min-width: 0;
}

.private-ward-dest .label {
  font-size: 11px;
  font-weight: 800;
  color: #667eea;
  margin-bottom: 2px;
}

.private-ward-dest .value {
  font-size: 13px;
  font-weight: 800;
  color: #222;
  word-break: break-word;
}

.private-ward-arrow {
  height: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(102,126,234,0.9);
  font-weight: 900;
  letter-spacing: 1px;
}

.dept-search-item .meta {
  font-size: 9px;
  color: #667eea;
  white-space: nowrap;
  flex-shrink: 0;
}

.link-display {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 8px;
  border-radius: 10px;
  margin-top: 15px;
  overflow-y: auto;
  max-height: none;
  min-height: 50px;
}

.link-display h4 {
  font-size: 14px;
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 2px solid rgba(255,255,255,0.3);
}

#linkedWardsList {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: var(--top-gap);
  align-items: start;
  overflow-x: auto;
}

.linked-side {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: var(--top-gap);
}

.linked-building-column {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.linked-building-column .building-tag {
  margin-bottom: 2px;
}

.link-display.empty {
  opacity: 0.35;
}

.linked-ward-item {
  background: rgba(255,255,255,0.15);
  padding: 4px 6px;
  margin: 0;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 11px;
  line-height: 1.15;
  border: 1px solid transparent;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 22px;
}

.linked-ward-item:hover {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.5);
  transform: translateX(3px);
}

.linked-ward-item .ward-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}

.linked-ward-item .ward-location {
  font-weight: bold;
  color: #ffd700;
  font-size: 10px;
  white-space: nowrap;
  padding-right: 6px;
  flex-shrink: 0;
}

.linked-ward-item .ward-name {
  color: white;
  font-size: 10px;
  text-align: right;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-left: 4px;
}

.link-count {
  display: inline-block;
  background: rgba(255,255,255,0.3);
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 10px;
  margin-left: 5px;
}

.building-tag {
  font-weight: bold;
  color: #ffd700;
  font-size: 10px;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 1px 0;
}

.building-tag-icon {
  font-size: 8px;
  background: rgba(255,255,255,0.2);
  padding: 1px 3px;
  border-radius: 2px;
  flex-shrink: 0;
}

.main-view {
  flex: 1;
  background: transparent;
  border-radius: 15px;
  padding: 6px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
}

.timeline-top-row,
.top-below-row {
  position: relative;
  z-index: 2;
  pointer-events: none;
}

.timeline-top-row .top-panel,
.top-below-row .top-panel {
  pointer-events: auto;
}

.timeline-top-row {
  display: flex;
  gap: var(--top-gap);
  align-items: stretch;
  flex-shrink: 0;
  margin-bottom: 0;
  min-width: 0;
  height: var(--top-row-h);
}

.top-panel {
  min-width: 0;
  height: 100%;
  background: white;
  border: 2px solid #667eea;
  border-radius: 8px;
  padding: 4px 6px;
  box-shadow: 0 4px 12px rgba(102,126,234,0.2);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.top-panel.hidden {
  display: none !important;
}

.top-left-group {
  flex: 0 0 auto;
  min-width: 0;
  height: 100%;
  display: flex;
  gap: var(--top-gap);
  align-items: stretch;
}

.top-building-panel {
  flex: 0 0 var(--top-building-w);
  width: var(--top-building-w);
}

.top-dept-panel {
  flex: 0 0 var(--top-dept-w);
  width: var(--top-dept-w);
  min-width: 0;
}

.top-calendar-panel {
  flex: 0 0 var(--top-calendar-w);
  width: var(--top-calendar-w);
}

.calendar-placeholder {
  flex: 0 0 var(--top-calendar-w);
  width: var(--top-calendar-w);
  height: var(--top-row-h);
}

.top-calendar-panel.calendar-floating {
  position: absolute;
  z-index: 60;
  flex: none;
  resize: both;
  overflow: hidden;
  min-width: 360px;
  min-height: 120px;
  max-width: 100%;
  max-height: 100%;
}

.top-calendar-panel.calendar-floating .top-panel-header {
  cursor: grab;
  user-select: none;
  touch-action: none;
}

.top-calendar-panel.calendar-floating.calendar-dragging .top-panel-header {
  cursor: grabbing;
}

.top-search-panel {
  flex: 0 0 var(--top-search-w);
  width: var(--top-search-w);
}

.top-search-body {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.top-search-floating {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 120;
  display: flex;
  align-items: flex-start;
  gap: 4px;
  background: transparent;
  border: none;
  padding: 0;
  width: auto;
  max-width: calc(100vw - 28px);
  pointer-events: auto;
  overflow: visible;
  transform: translateZ(0) scale(var(--ui-scale));
  transform-origin: top right;
}

.top-search-tools {
  display: flex;
  align-items: center;
  gap: 4px;
}

.top-search-floating .top-panel {
  height: auto;
}

.calendar-toggle-btn {
  width: 32px;
  height: 24px;
  border: 2px solid #667eea;
  border-radius: 6px;
  background: white;
  color: #667eea;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
  flex: 0 0 auto;
}

.calendar-toggle-btn:hover {
  background: #f8f9ff;
}

.calendar-toggle-btn.active {
  border-color: #667eea;
  box-shadow: 0 0 0 2px rgba(102,126,234,0.15);
}

.calendar-toggle-btn:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 2px rgba(102,126,234,0.15);
}

.top-search-box {
  position: relative;
  background: white;
  border: 2px solid #667eea;
  border-radius: 8px;
  padding: 4px 6px;
  box-shadow: 0 4px 12px rgba(102,126,234,0.2);
  width: var(--top-search-w);
  height: auto;
  overflow: visible;
}

.top-search-floating .top-filter-input {
  padding: 3px 6px;
}

.top-search-box .dept-search-results {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  left: 0;
  max-height: min(220px, 45vh);
  box-shadow: 0 8px 18px rgba(0,0,0,0.12);
  z-index: 51;
}

.top-panel-header {
  font-weight: 700;
  font-size: 11px;
  color: #667eea;
  text-align: center;
  border-bottom: 1px solid #667eea;
  padding-bottom: 1px;
}

#topDeptPanel > .top-panel-header {
  display: none;
}

.top-building-selector {
  display: flex;
  flex-direction: column;
  gap: 3px;
  flex: 1;
  min-height: 0;
  justify-content: flex-start;
}

.top-building-panel .building-btn {
  padding: 3px 6px;
  font-size: 9px;
  line-height: 1.1;
  text-align: center;
  width: 100%;
  white-space: nowrap;
}

.top-building-panel .building-btn:hover {
  transform: none;
  box-shadow: none;
}

.top-calendar-panel .calendar-panel {
  border: none;
  border-radius: 0;
  padding: 0;
  box-shadow: none;
  flex: 1 1 0;
  height: auto;
  overflow: hidden;
}

.top-calendar-panel .calendar-header {
  display: none;
}

.top-dept-body {
  flex: 1;

@media (max-width: 600px) {

    padding: 0;
  }

    gap: 0;
    height: 100vh;
  }

  .control-panel {
    display: none;
  }

  .main-view {
    padding: 8px;
    height: 100%;
  }

  .building-container {
    display: none !important;
  }

  .top-search-floating {
    position: sticky;
    top: 0;
    left: 0;
    right: 0;
    z-index: 600;
    max-width: 100%;
    transform: none;
    transform-origin: top left;
  }

  .top-search-tools {
    display: none;
  }

  #topDeptPanel {
    display: none !important;
  }

  .top-search-box {
    width: 100%;
  }

  .top-filter-input {
    font-size: 16px;
  }

  .top-search-box .dept-search-results {
    max-height: min(70vh, 420px);
    z-index: 6000;
  }

  .timeline-top-row {
    flex: 1 1 auto;
    min-height: 0;
    margin-top: 8px;
  }

  .top-left-group {
    display: none;
  }

  .top-calendar-panel {
    flex: 1 1 auto;
    min-height: 0;
  }

  .top-below-row {
    flex: 1 1 auto;
    min-height: 0;
    margin-top: 8px;
  }

  .top-below-row .top-linked-panel {
    height: 100%;
  }
}

// 創建空間元素的輔助函數
function createSpaceElement(space, tower, floor, index, buildingIndex) {
  const spaceDiv = document.createElement('div');
  spaceDiv.className = 'space';
  
  if (space.specialClass) {
    spaceDiv.classList.add(space.specialClass);
  }
  
  if (space.multiline && space.lines) {
    const wardText = document.createElement('div');
    wardText.className = 'ward-text';
    
    space.lines.forEach(line => {
      const lineDiv = document.createElement('span');
      lineDiv.className = 'line';
      lineDiv.textContent = line;
      wardText.appendChild(lineDiv);
    });
    
    spaceDiv.appendChild(wardText);
    spaceDiv.classList.add('multiline');
  } else {
    spaceDiv.textContent = space.name;
  }
  
  if (space.widthClass) {
    spaceDiv.classList.add(space.widthClass);
  } else {
    spaceDiv.classList.add('normal');
  }
  
  spaceDiv.dataset.tower = tower;
  spaceDiv.dataset.floor = floor;
  spaceDiv.dataset.index = index;
  spaceDiv.dataset.building = buildingIndex;
  spaceDiv.onclick = () => {
    if (suppressSpaceClickOnce) {
      suppressSpaceClickOnce = false;
      return;
    }
    toggleSpace(tower, floor, index, buildingIndex);
  };
  
  return spaceDiv;
}

function applyDeptFilter(e) {
  const input = document.getElementById('deptFilter');
  const q = (input ? input.value : '').trim().toLowerCase();
  const tokens = q.split(/[\s,;，、]+/).filter(Boolean);
  if (e && e.type === 'input') {
    deptSearchForceHidden = false;
  }
  const normalize = (() => {
    try {
      new RegExp('[^\\p{L}\\p{N}]+', 'gu');
      return (s) => String(s || '').toLowerCase().replace(/[^\p{L}\p{N}]+/gu, '');
    } catch (e) {
      return (s) => String(s || '').toLowerCase().replace(/[^a-z0-9\u00C0-\uFFFF]+/g, '');
    }
  })();
  const tokensNorm = tokens.map(normalize).filter(Boolean);
  updateDeptSearchResults(tokensNorm);
  return;
  const matchAny = (text) => {
    if (tokensNorm.length === 0) return true;
    const raw = String(text || '').toLowerCase();
    const norm = normalize(text);
    return tokensNorm.some(t => raw.includes(t) || norm.includes(t));
  };

  document.querySelectorAll('#clinicalList .dept-item, #nonList .dept-item').forEach(el => {
    const text = (el.textContent || '').toLowerCase();
    el.style.display = matchAny(text) ? '' : 'none';
  });

  const wardButtons = document.getElementById('wardButtons');
  if (wardButtons) {
    wardButtons.querySelectorAll('.ward-btn').forEach(el => {
      const text = (el.textContent || '').toLowerCase();
      el.style.display = matchAny(text) ? '' : 'none';
    });

    wardButtons.querySelectorAll('.ward-items-container').forEach(container => {
      const children = Array.from(container.children);
      for (let i = 0; i < children.length; i += 2) {
        const label = children[i];
        const grid = children[i + 1];
        if (!label || !grid) break;
        const anyVisible = Array.from(grid.querySelectorAll('.ward-btn')).some(btn => btn.style.display !== 'none');
        const show = tokens.length === 0 || anyVisible;
        label.style.display = show ? '' : 'none';
        grid.style.display = show ? '' : 'none';
      }
    });
  }

  updateDeptSearchResults(tokensNorm);
}

function applyWardFilter() {
  applyDeptFilter();
}

  const entries = [];
  const addLeftSpace = (buildingIndex, buildingName, floor, index, name) => {
    const key = `left|${buildingIndex}|${floor}|${index}`;
    entries.push({
      key,
      type: 'space',
      tower: 'left',
      buildingIndex,
      buildingName,
      floor: String(floor),
      wing: '',
      index,
      name: String(name || ''),
      search: `${name} ${buildingName} ${floor} left`.toLowerCase()
    });
  };
  const addRightSpace = (floor, wing, index, name) => {
    const key = `right|${floor}|${wing}|${index}`;
    entries.push({
      key,
      type: 'space',
      tower: 'right',
      buildingIndex: null,
      buildingName: 'IPEB',
      floor: String(floor),
      wing: String(wing || ''),
      index,
      name: String(name || ''),
      search: `${name} IPEB ${floor} ${wing} right`.toLowerCase()
    });
  };

  (leftBuildingsData || []).forEach((b, bIndex) => {
    const buildingName = (b && b.name) ? b.name : `LEFT-${bIndex}`;
    const floors = (b && b.floors) ? b.floors : {};
    Object.entries(floors).forEach(([floor, spaces]) => {
      if (Array.isArray(spaces)) {
        spaces.forEach((space, idx) => {
          if (!space) return;
          const name = (typeof space === 'object' && space.name) ? space.name : String(space);
          addLeftSpace(bIndex, buildingName, floor, idx, name);
        });
        return;
      }
      if (spaces && typeof spaces === 'object' && (Array.isArray(spaces.upper) || Array.isArray(spaces.lower))) {
        const upper = Array.isArray(spaces.upper) ? spaces.upper : [];
        const lower = Array.isArray(spaces.lower) ? spaces.lower : [];
        upper.forEach((space, idx) => {
          if (!space) return;
          const name = (typeof space === 'object' && space.name) ? space.name : String(space);
          addLeftSpace(bIndex, buildingName, floor, idx, name);
        });
        lower.forEach((space, idx) => {
          if (!space) return;
          const name = (typeof space === 'object' && space.name) ? space.name : String(space);
          addLeftSpace(bIndex, buildingName, floor, idx + upper.length, name);
        });
      }
    });
  });

  Object.entries(rightTowerData || {}).forEach(([floor, data]) => {
    ['nwing', 'sewing', 'swwing'].forEach(wing => {
      const arr = data && data[wing];
      (arr || []).forEach((space, idx) => {
        if (!space) return;
        const name = (typeof space === 'object' && space.name) ? space.name : String(space);
        addRightSpace(floor, wing, idx, name);
      });
    });
  });

  const seenSpace = new Set();
  deptSearchIndex = entries.filter(e => {
    if (seenSpace.has(e.key)) return false;
    seenSpace.add(e.key);
    return true;
  });
  return;
  const addWard = (side, deptKey, buildingKey, item, kind) => {
    const key = `${side}|${deptKey}|${buildingKey}|${item}|${kind}`;
    entries.push({
      key,
      type: 'ward',
      side,
      deptKey,
      buildingKey,
      item,
      kind,
      search: `${deptKey} ${buildingKey} ${item} ${kind}`.toLowerCase()
    });
  };
  const addDept = (side, deptKey) => {
    entries.push({
      key: `${side}|dept|${deptKey}`,
      type: 'dept',
      side,
      deptKey,
      search: `${deptKey} ${side}`.toLowerCase()
    });
  };

  ['clinical', 'nonClinical'].forEach(side => {
    const catalog = deptCatalog[side] || {};
    Object.keys(catalog).forEach(deptKey => {
      addDept(side, deptKey);
      const data = catalog[deptKey] || {};
      if (data.groups) {
        Object.entries(data.groups).forEach(([groupName, group]) => {
          if (group && group.direct) {
            Object.entries(group.direct).forEach(([buildingKey, items]) => {
              (items || []).forEach(item => addWard(side, deptKey, buildingKey, item, groupName));
            });
          }
        });
      }
      if (data.direct) {
        Object.entries(data.direct).forEach(([buildingKey, items]) => {
          (items || []).forEach(item => addWard(side, deptKey, buildingKey, item, 'direct'));
        });
      }
      ['ward', 'day'].forEach(kind => {
        const byBuilding = data[kind];
        if (byBuilding) {
          Object.entries(byBuilding).forEach(([buildingKey, items]) => {
            (items || []).forEach(item => addWard(side, deptKey, buildingKey, item, kind));
          });
        }
      });
    });
  });

  const seen = new Set();
  deptSearchIndex = entries.filter(e => {
    if (seen.has(e.key)) return false;
    seen.add(e.key);
    return true;
  });
}

function updateDeptSearchResults(tokensNorm) {
  const resultsEl = document.getElementById('deptSearchResults');
  if (!resultsEl) return;
  if (deptSearchForceHidden) {
    resultsEl.style.display = 'none';
    resultsEl.innerHTML = '';
    return;
  }
  if (!tokensNorm || tokensNorm.length === 0) {
    resultsEl.style.display = 'none';
    resultsEl.innerHTML = '';
    return;
  }

  if (!deptSearchIndex || !deptSearchIndex[0] || deptSearchIndex[0].type !== 'space') {
    deptSearchIndex = null;
    buildDeptSearchIndex();
  }

  const normalize = (() => {
    try {
      new RegExp('[^\\p{L}\\p{N}]+', 'gu');
      return (s) => String(s || '').toLowerCase().replace(/[^\p{L}\p{N}]+/gu, '');
    } catch (e) {
      return (s) => String(s || '').toLowerCase().replace(/[^a-z0-9\u00C0-\uFFFF]+/g, '');
    }
  })();
  const matches = (text) => {
    const raw = String(text || '').toLowerCase();
    const norm = normalize(text);
    return tokensNorm.some(t => raw.includes(t) || norm.includes(t));
  };

  const floorSort = (floor) => {
    const s = String(floor || '').trim();
    if (/^B\d+$/i.test(s)) return -parseInt(s.slice(1), 10);
    const n = parseInt(s, 10);
    if (Number.isFinite(n)) return n;
    return -9999;
  };
  const wingOrder = { nwing: 0, sewing: 1, swwing: 2 };
  const wingLabel = (wing) => {
    const w = String(wing || '');
    if (w === 'nwing') return 'N wing';
    if (w === 'sewing') return 'SE wing';
    if (w === 'swwing') return 'SW wing';
    return w;
  };

  const leftHits = [];
  const rightHits = [];
  for (const e of deptSearchIndex || []) {
    if (!matches(e.search) && !matches(e.name)) continue;
    if (e.tower === 'left') leftHits.push(e);
    else if (e.tower === 'right') rightHits.push(e);
  }

  leftHits.sort((a, b) => {
    const bn = String(a.buildingName || '').localeCompare(String(b.buildingName || ''));
    if (bn !== 0) return bn;
    const af = floorSort(a.floor);
    const bf = floorSort(b.floor);
    if (af !== bf) return bf - af;
    return String(a.name || '').localeCompare(String(b.name || ''));
  });
  rightHits.sort((a, b) => {
    const af = floorSort(a.floor);
    const bf = floorSort(b.floor);
    if (af !== bf) return bf - af;
    const aw = wingOrder[String(a.wing || '')] ?? 99;
    const bw = wingOrder[String(b.wing || '')] ?? 99;
    if (aw !== bw) return aw - bw;
    return String(a.name || '').localeCompare(String(b.name || ''));
  });

  const maxLeft = 30;
  const maxRight = 30;
  resultsEl.innerHTML = '';
  resultsEl.style.display = 'block';

  const addRow = (e, meta) => {
    const row = document.createElement('div');
    row.className = 'dept-search-item';
    row.innerHTML = `<span>${e.name}</span><span class="meta">${meta}</span>`;
    row.onclick = () => selectSpaceFromSearch(e);
    resultsEl.appendChild(row);
  };

  if (leftHits.length > 0) {
    const h = document.createElement('div');
    h.className = 'dept-search-header';
    h.textContent = '左塔空間';
    resultsEl.appendChild(h);
    leftHits.slice(0, maxLeft).forEach(e => addRow(e, `${e.buildingName} · ${e.floor}F`));
  }

  if (rightHits.length > 0) {
    const h = document.createElement('div');
    h.className = 'dept-search-header';
    h.textContent = '右塔空間';
    resultsEl.appendChild(h);
    rightHits.slice(0, maxRight).forEach(e => addRow(e, `IPEB · ${e.floor}F · ${wingLabel(e.wing)}`));
  }

  if (leftHits.length === 0 && rightHits.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'ward-empty';
    empty.textContent = '沒有結果';
    resultsEl.appendChild(empty);
  }
}

function selectSpaceFromSearch(entry) {
  const input = document.getElementById('deptFilter');
  const resultsEl = document.getElementById('deptSearchResults');
  if (resultsEl) {
    resultsEl.style.display = 'none';
    resultsEl.innerHTML = '';
  }
  deptSearchForceHidden = true;
  if (input) {
    input.value = '';
    input.focus();
    try { input.setSelectionRange(0, 0); } catch (e) {}
  }

  if (!entry) return;
  if (entry.tower === 'left') {
    const bIndex = entry.buildingIndex;
    const run = () => {
      toggleSpace('left', entry.floor, entry.index, bIndex);
      scrollToSpace('left', entry.floor, entry.index, bIndex);
    };
    if (typeof bIndex === 'number' && bIndex !== currentLeftBuilding) {
      switchLeftBuilding(bIndex);
      setTimeout(run, 350);
    } else {
      run();
    }
  } else {
    toggleSpace('right', entry.floor, entry.index, null, entry.wing);
    scrollToSpace('right', entry.floor, entry.index, null, entry.wing);
  }
}

function resolveDeptItem(buildingKey, item) {
  const bIndex = buildingMap[buildingKey];
  let resolved = null;
  if (item === '10HDU' && bIndex === 0) {
    resolved = { tower: 'left', floor: '10', index: 2, buildingIndex: bIndex };
  }
  const sharedMatch = String(item).match(/^(\d+)\/F Shared Facilities$/);
  if (!resolved && sharedMatch && bIndex === 0) {
    const fl = sharedMatch[1];
    const spaces = leftBuildingsData[bIndex].floors[fl];
    if (Array.isArray(spaces)) {
      for (let i = 0; i < spaces.length; i++) {
        const s = spaces[i];
        if (typeof s === 'object' && s.name && s.name.toUpperCase().includes('SHARED FACILITIES')) {
          resolved = { tower: 'left', floor: fl, index: i, buildingIndex: bIndex };
          break;
        }
      }
    }
  }
  if (item === 'CCU' && bIndex === 0) {
    resolved = { tower: 'left', floor: '10', index: 2, buildingIndex: bIndex };
  }
  const codeMatch = String(item).match(/^(\d+)([A-Z]+)$/);
  if (codeMatch) {
    const fl = codeMatch[1];
    let code = codeMatch[2];
    if (code === 'CCU') code = 'C';
    if (code.endsWith('H') && code.length > 1) code = code.slice(0, -1);
    if (bIndex === 0) {
      const map = { 'A': 0, 'B': 1, 'C': 2 };
      if (map[code] !== undefined) resolved = { tower: 'left', floor: fl, index: map[code], buildingIndex: bIndex };
    } else if (bIndex === 2) {
      const map = { 'H': 0, 'K': 1, 'L': 2, 'M': 3 };
      if (map[code] !== undefined) resolved = { tower: 'left', floor: fl, index: map[code], buildingIndex: bIndex };
    } else if (bIndex === 3) {
      if (code === 'EF') {
        resolved = { tower: 'left', floor: fl, index: 0, buildingIndex: bIndex };
      } else {
        const map = { 'E': 0, 'F': 1 };
        if (map[code] !== undefined) resolved = { tower: 'left', floor: fl, index: map[code], buildingIndex: bIndex };
      }
    }
  }
  if (!resolved) {
    const left = findLeftByName(bIndex, item);
    if (left) {
      resolved = { tower: 'left', floor: left.floor, index: left.index, buildingIndex: bIndex };
    } else {
      const right = findRightByName(item);
      if (right) {
        resolved = { tower: 'right', floor: right.floor, index: right.index, wing: right.wing };
      }
    }
  }
  return resolved;
}
function handleAllSelection(buildingKey, items) {
  const resultsEl = document.getElementById('deptSearchResults');
  if (resultsEl) {
    resultsEl.style.display = 'none';
    resultsEl.innerHTML = '';
  }
  deptSearchForceHidden = true;
  selectedSpaces.clear();
  currentLinkedGroup = null;
  currentClickedSpace = null;
  const bIndex = buildingMap[buildingKey];
  if (typeof bIndex === 'number' && bIndex !== currentLeftBuilding) {
    switchLeftBuilding(bIndex);
  }
  items.forEach(item => {
    const resolved = resolveDeptItem(buildingKey, item);
    if (resolved) {
      if (resolved.tower === 'left') {
        const key = `left-${resolved.buildingIndex}-${resolved.floor}-${''}-${resolved.index}`;
        selectedSpaces.add(key);
      } else if (resolved.tower === 'right') {
        const key = `right-${resolved.floor}-${resolved.wing || ''}-${resolved.index}`;
        selectedSpaces.add(key);
      }
    }
  });
  updateDisplay();
  updateLinkDisplay();
}
function handleDeptItemClick(buildingKey, item) {
  const resultsEl = document.getElementById('deptSearchResults');
  if (resultsEl) {
    resultsEl.style.display = 'none';
    resultsEl.innerHTML = '';
  }
  deptSearchForceHidden = true;
  selectedSpaces.clear();
  currentLinkedGroup = null;
  currentClickedSpace = null;
  const bIndex = buildingMap[buildingKey];
  let resolved = null;
  if (item === '10HDU' && bIndex === 0) {
    resolved = { tower: 'left', floor: '10', index: 2, buildingIndex: bIndex };
  }
  const sharedMatch = item.match(/^(\d+)\/F Shared Facilities$/);
  if (!resolved && sharedMatch && bIndex === 0) {
    const fl = sharedMatch[1];
    const spaces = leftBuildingsData[bIndex].floors[fl];
    if (Array.isArray(spaces)) {
      for (let i = 0; i < spaces.length; i++) {
        const s = spaces[i];
        if (typeof s === 'object' && s.name && s.name.toUpperCase().includes('SHARED FACILITIES')) {
          resolved = { tower: 'left', floor: fl, index: i, buildingIndex: bIndex };
          break;
        }
      }
    }
  }
  if (item === 'CCU' && bIndex === 0) {
    resolved = { tower: 'left', floor: '10', index: 2, buildingIndex: bIndex };
  }
  const codeMatch = item.match(/^(\d+)([A-Z]+)$/);
  if (codeMatch) {
    const fl = codeMatch[1];
    let code = codeMatch[2];
    if (code === 'CCU') code = 'C';
    if (code.endsWith('H') && code.length > 1) code = code.slice(0, -1);
    if (bIndex === 0) {
      const map = { 'A': 0, 'B': 1, 'C': 2 };
      if (map[code] !== undefined) resolved = { tower: 'left', floor: fl, index: map[code], buildingIndex: bIndex };
    } else if (bIndex === 2) {
      const map = { 'H': 0, 'K': 1, 'L': 2, 'M': 3 };
      if (map[code] !== undefined) resolved = { tower: 'left', floor: fl, index: map[code], buildingIndex: bIndex };
    } else if (bIndex === 3) {
      if (code === 'EF') {
        resolved = { tower: 'left', floor: fl, index: 0, buildingIndex: bIndex };
      } else {
        const map = { 'E': 0, 'F': 1 };
        if (map[code] !== undefined) resolved = { tower: 'left', floor: fl, index: map[code], buildingIndex: bIndex };
      }
    }
  }
  if (!resolved) {
    const left = findLeftByName(bIndex, item);
    if (left) {
      resolved = { tower: 'left', floor: left.floor, index: left.index, buildingIndex: bIndex };
    } else {
      const right = findRightByName(item);
      if (right) {
        resolved = { tower: 'right', floor: right.floor, index: right.index, wing: right.wing };
      }
    }
  }
  if (resolved) {
    if (resolved.tower === 'left') {
      toggleSpace('left', resolved.floor, resolved.index, resolved.buildingIndex);
      scrollToSpace('left', resolved.floor, resolved.index, resolved.buildingIndex);
    } else {
      toggleSpace('right', resolved.floor, resolved.index, null, resolved.wing);
      scrollToSpace('right', resolved.floor, resolved.index, null, resolved.wing);
    }
  }
  document.querySelectorAll('#wardButtons .ward-btn').forEach(btn => {
    if (btn.textContent === item) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
  updateDisplay();
  updateLinkDisplay();
}

function findLeftByName(buildingIndex, name) {
  const floors = leftBuildingsData[buildingIndex].floors;
  for (const [floor, spaces] of Object.entries(floors)) {
    for (let i = 0; i < spaces.length; i++) {
      const s = spaces[i];
      if (typeof s === 'object' && s.name && s.name.toUpperCase().includes(name.toUpperCase())) {
        return { floor, index: i };
      }
    }
  }
  return null;
}

function findRightByName(name) {
  for (const [floor, data] of Object.entries(rightTowerData)) {
    if (data.nwing) {
      for (let i = 0; i < data.nwing.length; i++) {
        const s = data.nwing[i];
        if (s.name && s.name.toUpperCase().includes(name.toUpperCase())) {
          return { floor, index: i, wing: 'nwing' };
        }
      }
    }
    if (data.sewing) {
      for (let i = 0; i < data.sewing.length; i++) {
        const s = data.sewing[i];
        if (s.name && s.name.toUpperCase().includes(name.toUpperCase())) {
          return { floor, index: i, wing: 'sewing' };
        }
      }
    }
    if (data.swwing) {
      for (let i = 0; i < data.swwing.length; i++) {
        const s = data.swwing[i];
        if (s.name && s.name.toUpperCase().includes(name.toUpperCase())) {
          return { floor, index: i, wing: 'swwing' };
        }
      }
    }
  }
  return null;
}

function buildCalendarMonths() {
  const months = [];
  const start = new Date(2027, 5, 1);
  const end = new Date(2028, 3, 1);
  let cursor = new Date(start.getTime());
  while (cursor <= end) {
    months.push({ year: cursor.getFullYear(), month: cursor.getMonth() });
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  }
  return months;
}

function formatCalendarMonthLabel(year, month) {
  const mm = String(month + 1).padStart(2, '0');
  return `${mm}/${year}`;
}

function formatCalendarDate(year, month, day) {
  const mm = String(month + 1).padStart(2, '0');
  const dd = String(day).padStart(2, '0');
  return `${year}-${mm}-${dd}`;
}

function renderCalendarMonth() {
  const monthMeta = calendarMonths[calendarMonthIndex];
  if (!monthMeta) return;
  
  const monthLabel = document.getElementById('calendarMonthLabel');
  const grid = document.getElementById('calendarGrid');
  const prevBtn = document.getElementById('calendarPrev');
  const nextBtn = document.getElementById('calendarNext');
  if (!monthLabel || !grid || !prevBtn || !nextBtn) return;
  
  const { year, month } = monthMeta;
  monthLabel.textContent = formatCalendarMonthLabel(year, month);
  prevBtn.disabled = calendarMonthIndex <= 0;
  nextBtn.disabled = calendarMonthIndex >= calendarMonths.length - 1;
  
  grid.innerHTML = '';
  
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const jsDow = firstDay.getDay();
  const mondayBasedOffset = (jsDow + 6) % 7;
  
  for (let i = 0; i < mondayBasedOffset; i++) {
    const empty = document.createElement('button');
    empty.type = 'button';
    empty.className = 'calendar-day empty';
    empty.disabled = true;
    empty.textContent = '';
    grid.appendChild(empty);
  }
  
  for (let d = 1; d <= daysInMonth; d++) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'calendar-day';
    btn.textContent = String(d);
    const dateStr = formatCalendarDate(year, month, d);
    btn.dataset.date = dateStr;
    if (selectedCalendarDate === dateStr) btn.classList.add('active');
    btn.addEventListener('click', function() {
      selectCalendarDate(dateStr);
    });
    grid.appendChild(btn);
  }
  
  updateCalendarLeftTowerBox(selectedCalendarDate);
}

function initCalendar() {
  calendarMonths = buildCalendarMonths();

  if (prevBtn) {

  if (nextBtn) {

}

function initWardConnectionFloating() {
  const mainView = document.querySelector('.main-view');
  const panel = document.querySelector('.top-linked-panel');
  const anchorRow = document.querySelector('.top-below-row');
  if (!mainView || !panel || !anchorRow) return;
  if (panel.dataset.floatingInit === '1') return;
  panel.dataset.floatingInit = '1';

  const panelRect = panel.getBoundingClientRect();
  const mainRect = mainView.getBoundingClientRect();

  let left = panelRect.left - mainRect.left;
  let top = panelRect.top - mainRect.top;
  try {
    localStorage.removeItem('wardConnectionPos');
  } catch (e) {}

  panel.classList.add('ward-floating');
  panel.style.left = `${Math.max(0, Math.round(left))}px`;
  panel.style.top = `${Math.max(0, Math.round(top))}px`;
  panel.style.width = `${Math.max(240, Math.round(panelRect.width))}px`;
  panel.style.height = `${Math.max(72, Math.round(panelRect.height))}px`;
  mainView.appendChild(panel);
  clampWardConnectionToBounds();
}

function clampWardConnectionToBounds() {
  const mainView = document.querySelector('.main-view');
  const panel = document.querySelector('.top-linked-panel.ward-floating');
  if (!mainView || !panel) return;
  const maxLeft = Math.max(0, mainView.clientWidth - panel.offsetWidth);
  const maxTop = Math.max(0, mainView.clientHeight - panel.offsetHeight);
  const currentLeft = parseFloat(panel.style.left || '0') || 0;
  const currentTop = parseFloat(panel.style.top || '0') || 0;
  const nextLeft = Math.max(0, Math.min(currentLeft, maxLeft));
  const nextTop = Math.max(0, Math.min(currentTop, maxTop));
  panel.style.left = `${Math.round(nextLeft)}px`;
  panel.style.top = `${Math.round(nextTop)}px`;
}

function enableWardConnectionDrag() {
  initWardConnectionFloating();
  const mainView = document.querySelector('.main-view');
  const panel = document.querySelector('.top-linked-panel.ward-floating');
  if (!mainView || !panel) return;
  if (!wardConnectionResizeObserver && typeof ResizeObserver !== 'undefined') {
    wardConnectionResizeObserver = new ResizeObserver(() => {
      clampWardConnectionToBounds();
    });
    wardConnectionResizeObserver.observe(panel);
  }
  enablePanelResize(panel, { minW: 240, minH: 72, clamp: clampWardConnectionToBounds });
  const handle = panel.querySelector('.link-display h4');
  if (!handle) return;
  if (panel.dataset.dragInit === '1') return;
  panel.dataset.dragInit = '1';

  let dragging = false;
  let startX = 0;
  let startY = 0;
  let startLeft = 0;
  let startTop = 0;

  const onMove = (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    const maxLeft = Math.max(0, mainView.clientWidth - panel.offsetWidth);
    const maxTop = Math.max(0, mainView.clientHeight - panel.offsetHeight);
    const nextLeft = Math.max(0, Math.min(startLeft + dx, maxLeft));
    const nextTop = Math.max(0, Math.min(startTop + dy, maxTop));
    panel.style.left = `${Math.round(nextLeft)}px`;
    panel.style.top = `${Math.round(nextTop)}px`;
  };

  const onEnd = () => {
    if (!dragging) return;
    dragging = false;
    panel.classList.remove('ward-dragging');
    clampWardConnectionToBounds();
  };

  handle.addEventListener('pointerdown', (e) => {
    if (e.button != null && e.button !== 0) return;
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startLeft = parseFloat(panel.style.left || '0') || 0;
    startTop = parseFloat(panel.style.top || '0') || 0;
    panel.classList.add('ward-dragging');
    try {
      handle.setPointerCapture(e.pointerId);
    } catch (err) {}
    e.preventDefault();
  });

  handle.addEventListener('pointermove', onMove);
  handle.addEventListener('pointerup', onEnd);
  handle.addEventListener('pointercancel', onEnd);
  window.addEventListener('resize', () => clampWardConnectionToBounds());
}

function enablePanelResize(panel, opts) {
  if (!panel) return;
  if (panel.dataset.resizeInit === '1') return;
  panel.dataset.resizeInit = '1';
  const handle = document.createElement('div');
  handle.className = 'panel-resize-handle';
  panel.appendChild(handle);

  const minW = (opts && opts.minW) || 240;
  const minH = (opts && opts.minH) || 72;
  const clamp = (opts && opts.clamp) || (() => {});

  let resizing = false;
  let startX = 0;
  let startY = 0;
  let startW = 0;
  let startH = 0;

  const onMove = (e) => {
    if (!resizing) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    const nextW = Math.max(minW, startW + dx);
    const nextH = Math.max(minH, startH + dy);
    panel.style.width = `${Math.round(nextW)}px`;
    panel.style.height = `${Math.round(nextH)}px`;
    clamp();
  };

  const onEnd = () => {
    if (!resizing) return;
    resizing = false;
    clamp();
  };

  handle.addEventListener('pointerdown', (e) => {
    if (e.button != null && e.button !== 0) return;
    resizing = true;
    startX = e.clientX;
    startY = e.clientY;
    startW = panel.offsetWidth;
    startH = panel.offsetHeight;
    try {
      handle.setPointerCapture(e.pointerId);
    } catch (err) {}
    e.preventDefault();
  });
  handle.addEventListener('pointermove', onMove);
  handle.addEventListener('pointerup', onEnd);
  handle.addEventListener('pointercancel', onEnd);
}

// 選擇病房
function selectWard(wardName) {
  const resultsEl = document.getElementById('deptSearchResults');
  if (resultsEl) {
    resultsEl.style.display = 'none';
    resultsEl.innerHTML = '';
  }
  deptSearchForceHidden = true;
  selectedSpaces.clear();
  currentLinkedGroup = null;
  currentClickedSpace = null;
  
  const foundSpaces = [];
  
  document.querySelectorAll('.space').forEach(space => {
    const spaceText = space.textContent;
    if (spaceText.includes(wardName) || wardName.includes(spaceText.split(' ')[0])) {
      const wing = space.dataset.wing || '';
      const tower = space.dataset.tower;
      const floor = space.dataset.floor;
      const index = parseInt(space.dataset.index, 10);
      const building = parseInt(space.dataset.building || currentLeftBuilding, 10);
      
      let key;
      if (tower === 'left') {
        key = `left-${building}-${floor}-${wing}-${index}`;
      } else {
        key = `right-${floor}-${wing}-${index}`;
      }
      selectedSpaces.add(key);
      
      foundSpaces.push({ tower, building, floor, index, wing });
    }
  });
  
  // 檢查連結
  const linkedGroups = [];
  
  foundSpaces.forEach(space => {
    linkedSpaces.forEach(link => {
       if (space.tower === 'left') {
         if (link.left.some(l => l.building === space.building && l.floor === space.floor && l.index === space.index)) {
           linkedGroups.push({ link, source: space });
         }
       } else {
         if (link.right.some(r => r.floor === space.floor && r.wing === space.wing && r.index === space.index)) {
           linkedGroups.push({ link, source: space });
         }
       }
    });
  });
  
  if (linkedGroups.length > 0) {
    currentLinkedGroup = { right: [], left: [] };
    
    linkedGroups.forEach(({ link, source }) => {
       // 添加右塔連結空間
       link.right.forEach(s => {
         const exists = currentLinkedGroup.right.some(ex => ex.floor === s.floor && ex.wing === s.wing && ex.index === s.index);
         if (!exists) currentLinkedGroup.right.push(s);
         
         const key = `right-${s.floor}-${s.wing}-${s.index}`;
         selectedSpaces.add(key);
       });
       
       // 添加左塔連結空間
       link.left.forEach(s => {
         // 應用單向連結邏輯
         if (source.tower === 'left') {
            // 如果是由左塔觸發，只添加當前空間（不添加同組其他左塔空間）
            if (s.building === source.building && s.floor === source.floor && s.index === source.index) {
               const exists = currentLinkedGroup.left.some(ex => ex.building === s.building && ex.floor === s.floor && ex.index === s.index);
               if (!exists) currentLinkedGroup.left.push(s);
            }
         } else {
            // 如果是由右塔觸發，添加所有連結的左塔空間
             const exists = currentLinkedGroup.left.some(ex => ex.building === s.building && ex.floor === s.floor && ex.index === s.index);
             if (!exists) currentLinkedGroup.left.push(s);
             
             const key = `left-${s.building}-${s.floor}--${s.index}`;
             selectedSpaces.add(key);
         }
       });
    });
  }
  
  document.querySelectorAll('.ward-btn').forEach(btn => {
    if (btn.textContent === wardName) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
  updateDisplay();
  updateLinkDisplay();
}

// 切換空間選擇
function toggleSpace(tower, floor, index, buildingIndex, wing = '') {
  selectedSpaces.clear();
  currentLinkedGroup = null;
  currentClickedSpace = null;
  
  // 安全處理 buildingIndex: 確保它是數字
  let safeBuildingIndex = currentLeftBuilding;
  if (buildingIndex !== undefined && buildingIndex !== null) {
      const parsed = parseInt(buildingIndex, 10);
      if (!isNaN(parsed)) {
          safeBuildingIndex = parsed;
      }
  }
  
  const clickedSpace = { 
    tower, 
    floor: String(floor),
    index: parseInt(index, 10),
    buildingIndex: safeBuildingIndex,
    wing: wing || ''
  };
  
  console.log('toggleSpace called with:', { tower, floor, index, buildingIndex, wing });
  console.log('Resolved clickedSpace:', clickedSpace);
  
  // 自動導航：如果是左塔點擊且不在當前建築，切換建築
  if (tower === 'left' && clickedSpace.buildingIndex !== currentLeftBuilding) {
    switchLeftBuilding(clickedSpace.buildingIndex);
  }

  currentClickedSpace = clickedSpace;
  
  // 檢查連結空間
  console.log('Clicked Space:', clickedSpace);
  const linkedGroups = [];
  
  linkedSpaces.forEach(link => {
    if (tower === 'left') {
      const match = link.left.some(l => {
        // Debug logging for matching
        const bStr = String(l.building);
        const fStr = String(l.floor);
        const iStr = String(l.index);
        const cBStr = String(clickedSpace.buildingIndex);
        const cFStr = String(clickedSpace.floor);
        const cIStr = String(clickedSpace.index);
        
        const bMatch = bStr === cBStr;
        const fMatch = fStr === cFStr;
        const iMatch = iStr === cIStr;
        
        if (bMatch && fMatch && iMatch) {
            console.log('MATCH FOUND:', {
                linkLeft: l,
                clicked: clickedSpace,
                comparisons: { b: [bStr, cBStr], f: [fStr, cFStr], i: [iStr, cIStr] }
            });
        }
        
        return bMatch && fMatch && iMatch;
      });
      if (match) {
        console.log('Found link match (Left->Right):', link);
        linkedGroups.push(link);
      }
    } else {
      if (link.right.some(r => 
        String(r.floor) === String(clickedSpace.floor) && 
        (r.wing || '') === clickedSpace.wing &&
        String(r.index) === String(clickedSpace.index)
      )) {
        console.log('Found link match (Right->Left):', link);
        linkedGroups.push(link);
      }
    }
  });
  
  if (linkedGroups.length > 0) {
    currentLinkedGroup = {
      right: [],
      left: []
    };
    
    linkedGroups.forEach(group => {
      group.right.forEach(space => {
        if (!currentLinkedGroup.right.some(s => 
          s.floor === space.floor && s.wing === space.wing && s.index === space.index
        )) {
          currentLinkedGroup.right.push(space);
        }
      });
    });
    
    // 處理左塔空間（單向連結邏輯）
    if (tower === 'left') {
      // 如果點擊左塔，只顯示被點擊的左塔空間（不顯示同組的其他左塔兄弟空間）
      currentLinkedGroup.left.push({
        building: clickedSpace.buildingIndex,
        floor: clickedSpace.floor,
        index: clickedSpace.index
      });
    } else {
      // 如果點擊右塔，顯示所有連結的左塔空間
      linkedGroups.forEach(group => {
        group.left.forEach(space => {
          if (!currentLinkedGroup.left.some(s => 
            s.building === space.building &&

// 獲取空間信息
function getSpaceInfo(tower, floor, index, buildingIndex = null, wing = '') {
  if (tower === 'left') {
    const buildingIdx = buildingIndex !== null ? buildingIndex : currentLeftBuilding;
    const floors = leftBuildingsData[buildingIdx].floors;
    
    // 特殊處理 CSB 3/F
    if (floor == 3 && buildingIdx == 1) {
      const csb3FData = floors[3];
      if (csb3FData.upper && csb3FData.lower) {
        const upperCount = csb3FData.upper.length;
        if (index < upperCount) {
          const space = csb3FData.upper[index];
          return {
            name: typeof space === 'object' ? space.name : space,
            floor: floor
          };
        } else {
          const space = csb3FData.lower[index - upperCount];
          return {
            name: typeof space === 'object' ? space.name : space,
            floor: floor
          };
        }
      }
    }
    
    if (floors[floor] && floors[floor][index]) {
      const space = floors[floor][index];
      return {
        name: typeof space === 'object' ? space.name : space,
        floor: floor
      };
    }
  } else {
    const floorData = rightTowerData[floor];
    if (!floorData) return null;
    
    if (wing && floorData[wing] && floorData[wing][index]) {
      const space = floorData[wing][index];
      return {
        name: typeof space === 'object' ? space.name : space,
        floor: floor
      };
    }
  }
  return null;
}

// 更新連結顯示
function updateLinkDisplay() {
  const linkDisplay = document.getElementById('linkDisplay');
  const linkedWardsList = document.getElementById('linkedWardsList');
  const linkCount = document.getElementById('linkCount');
  
  if (!currentClickedSpace && !currentLinkedGroup) {
    linkDisplay.classList.add('empty');
    if (linkCount) linkCount.textContent = '0';
    if (linkedWardsList) linkedWardsList.innerHTML = '';
    return;
  }
  
  let linkedList = [];
  
  if (currentLinkedGroup) {
    currentLinkedGroup.left.forEach(leftSpace => {
      const spaceInfo = getSpaceInfo('left', leftSpace.floor, leftSpace.index, leftSpace.building);
      if (spaceInfo) {
        linkedList.push({
          tower: 'left',
          floor: leftSpace.floor,
          index: leftSpace.index,
          buildingIndex: leftSpace.building,
          wing: '',
          name: spaceInfo.name,
          building: leftBuildingsData[leftSpace.building].name
        });
      }
    });
    
    currentLinkedGroup.right.forEach(rightSpace => {
      const spaceInfo = getSpaceInfo('right', rightSpace.floor, rightSpace.index, null, rightSpace.wing);
      if (spaceInfo) {
        linkedList.push({
          tower: 'right',
          floor: rightSpace.floor,
          index: rightSpace.index,
          buildingIndex: null,
          wing: rightSpace.wing,
          name: spaceInfo.name,
          building: 'IPEB'
        });
      }
    });
  }
  
  if (linkedList.length === 0) {
    linkDisplay.classList.add('empty');
    if (linkCount) linkCount.textContent = '0';
    if (linkedWardsList) linkedWardsList.innerHTML = '';
    return;
  }
  
  linkDisplay.classList.remove('empty');
  linkCount.textContent = linkedList.length;
  
  linkedWardsList.innerHTML = '';
  
  const appendBuildingSection = (col, buildingName, spaces) => {
    const buildingHeader = document.createElement('div');
    buildingHeader.className = 'building-tag';
    buildingHeader.innerHTML = `<span class="building-tag-icon">🏢</span> ${buildingName}`;
    col.appendChild(buildingHeader);
    spaces.forEach(item => {
      const wardItem = document.createElement('div');
      wardItem.className = 'linked-ward-item';
      wardItem.onclick = () => {
        toggleSpace(item.tower, item.floor, item.index, item.buildingIndex, item.wing);
        scrollToSpace(item.tower, item.floor, item.index, item.buildingIndex, item.wing);
      };
      const wardInfo = document.createElement('div');
      wardInfo.className = 'ward-info';
      const location = document.createElement('div');
      location.className = 'ward-location';
      location.textContent = `${item.floor}F`;
      const name = document.createElement('div');
      name.className = 'ward-name';
      name.textContent = item.name;
      wardInfo.appendChild(location);
      wardInfo.appendChild(name);
      wardItem.appendChild(wardInfo);
      col.appendChild(wardItem);
    });
  };

  const leftByBuilding = {};
  const rightByBuilding = {};
  linkedList.forEach(item => {
    const buildingName = item.building;
    if (item.tower === 'right' || buildingName === 'IPEB') {
      if (!rightByBuilding[buildingName]) rightByBuilding[buildingName] = [];
      rightByBuilding[buildingName].push(item);
      return;
    }
    if (!leftByBuilding[buildingName]) leftByBuilding[buildingName] = [];
    leftByBuilding[buildingName].push(item);
  });

  const leftOrder = (leftBuildingsData || []).map(b => (b && b.name) ? b.name : '').filter(Boolean);
  Object.keys(leftByBuilding).forEach(name => {
    if (!leftOrder.includes(name)) leftOrder.push(name);
  });
  const leftBuildingNames = leftOrder.filter(name => Array.isArray(leftByBuilding[name]) && leftByBuilding[name].length > 0);
  const rightSpaces = rightByBuilding.IPEB || [];
  const hasRight = rightSpaces.length > 0;

  const leftColsCount = Math.min(2, leftBuildingNames.length);
  const totalCols = leftColsCount + (hasRight ? 1 : 0);
  if (totalCols > 0) {
    linkedWardsList.style.gridTemplateColumns = Array.from({ length: totalCols }).map(() => 'minmax(0, 1fr)').join(' ');
  }

  const leftCols = [];
  for (let i = 0; i < leftColsCount; i += 1) {
    const col = document.createElement('div');
    col.className = 'linked-building-column linked-left-col';
    leftCols.push(col);
    linkedWardsList.appendChild(col);
  }

  if (leftColsCount === 1) {
    leftBuildingNames.forEach(name => appendBuildingSection(leftCols[0], name, leftByBuilding[name]));
  } else if (leftColsCount === 2) {
    appendBuildingSection(leftCols[0], leftBuildingNames[0], leftByBuilding[leftBuildingNames[0]]);
    appendBuildingSection(leftCols[1], leftBuildingNames[1], leftByBuilding[leftBuildingNames[1]]);
    for (let i = 2; i < leftBuildingNames.length; i += 1) {
      const name = leftBuildingNames[i];
      appendBuildingSection(leftCols[1], name, leftByBuilding[name]);
    }
  }

  if (hasRight) {
    const rightCol = document.createElement('div');
    rightCol.className = 'linked-building-column linked-right-col';
    appendBuildingSection(rightCol, 'IPEB', rightSpaces);
    linkedWardsList.appendChild(rightCol);
  }
  applyWardFilter();
}

// 滑鼠拖拽功能
function startDrag(e) {
  if (e.button !== 0) return;
  isDragging = true;
  dragMoved = false;
  startX = e.pageX;
  startY = e.pageY;
  panStartX = panX;
  panStartY = panY;
  buildingContainer.style.cursor = 'grabbing';
}

function drag(e) {
  if (!isDragging) return;
  
  const x = e.pageX;
  const y = e.pageY;
  const dx = x - startX;
  const dy = y - startY;
  if (!dragMoved && (Math.abs(dx) + Math.abs(dy)) < 4) return;
  dragMoved = true;
  e.preventDefault();
  
  panX = panStartX + dx;
  panY = panStartY + dy;
  applyPanScale();
}

function endDrag() {
  if (dragMoved) suppressSpaceClickOnce = true;
  isDragging = false;
  buildingContainer.style.cursor = 'grab';
  forceCrispText();
}

// 觸摸設備處理
let initialDist = 0;
let initialScaleRef = 1;

function handleTouchStart(e) {
  if (e.touches.length === 1) {
    isDragging = true;
    isPinching = false;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    panStartX = panX;
    panStartY = panY;
    buildingContainer.style.cursor = 'grabbing';
    // e.preventDefault(); // Allow click/scroll if not handled? But standard is prevent for drag.
  } else if (e.touches.length === 2) {
    isDragging = false;
    isPinching = true;
    initialDist = Math.hypot(
      e.touches[0].pageX - e.touches[1].pageX,
      e.touches[0].pageY - e.touches[1].pageY
    );
    initialScaleRef = userScale;
    e.preventDefault();
  }
}

function handleTouchMove(e) {
  if (e.touches.length === 1 && isDragging) {
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - startX;
    const dy = y - startY;
    panX = panStartX + dx;
    panY = panStartY + dy;
    applyPanScale();
    e.preventDefault();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].pageX - e.touches[1].pageX,
      e.touches[0].pageY - e.touches[1].pageY
    );
    if (initialDist > 0) {
      e.preventDefault();
      const ratio = dist / initialDist;
      const newScale = initialScaleRef * ratio;
      const clamped = Math.min(Math.max(newScale, minUserScale), scaleMax);
      userScale = clamped;
      lastZoomTs = performance.now();
      scheduleFitBuildingToViewport();
    }
  }
}

function handleTouchEnd(e) {
  isDragging = false;
  buildingContainer.style.cursor = 'grab';
  if (!e || !e.touches || e.touches.length < 2) isPinching = false;
  forceCrispText();
}

  // 觸摸設備支持
  buildingContainer.addEventListener('touchstart', handleTouchStart, { passive: false });
  buildingContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
  buildingContainer.addEventListener('touchend', handleTouchEnd);
  buildingContainer.addEventListener('touchcancel', handleTouchEnd);
  
  // Trackpad / Mouse Wheel Zoom
  buildingContainer.addEventListener('wheel', function(e) {
    e.preventDefault();
    const raw = -e.deltaY * 0.001;
    const delta = Math.max(-0.12, Math.min(0.12, raw));
    if (delta !== 0) nudgeScale(delta);
  }, { passive: false });
  
  window.addEventListener('resize', function() {
    updateTopPanelSizing();
    fitBuildingToViewport();
  });
});

function updateTopPanelSizing() {
  const mainView = document.querySelector('.main-view');
  if (!mainView) return;
  const vw = mainView.clientWidth;
  const baseGap = 2;
  const baseRowH = 124;
  const baseBuildingW = 200;
  const baseDeptW = 320;
  const baseCalendarW = 210;
  const baseTotal = baseBuildingW + baseDeptW + baseCalendarW + baseGap * 2;

  const desiredWard = Math.min(640, Math.max(360, Math.floor(vw * 0.62)));
  const wardW = Math.min(vw, desiredWard);
  const scale = Math.max(0.7, Math.min(1.15, wardW / baseTotal));
  const shrink = Math.min(1, effectiveScale || 1);
  const gap = Math.max(2, Math.round(baseGap * scale));

  let buildingW = Math.max(170, Math.round(baseBuildingW * scale));
  let deptW = Math.max(220, Math.round(baseDeptW * scale));
  const maxCalendarW = Math.max(160, wardW - buildingW - deptW - gap * 2);
  let calendarW = Math.max(160, Math.round(baseCalendarW * scale));
  calendarW = Math.min(calendarW, maxCalendarW);
  const rowH = Math.max(124, Math.min(160, Math.round(baseRowH * scale)));

  mainView.style.setProperty('--top-gap', `${gap}px`);
  mainView.style.setProperty('--top-row-h', `${rowH}px`);
  mainView.style.setProperty('--top-building-w', `${buildingW}px`);
  mainView.style.setProperty('--top-dept-w', `${deptW}px`);
  mainView.style.setProperty('--top-calendar-w', `${calendarW}px`);
  mainView.style.setProperty('--top-linked-w', `${wardW}px`);
  mainView.style.setProperty('--top-linked-h', `${rowH + 35}px`);
  mainView.style.setProperty('--ui-scale', String(shrink));
  clampWardConnectionToBounds();
  clampCalendarToBounds();
}

function scheduleFitBuildingToViewport() {
  if (rafFitId) return;
  rafFitId = requestAnimationFrame(() => {
    rafFitId = 0;
    fitBuildingToViewport();
  });
}

let mcbtcRefContentW = null;
let csbBaselineContentW = null;
let csbBaselineContentH = null;
let sizingMeasureRoot = null;
function getSizingMeasureRoot() {
  if (sizingMeasureRoot) return sizingMeasureRoot;
  const el = document.createElement('div');
  el.style.position = 'absolute';
  el.style.left = '-10000px';
  el.style.top = '-10000px';
  el.style.visibility = 'hidden';
  el.style.pointerEvents = 'none';
  document.body.appendChild(el);
  sizingMeasureRoot = el;
  return sizingMeasureRoot;
}

function measureWidthForSpaceWidthClass(widthClass) {
  const root = getSizingMeasureRoot();
  const el = document.createElement('div');
  el.className = `space ${widthClass || ''}`.trim();
  root.appendChild(el);
  const w = Math.ceil(el.getBoundingClientRect().width || 0);
  root.removeChild(el);
  return w;
}

function forceCrispText() {
  const b = document.getElementById('building');
  if (!b) return;
  const prev = b.style.transformOrigin;
  b.style.transformOrigin = '0px 0px';
  void b.offsetWidth;
  b.style.transformOrigin = prev || 'top left';
}

function applyPanScale() {
  const building = document.getElementById('building');
  const scale = effectiveScale || 1;
  const dpr = window.devicePixelRatio || 1;
  const tx = Math.round(panX * dpr) / dpr;
  const ty = Math.round(panY * dpr) / dpr;
  if (building) building.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

function measureFloorNumberWidth() {
  const root = getSizingMeasureRoot();
  const el = document.createElement('div');
  el.className = 'floor-number';
  el.textContent = '19';
  root.appendChild(el);
  const w = Math.ceil(el.getBoundingClientRect().width || 0);
  root.removeChild(el);
  return w;
}

function getLeftTowerMaxRowWidth(buildingIndex) {
  const floors = (leftBuildingsData[buildingIndex] && leftBuildingsData[buildingIndex].floors) || {};
  let maxW = 0;
  Object.entries(floors).forEach(([floorKey, data]) => {
    if (floorKey === '3' && buildingIndex === 1 && data && data.upper && data.lower) {
      const upperW = (data.upper || []).reduce((sum, s) => sum + measureWidthForSpaceWidthClass(s && s.widthClass ? s.widthClass : 'normal'), 0);
      const lowerW = (data.lower || []).reduce((sum, s) => sum + measureWidthForSpaceWidthClass(s && s.widthClass ? s.widthClass : 'normal'), 0);
      maxW = Math.max(maxW, upperW, lowerW);
      return;
    }
    if (!Array.isArray(data)) return;
    if (data.length === 0) return;
    const rowW = data.reduce((sum, s) => sum + measureWidthForSpaceWidthClass(s && s.widthClass ? s.widthClass : 'normal'), 0);
    if (rowW > maxW) maxW = rowW;
  });
  return maxW;
}

function getRightTowerMaxRowWidth() {
  let maxW = 0;
  const dividerW = 1;
  Object.entries(rightTowerData || {}).forEach(([floorKey, floorData]) => {
    if (!floorData) return;
    const floorNum = parseInt(floorKey, 10);
    const hasNoDividers = !Number.isNaN(floorNum) && floorNum >= 8 && floorNum <= 19;

    const nwing = (floorData.nwing || []).filter(Boolean);
    const sewing = (floorData.sewing || []).filter(Boolean);
    const swwing = (floorData.swwing || []).filter(Boolean);

    let rowW = 0;
    nwing.forEach(s => { rowW += measureWidthForSpaceWidthClass(s && s.widthClass ? s.widthClass : 'normal'); });
    if (!hasNoDividers && rowW > 0 && sewing.length > 0) rowW += dividerW;
    sewing.forEach(s => { rowW += measureWidthForSpaceWidthClass(s && s.widthClass ? s.widthClass : 'normal'); });
    if (!hasNoDividers && rowW > 0 && swwing.length > 0) rowW += dividerW;
    swwing.forEach(s => { rowW += measureWidthForSpaceWidthClass(s && s.widthClass ? s.widthClass : 'normal'); });

    if (rowW > maxW) maxW = rowW;
  });
  return maxW;
}

function ensureMcbtcRefContentWidth() {
  if (mcbtcRefContentW) return mcbtcRefContentW;
  const leftW = getLeftTowerMaxRowWidth(1);
  const rightW = getRightTowerMaxRowWidth();
  const floorNumW = measureFloorNumberWidth();
  const gap = 8;
  mcbtcRefContentW = Math.max(1, leftW + rightW + floorNumW + gap * 2);
  return mcbtcRefContentW;
}

function ensureCsbBaselineMeasured() {
  if (csbBaselineContentW && csbBaselineContentH) return true;
  const root = getSizingMeasureRoot();
  if (!root) return false;
  const wrapper = document.createElement('div');
  const buildingEl = document.createElement('div');
  buildingEl.className = 'building';
  wrapper.appendChild(buildingEl);
  root.appendChild(wrapper);
  renderBuilding(buildingEl, 1, { update: false, setModeIndicatorId: false });
  csbBaselineContentW = buildingEl.scrollWidth || csbBaselineContentW;
  csbBaselineContentH = buildingEl.scrollHeight || csbBaselineContentH;
  root.removeChild(wrapper);
  return !!(csbBaselineContentW && csbBaselineContentH);
}

function fitBuildingToViewport() {
  const container = document.getElementById('buildingContainer');
  const building = document.getElementById('building');
  if (!container || !building) return;
  const now = performance.now();
  const zooming = isPinching || (now - lastZoomTs < 160);
  const availW = container.clientWidth - 8;
  const availH = container.clientHeight - 8;
  const contentW = building.scrollWidth;
  const contentH = building.scrollHeight;
  if (contentW === 0 || contentH === 0) return;
  const isMcbtc = currentLeftBuilding === 0;
  const isCsb = currentLeftBuilding === 1;
  if (isCsb) {
    csbBaselineContentW = contentW;
    csbBaselineContentH = contentH;
  }

  let refW = contentW;
  let refH = contentH;
  if (isMcbtc) {
    if (!csbBaselineContentW || !csbBaselineContentH) ensureCsbBaselineMeasured();
    if (csbBaselineContentW && csbBaselineContentH) {
      refW = csbBaselineContentW;
      refH = csbBaselineContentH;
    } else {
      refW = ensureMcbtcRefContentWidth();
    }
  }

  const autoScaleW = availW / refW;
  const autoScaleH = availH / refH;
  const autoScale = Math.min(autoScaleW, autoScaleH);
  const effective = Math.min(autoScale * userScale, scaleMax);
  effectiveScale = effective;
  updateTopPanelSizing();
  applyPanScale();
  forceCrispText();
  const scaledActualW = building.getBoundingClientRect().width;
  const fits = scaledActualW <= container.clientWidth + 0.5;
  container.style.justifyContent = isMcbtc ? 'flex-start' : (fits ? 'flex-start' : 'center');
  if (fits) {
    if (!zooming) container.scrollLeft = 0;
    if (!isDragging && !zooming) {
      requestAnimationFrame(isMcbtc ? alignMcbtcToReference : alignBuildingToReference);
    }
    return;
  }
  if (!isDragging && !zooming) {
    if (!isMcbtc) requestAnimationFrame(centerUsingBaseline);
    requestAnimationFrame(isMcbtc ? alignMcbtcToReference : alignBuildingToReference);
  }
}

function alignMcbtcToReference() {
  if (currentLeftBuilding !== 0) return;
  const container = document.getElementById('buildingContainer');
  const building = document.getElementById('building');
  const topBelowRow = document.querySelector('.top-below-row');
  if (!container || !building || !topBelowRow) return;

  const preferredFloors = ['11', '12', '10', '9', '8', '7', '6'];
  const nums = building.querySelectorAll('.floor-number');
  let row = null;
  for (let i = 0; i < preferredFloors.length; i += 1) {
    const floor = preferredFloors[i];
    for (let j = 0; j < nums.length; j += 1) {
      const el = nums[j];
      if ((el.textContent || '').trim() === floor) {
        row = el.closest('.floor-row');
        break;
      }
    }
    if (row) break;
  }
  if (!row) return;

  const refRect = topBelowRow.getBoundingClientRect();
  const rowRect = row.getBoundingClientRect();
  const delta = rowRect.top - (refRect.bottom + 20);
  if (!Number.isFinite(delta) || Math.abs(delta) < 1) return;
  const scale = effectiveScale || 1;
  const deltaScroll = delta / scale;
  const maxScroll = Math.max(0, container.scrollHeight - container.clientHeight);
  const next = Math.max(0, Math.min(container.scrollTop + deltaScroll, maxScroll));
  container.scrollTop = next;
}

function alignBuildingToReference() {
  if (currentLeftBuilding !== 1) return;
  const container = document.getElementById('buildingContainer');
  const topBelowRow = document.querySelector('.top-below-row');
  if (!container || !topBelowRow) return;

  const space = document.querySelector('.space[data-tower="left"][data-building="1"][data-floor="11"]');
  if (!space) return;
  const row = space.closest('.floor-row');
  if (!row) return;

  const rowRect = row.getBoundingClientRect();
  const refRect = topBelowRow.getBoundingClientRect();
  const delta = rowRect.top - (refRect.bottom + 20);
  if (!Number.isFinite(delta) || Math.abs(delta) < 1) return;

  const maxScroll = Math.max(0, container.scrollHeight - container.clientHeight);
  const next = Math.max(0, Math.min(container.scrollTop + delta, maxScroll));
  container.scrollTop = next;
}

function getFloorColumnAvgX() {
  const container = document.getElementById('buildingContainer');
  const building = document.getElementById('building');
  if (!container || !building) return;
  const nums = building.querySelectorAll('.floor-number');
  if (!nums || nums.length === 0) return;
  let sum = 0;
  let count = 0;
  let width = nums[0].offsetWidth || 0;
  nums.forEach(el => {
    const x = el.offsetLeft;
    if (typeof x === 'number') {
      sum += x;
      count += 1;
      width = el.offsetWidth || width;
    }
  });
  if (count === 0) return null;
  return { avgX: sum / count, width };
}

function centerUsingBaseline() {
  const container = document.getElementById('buildingContainer');
  const building = document.getElementById('building');
  if (!container || !building) return;
  const info = getFloorColumnAvgX();
  if (!info) return;
  const targetX = info.avgX;
  const scale = effectiveScale || 1;
  const halfViewportInContentUnits = container.clientWidth / (2 * scale);
  const maxScroll = Math.max(0, (building.scrollWidth - container.clientWidth));
  const desired = Math.max(0, Math.min(targetX - halfViewportInContentUnits + (info.width || 0) / 2, maxScroll));
  container.scrollLeft = Math.floor(desired);
}

function nudgeScale(delta) {
  userScale = Math.min(Math.max(userScale + delta, minUserScale), scaleMax);
  lastZoomTs = performance.now();
  const slider = document.getElementById('scaleSlider');
  const valueEl = document.getElementById('scaleValue');
  if (slider) slider.value = String(userScale);
  if (valueEl) valueEl.textContent = userScale.toFixed(2) + '×';
  scheduleFitBuildingToViewport();
}
</script>
