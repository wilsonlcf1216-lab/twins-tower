<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>雙塔建築視覺化系統 4.0 - CSB 3/F 分層版本</title>
<style>
:root {
  /* Building Colors */
  --color-ipeb: #E6E6FA; /* Lavender */
  --color-ipeb-border: #9370DB; /* MediumPurple */
  --color-mcbtc: #FFC0CB; /* Pink */
  --color-mcbtc-border: #FF69B4; /* HotPink */
  --color-mcbtc2030: #FFE0B2; /* Orange (Light) */
  --color-mcbtc2030-border: #FF8C00; /* Orange (Dark) */
  --color-csb: #FFFACD; /* LemonChiffon */
  --color-csb-border: #F0E68C; /* Khaki */
  --color-dtb: #E0FFFF; /* LightCyan */
  --color-dtb-border: #87CEEB; /* SkyBlue */
  --color-sb: #F0FFF0; /* Honeydew */
  --color-sb-border: #90EE90; /* LightGreen */
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', 'Helvetica Neue', Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 15px;
  overflow: hidden;
  touch-action: none;
}

:root {
  --top-gap: 2px;
  --top-row-h: 124px;
  --top-control-h: 40px;
  --top-building-w: 200px;
  --top-dept-w: 320px;
  --top-calendar-w: 210px;
  --top-search-w: 200px;
  --top-linked-w: 552px;
  --top-linked-h: 159px;
  --ui-scale: 1;
}

#twintower-app.container {
  display: flex;
  gap: 15px;
  width: 100%;
  max-width: none !important;
  margin: 0 auto;
  height: calc(100vh - 30px);
  flex-wrap: nowrap;
  padding-left: 0 !important;
  padding-right: 0 !important;
}

#twintower-app .building {
  display: flex !important;
  flex-direction: column !important;
  float: none !important;
}

#twintower-app .floor-row {
  display: flex !important;
  float: none !important;
  clear: both !important;
}

#twintower-app .tower {
  display: flex !important;
  flex-direction: column !important;
  float: none !important;
  visibility: visible !important;
}

#twintower-app .tower.left,
#twintower-app .tower.right {
  display: flex !important;
  float: none !important;
  visibility: visible !important;
}

#twintower-app .space-row,
#twintower-app .csb-3f-row,
#twintower-app .left-row-wrapper,
#twintower-app .right-row-wrapper {
  display: flex !important;
  float: none !important;
  visibility: visible !important;
}

.control-panel {
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  width: 280px;
  transition: all 0.3s ease;
  position: relative;
  overflow-y: auto;
  flex-shrink: 0;
  max-height: 100%;
}

.control-panel.collapsed {
  width: 50px;
  padding: 20px 10px;
}

.control-panel.collapsed .panel-content {
  display: none;
}

.toggle-btn {
  position: absolute;
  right: 10px;
  top: 10px;
  background: #667eea;
  color: white;
  border: none;
  width: 30px;
  height: 30px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s ease;
  z-index: 100;
}

.toggle-btn:hover {
  background: #5568d3;
  transform: scale(1.1);
}

h2 {
  color: #667eea;
  margin-bottom: 8px;
  font-size: 16px;
  border-bottom: 3px solid #667eea;
  padding-bottom: 4px;
}

.control-section {
  margin-bottom: 5px;
}

.control-section h3 {
  color: #764ba2;
  font-size: 12px;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.building-selector {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 8px;
}

.building-btn {
  padding: 8px;
  border: 2px solid #667eea;
  background: white;
  color: #667eea;
  border-radius: 8px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  transition: all 0.3s ease;
  text-align: left;
  line-height: 1.2;
}

.building-btn:hover {
  background: #667eea;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(102,126,234,0.3);
}

.building-btn.active {
  background: #764ba2;
  border-color: #764ba2;
  color: white;
}

.building-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.button-group {
  display: flex;
  gap: 6px;
  justify-content: space-between;
}

.button-group .control-btn {
  flex: 1;
}

.control-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px;
  align-items: center;
  margin-top: 4px;
}

.range-input {
  width: 100%;
  accent-color: #667eea;
}

.select-input {
  padding: 6px;
  border: 2px solid var(--brand1);
  border-radius: 8px;
  font-size: 10px;
  color: var(--brand1);
  background: white;
}
.control-btn {
  padding: 8px 6px;
  border: 2px solid #667eea;
  background: white;
  color: #667eea;
  border-radius: 8px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.control-btn:hover {
  background: #667eea;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(102,126,234,0.3);
}

.control-btn.active {
  background: #667eea;
  border-color: #667eea;
  color: white;
}

.dept-btn {
  padding: 8px;
  border: 2px solid #28a745;
  background: white;
  color: #28a745;
  border-radius: 8px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  transition: all 0.3s ease;
  margin-bottom: 5px;
}

.dept-group {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
}

.dept-list {
  display: none;
  margin-top: 6px;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  width: 100%;
}

.dept-item {
  padding: 4px 6px;
  border: 2px solid #28a745;
  background: white;
  color: #28a745;
  border-radius: 8px;
  cursor: pointer;
  font-size: 9px;
  font-weight: 600;
  text-align: center;
  min-height: 24px;
  height: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 0;
  max-width: 100%;
  overflow: hidden;
  white-space: normal;
  overflow-wrap: anywhere;
  line-height: 1.05;
}

.dept-item.active {
  background: #28a745;
  border-color: #28a745;
  color: white;
}

.dept-btn:hover {
  background: #28a745;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(40,167,69,0.3);
}

.dept-btn.active {
  background: #28a745;
  border-color: #28a745;
  color: white;
}

.dept-group .dept-btn {
  padding: 4px 8px;
  font-size: 9px;
  height: 24px;
  border-radius: 6px;
}

.ward-btn {
  padding: 4px 6px;
  border: 2px solid #ffc107;
  background: white;
  color: #856404;
  border-radius: 6px;
  cursor: pointer;
  font-size: 9px;
  font-weight: 600;
  transition: all 0.3s ease;
  margin: 1px;
  height: 24px;
  display: inline-flex;
  box-sizing: border-box;
  min-width: 0;
  max-width: 100%;
  overflow: hidden;
  align-items: center;
  justify-content: center;
  text-align: center;
  white-space: nowrap;
  text-overflow: ellipsis;
  line-height: 1;
  width: 100%;
  min-width: 0;
  max-width: 100%;
}

.ward-btn.ward-btn-fit-wide {
  grid-column: span 2;
}

.ward-btn.ward-btn-force-single-line {
  grid-column: span 2;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.ward-btn.ward-btn-fit-two-line {
  justify-content: center;
  text-align: center;
  white-space: normal;
  overflow: hidden;
  overflow-wrap: anywhere;
  text-overflow: clip;
  line-height: 1.05;
  height: 32px;
  min-height: 32px;
  padding: 2px 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.ward-btn:hover {
  background: #ffc107;
  color: #856404;
  transform: scale(1.05);
}

.ward-btn.active {
  background: #ffc107;
  border-color: #ffc107;
  color: #856404;
  font-weight: bold;
}

.ward-building-row {
  display: flex;
  align-items: flex-start;
  gap: 4px;
  margin: 2px 0;
}

.ward-building-row .dept-item {
  flex: 0 0 auto;
  min-width: 64px;
}

.ward-building-label {
  width: auto;
  font-weight: bold;
  color: #667eea;
  font-size: 10px;
  text-align: left;
  flex-shrink: 0;
  margin: 2px 0;
}

.ward-items-grid {
  display: grid;
  grid-template-columns: repeat(var(--ward-grid-cols, 4), minmax(0, 1fr));
  justify-items: stretch;
  align-items: start;
  gap: 2px;
  width: 100%;
  padding-left: 0;
  margin-left: 0;
}

.ward-items-grid.ward-items-grid-2col {
  grid-template-columns: repeat(var(--ward-grid-cols, 4), minmax(0, 1fr));
}

.ward-items-grid.ward-items-grid-day {
  grid-template-columns: repeat(var(--ward-grid-cols, 4), minmax(0, 1fr));
  gap: 2px;
}

.ward-btn.ward-btn-day {
  justify-content: center;
  text-align: center;
  white-space: normal;
  overflow: hidden;
  height: 24px;
  padding: 2px 4px;
  font-size: 8px;
  line-height: 1.05;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.ward-btn.ward-btn-day:hover {
  transform: none;
}

.ward-items-container.ward-buildings-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px 8px;
  align-content: start;
}

.ward-items-container.ward-buildings-grid.single-col {
  grid-template-columns: minmax(0, 1fr);
}

.ward-building-block {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.ward-building-block.span-2 {
  grid-column: 1 / -1;
}

.ward-empty {
  font-size: 10px;
  color: #777;
  text-align: center;
  padding: 4px 2px;
}

.ward-items-container {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.dept-search-results {
  display: none;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 6px;
  background: #fff;
  max-height: 140px;
  overflow-x: hidden;
  overflow-y: scroll;
  scrollbar-gutter: stable;
}

.dept-search-header {
  font-weight: 700;
  font-size: 10px;
  color: #764ba2;
  margin: 2px 0;
}

.dept-search-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 4px 6px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid transparent;
  font-size: 10px;
}

.dept-search-item .label {
  flex: 1 1 auto;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.dept-search-item .meta {
  flex: 0 0 auto;
  max-width: 46%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.dept-search-item:hover {
  background: rgba(102,126,234,0.08);
  border-color: rgba(102,126,234,0.25);
}

.space.flash-red::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  animation: flash-red 2s ease-in-out;
}

@keyframes flash-red {
  0% { box-shadow: inset 0 0 0 0 rgba(255, 59, 48, 0); }
  10% { box-shadow: inset 0 0 0 2px rgba(255, 59, 48, 0.95), inset 0 0 0 4px rgba(255, 59, 48, 0.45); }
  100% { box-shadow: inset 0 0 0 0 rgba(255, 59, 48, 0); }
}

.private-ward-info-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 4500;
}

.private-ward-info-modal.visible {
  display: flex;
}

.private-ward-info-box {
  background: white;
  color: #222;
  padding: 0;
  border-radius: 16px;
  max-width: min(92vw, 820px);
  box-shadow: 0 18px 60px rgba(0,0,0,0.35);
  user-select: none;
  overflow: hidden;
}

.private-ward-card-header {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.private-ward-card-title {
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.2px;
}

.private-ward-card-hint {
  font-size: 11px;
  opacity: 0.9;
  white-space: nowrap;
}

.private-ward-card-body {
  padding: 12px 14px 14px;
}

.private-ward-card-summary {
  font-size: 13px;
  font-weight: 700;
  color: #333;
  margin-bottom: 10px;
}

.private-ward-flow {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.private-ward-step {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(102,126,234,0.08);
  border: 1px solid rgba(102,126,234,0.18);
}

.private-ward-year {
  flex: 0 0 auto;
  background: rgba(102,126,234,0.95);
  color: white;
  border-radius: 999px;
  padding: 2px 10px;
  font-size: 12px;
  font-weight: 800;
  line-height: 18px;
  min-width: 54px;
  text-align: center;
}

.private-ward-dest {
  flex: 1 1 auto;
  min-width: 0;
}

.private-ward-dest .label {
  font-size: 11px;
  font-weight: 800;
  color: #667eea;
  margin-bottom: 2px;
}

.private-ward-dest .value {
  font-size: 13px;
  font-weight: 800;
  color: #222;
  word-break: break-word;
}

.private-ward-dest .value + .value {
  margin-top: 4px;
}

.private-ward-arrow {
  height: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(102,126,234,0.9);
  font-weight: 900;
  letter-spacing: 1px;
}

.dept-search-item .meta {
  font-size: 9px;
  color: #667eea;
  white-space: nowrap;
  flex-shrink: 0;
}

.link-display {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 8px;
  border-radius: 10px;
  margin-top: 15px;
  overflow-y: auto;
  max-height: none;
  min-height: 50px;
}

.link-display h4 {
  font-size: 14px;
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 2px solid rgba(255,255,255,0.3);
}

#linkedWardsList {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: var(--top-gap);
  align-items: start;
  overflow-x: auto;
}

.linked-side-divider {
  border-left: 2px solid rgba(255,255,255,0.35);
  padding-left: 8px;
}

.linked-side {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: var(--top-gap);
}

.linked-building-column {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.linked-building-column .building-tag {
  margin-bottom: 2px;
}

.link-display.empty {
  opacity: 0.35;
}

.linked-ward-item {
  background: rgba(255,255,255,0.15);
  padding: 4px 6px;
  margin: 0;
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  font-size: 11px;
  line-height: 1.15;
  border: 1px solid transparent;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 22px;
}

.linked-ward-item:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.95);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.95);
}

.linked-ward-item .ward-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}

.linked-ward-item .ward-location {
  font-weight: bold;
  color: #ffd700;
  font-size: 10px;
  white-space: nowrap;
  padding-right: 6px;
  flex-shrink: 0;
}

.linked-ward-item .ward-name {
  color: white;
  font-size: 10px;
  text-align: right;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-left: 4px;
}

.link-count {
  display: inline-block;
  background: rgba(255,255,255,0.3);
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 10px;
  margin-left: 5px;
}

.building-tag {
  font-weight: bold;
  color: #ffd700;
  font-size: 10px;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 1px 0;
}

.linked-column-header {
  font-size: 11px;
  line-height: 1.2;
  min-height: 20px;
  margin: 0 0 4px;
  padding: 2px 0;
}

.building-tag-icon {
  font-size: 8px;
  background: rgba(255,255,255,0.2);
  padding: 1px 3px;
  border-radius: 2px;
  flex-shrink: 0;
}

.main-view {
  flex: 1;
  background: transparent;
  border-radius: 15px;
  padding: 6px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
}

.main-view.compact-layout .top-search-floating {
  position: sticky;
  top: 0;
  left: 0;
  right: 0;
  z-index: 600;
  max-width: 100%;
  transform: none;
  transform-origin: top left;
  flex-wrap: wrap;
}

.main-view.compact-layout .building-container {
  display: block !important;
}

.main-view.compact-layout .top-search-tools {
  display: flex;
}

.main-view.compact-layout #topDeptPanel {
  display: flex !important;
  flex: 1 1 100%;
  width: 100%;
}

.main-view.compact-layout .top-search-box {
  width: 100%;
}

.main-view.compact-layout .top-exceptional-panel {
  width: 100%;
  flex: 1 1 100%;
  max-height: none;
}

.main-view.compact-layout .top-filter-input {
  font-size: 16px;
}

.main-view.compact-layout .top-search-box .dept-search-results {
  max-height: min(70vh, 420px);
  z-index: 6000;
}

.main-view.compact-layout .timeline-top-row {
  flex: 1 1 auto;
  min-height: 0;
  margin-top: 8px;
  flex-direction: column;
  height: auto;
}

.main-view.compact-layout .top-left-group {
  display: flex;
  width: 100%;
  flex: 1 1 100%;
  flex-direction: column;
  height: auto;
}

.main-view.compact-layout .top-panel,
.main-view.compact-layout .top-linked-panel,
.main-view.compact-layout .top-building-panel,
.main-view.compact-layout .top-dept-panel,
.main-view.compact-layout .top-calendar-panel,
.main-view.compact-layout .top-search-panel {
  width: 100%;
  flex: 0 0 auto;
  height: auto;
}

.main-view.compact-layout .top-calendar-panel {
  flex: 1 1 auto;
  min-height: 0;
}

.main-view.compact-layout .top-below-row {
  flex: 1 1 auto;
  min-height: 0;
  margin-top: 8px;
}

.main-view.compact-layout .top-below-row .top-linked-panel {
  height: 100%;
}

/* Only for intranet/embedded compact layout: restore department item look
   without affecting blank web mode. */
.main-view.compact-layout #topDeptPanel.top-panel {
  min-height: var(--top-control-h) !important;
  height: var(--top-control-h) !important;
  padding: 2px 4px !important;
  gap: 0 !important;
}

.main-view.compact-layout #topDeptPanel.top-panel.expanded {
  height: auto !important;
}

.main-view.compact-layout #topDeptPanel .top-dept-body {
  flex: 1 !important;
  min-height: 0 !important;
  overflow: visible !important;
  display: flex !important;
  flex-direction: column !important;
  gap: 0 !important;
}

.main-view.compact-layout #topDeptPanel #deptButtons {
  flex: 1 !important;
  min-height: 0 !important;
  overflow: visible !important;
  display: grid !important;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) !important;
  gap: 4px !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;

function createEmptyDeptCatalog() {
  return { clinical: {}, nonClinical: {} };
}

function normalizeMenuBuildingKey(value) {
  const key = String(value || '').trim().toUpperCase();
  if (key === 'MCBTC2030') return 'MCBTC2030';
  if (key === 'DTB' || key === 'HKLM') return 'HKLM';
  if (key === 'SB' || key === 'EF') return 'EF';
  if (key === 'CSB') return 'CSB';
  return 'MCBTC';
}

function normalizeMenuSide(value) {
  return String(value || '').trim().toLowerCase() === 'neutral' ? 'nonClinical' : 'clinical';
}

function normalizeMenuType(value) {
  return String(value || '').trim().toLowerCase() === 'ward' ? 'ward' : 'day';
}

function normalizeMenuDepartment(value) {
  const dept = String(value || '').trim();
  const upper = dept.toUpperCase();
  if (upper === 'SUR' || upper === 'SURG') return 'SURG';
  if (upper === 'PRIVATE') return 'PRIVATE';
  return dept;
}

function getMenuItemLabel(item) {
  return item && typeof item === 'object' ? String(item.display || '') : String(item || '');
}

function getMenuItemKey(item, buildingKey = '') {
  if (item && typeof item === 'object') return String(item.key || '');
  return `${String(buildingKey || '')}::${String(item || '')}`;
}

function getMenuBuildingLabel(buildingKey) {
  const key = String(buildingKey || '').toUpperCase();
  if (key === 'MCBTC2030') return 'MCBTC2030';
  if (key === 'HKLM') return 'DTB(HKLM)';
  if (key === 'EF') return 'SB(EF)';
  return key;
}

function pushMenuItem(arr, item) {
  if (!Array.isArray(arr)) return;
  const key = getMenuItemKey(item, item && item.buildingKey);
  if (!arr.some((existing) => getMenuItemKey(existing, existing && existing.buildingKey) === key)) {
    arr.push(item);
  }
}

function buildLeftLinkAvailability() {
  const out = new Map();
  const mark = (building, floor, index, target) => {
    const key = `${Number(building)}|${String(floor)}|${Number(index)}`;
    if (!out.has(key)) out.set(key, { ipeb: false, mcbtc2030: false });
    out.get(key)[target] = true;
  };

  (linkedSpaces || []).forEach((group) => {
    (group.left || []).forEach((left) => {
      mark(left.building, left.floor, left.index, 'ipeb');
    });
  });

  (mcbtc2030Links || []).forEach((group) => {
    (group.left || []).forEach((left) => {
      const building = Number(left.building);
      if (building >= 0 && building <= 3) {
        mark(left.building, left.floor, left.index, 'mcbtc2030');
      }
    });
  });

  (exceptionalCaseMigrations || []).forEach((migration) => {
    const hasMcbtc2030Move = (migration.moves || []).some((move) =>
      (move.destinations || []).some((dest) => /^MCBTC2030\b/i.test(String(dest || '').trim()))
    );
    const hasLegacyMove = (migration.moves || []).some((move) =>
      (move.destinations || []).some((dest) => !/^MCBTC2030\b/i.test(String(dest || '').trim()))
    );
    (migration.triggers || []).forEach((trigger) => {
      if (String(trigger.tower || '') !== 'left') return;
      if (hasMcbtc2030Move) {
        mark(trigger.buildingIndex, trigger.floor, trigger.index, 'mcbtc2030');
      }
      if (hasLegacyMove) {
        mark(trigger.buildingIndex, trigger.floor, trigger.index, 'ipeb');
      }
    });
  });

  return out;
}

function insertMenuRow(catalog, row) {
  const side = normalizeMenuSide(row.side);
  const buildingKey = normalizeMenuBuildingKey(row.building);
  const deptKey = normalizeMenuDepartment(row.department);
  const subDepartment = String(row.subDepartment || '').trim();
  const itemTower = String(row.tower || 'left').trim().toLowerCase();
  const itemIndex = Number(row.index);
  const item = {
    key: `${itemTower}|${buildingKey}|${row.floor}|${row.order}|${row.display}|${deptKey}|${subDepartment}|${String(row.wing || '')}|${Number.isFinite(itemIndex) ? itemIndex : ''}`,
    buildingKey,
    floor: String(row.floor),
    order: Number(row.order),
    sourceName: String(row.sourceName || ''),
    display: String(row.display || ''),
    department: deptKey,
    subDepartment,
    tower: itemTower,
    wing: String(row.wing || ''),
    index: Number.isFinite(itemIndex) ? itemIndex : null
  };

  if (!deptKey) return;

  if (!catalog[side][deptKey]) catalog[side][deptKey] = {};
  const deptData = catalog[side][deptKey];

  if (side === 'clinical') {
    const cat = normalizeMenuType(row.type);
    if (!deptData[cat]) deptData[cat] = {};
    if (!deptData[cat][buildingKey]) deptData[cat][buildingKey] = [];
    pushMenuItem(deptData[cat][buildingKey], item);
    return;
  }

  if (subDepartment) {
    if (!deptData.groups) deptData.groups = {};
    if (!deptData.groups[subDepartment]) deptData.groups[subDepartment] = { direct: {} };
    if (!deptData.groups[subDepartment].direct[buildingKey]) deptData.groups[subDepartment].direct[buildingKey] = [];
    pushMenuItem(deptData.groups[subDepartment].direct[buildingKey], item);
    return;
  }

  if (!deptData.direct) deptData.direct = {};
  if (!deptData.direct[buildingKey]) deptData.direct[buildingKey] = [];
  pushMenuItem(deptData.direct[buildingKey], item);
}

function rebuildDeptCatalog() {
  const sourceRows = Array.isArray(window.leftMenuSourceRows) ? window.leftMenuSourceRows : [];
  const ipebSourceRows = Array.isArray(window.ipebMenuSourceRows) ? window.ipebMenuSourceRows : [];
  const mcbtc2030SourceRows = Array.isArray(window.mcbtc2030MenuSourceRows) ? window.mcbtc2030MenuSourceRows : [];
  const availability = buildLeftLinkAvailability();
  const ipebOverrides = new Set(
    ipebSourceRows
      .filter((row) => row && row.replaceLeftSource)
      .map((row) => `${normalizeMenuDepartment(row.department)}|${String(row.sourceName || '').trim()}`)
  );
  const mcbtc2030Overrides = new Set(
    mcbtc2030SourceRows
      .filter((row) => row && row.replaceLeftSource)
      .map((row) => `${normalizeMenuDepartment(row.department)}|${String(row.sourceName || '').trim()}`)
  );
  const out = {
    ipeb: createEmptyDeptCatalog(),
    mcbtc2030: createEmptyDeptCatalog()
  };

  sourceRows.forEach((row) => {
    const buildingKey = normalizeMenuBuildingKey(row.building);
    const buildingIndex = buildingMap[buildingKey];
    if (!Number.isFinite(buildingIndex)) return;
    const order = Number(row.order);
    if (!Number.isFinite(order) || order < 1) return;
    const linkKey = `${buildingIndex}|${String(row.floor)}|${order - 1}`;
    const flags = availability.get(linkKey);
    if (!flags) return;
    if (flags.ipeb) {
      const sourceKey = `${normalizeMenuDepartment(row.department)}|${String(row.sourceName || '').trim()}`;
      if (!ipebOverrides.has(sourceKey)) {
        insertMenuRow(out.ipeb, row);
      }
    }
    if (flags.mcbtc2030) {
      const sourceKey = `${normalizeMenuDepartment(row.department)}|${String(row.sourceName || '').trim()}`;
      if (!mcbtc2030Overrides.has(sourceKey)) {
        insertMenuRow(out.mcbtc2030, row);
      }
    }
  });

  ipebSourceRows.forEach((row) => {
    if (row && row.remove) return;
    insertMenuRow(out.ipeb, row);
  });

  mcbtc2030SourceRows.forEach((row) => {
    insertMenuRow(out.mcbtc2030, row);
  });

  deptCatalogByTarget = out;
  deptCatalog = deptCatalogByTarget[currentDeptTarget] || createEmptyDeptCatalog();
}

function getExceptionalCaseMigration(space) {
  return exceptionalCaseMigrations.find((item) =>
    item.triggers.some((trigger) => {
      if (trigger.tower !== space.tower) return false;
      if (String(trigger.floor) !== String(space.floor)) return false;
      if (Number(trigger.index) !== Number(space.index)) return false;
      if (space.tower === 'left') {
        return Number(trigger.buildingIndex) === Number(space.buildingIndex);
      }
      return String(trigger.wing || '') === String(space.wing || '');
    })
  ) || null;
}

function showExceptionalCaseInfo(migration) {
  if (!migration || !privateWardInfoModal || !privateWardInfoBox) return;

          </div>
        </div>
        ${idx < migration.moves.length - 1 ? '<div class="private-ward-arrow">↓</div>' : ''}

}

const normalizeExceptionalText = (() => {
  try {
    new RegExp('[^\\p{L}\\p{N}]+', 'gu');
    return (s) => String(s || '').toLowerCase().replace(/[^\p{L}\p{N}]+/gu, '');
  } catch (e) {
    return (s) => String(s || '').toLowerCase().replace(/[^a-z0-9\u00C0-\uFFFF]+/g, '');
  }
})();

function parseExceptionalDestination(dest) {
  const text = String(dest || '').trim();
  const match = text.match(/^(MCBTC2030|IPEB|MCBTC|CSB|DTB|SB)\s+([^/\s]+)\/F\s+(.+)$/i);
  if (!match) return null;
  return {
    tower: match[1].toUpperCase(),
    floor: String(match[2]),
    name: String(match[3] || '').trim()
  };
}

function findLeftSpaceRef(buildingName, floor, spaceName) {
  const normalizedBuilding = normalizeMenuBuildingKey(buildingName);
  const buildingIndex = buildingMap[normalizedBuilding];
  if (!Number.isFinite(buildingIndex)) return null;
  const floors = leftBuildingsData[buildingIndex] && leftBuildingsData[buildingIndex].floors;
  if (!floors) return null;
  const floorData = floors[String(floor)] || floors[floor];
  if (!floorData) return null;
  const wanted = normalizeExceptionalText(spaceName);
  const makeItem = (idx, raw) => ({
    tower: 'left',
    floor: String(floor),
    index: idx,
    buildingIndex,
    wing: '',
    name: typeof raw === 'object' ? String(raw.name || '') : String(raw || ''),
    building: leftBuildingsData[buildingIndex].name
  });
  if (buildingIndex === 1 && String(floor) === '3' && floorData.upper && floorData.lower) {
    const upper = floorData.upper || [];
    const lower = floorData.lower || [];
    for (let i = 0; i < upper.length; i += 1) {
      const item = makeItem(i, upper[i]);
      if (normalizeExceptionalText(item.name) === wanted) return item;
    }
    for (let i = 0; i < lower.length; i += 1) {
      const item = makeItem((upper.length || 0) + i, lower[i]);
      if (normalizeExceptionalText(item.name) === wanted) return item;
    }
    return null;
  }
  for (let i = 0; i < floorData.length; i += 1) {
    const item = makeItem(i, floorData[i]);
    if (normalizeExceptionalText(item.name) === wanted) return item;
  }
  return null;
}

function findRightSpaceRef(towerName, floor, spaceName) {
  const wanted = normalizeExceptionalText(spaceName);
  if (String(towerName || '').toUpperCase() === 'MCBTC2030') {
    const floorData = mcbtc2030Floors[String(floor)] || mcbtc2030Floors[floor];
    if (!Array.isArray(floorData)) return null;
    for (let i = 0; i < floorData.length; i += 1) {
      const raw = floorData[i];
      const name = typeof raw === 'object' ? String(raw.name || '') : String(raw || '');
      if (normalizeExceptionalText(name) === wanted) {
        return {
          tower: 'right',
          floor: String(floor),
          index: i,
          buildingIndex: null,
          wing: 'mcbtc2030',
          name,
          building: 'MCBTC2030'
        };
      }
    }
    return null;
  }
  const floorData = rightTowerData[String(floor)] || rightTowerData[floor];
  if (!floorData || typeof floorData !== 'object') return null;
  for (const wingKey of ['nwing', 'sewing', 'swwing']) {
    const wingItems = floorData[wingKey];
    if (!Array.isArray(wingItems)) continue;
    for (let i = 0; i < wingItems.length; i += 1) {
      const raw = wingItems[i];
      const name = typeof raw === 'object' ? String(raw.name || '') : String(raw || '');
      if (normalizeExceptionalText(name) === wanted) {
        return {
          tower: 'right',
          floor: String(floor),
          index: i,
          buildingIndex: null,
          wing: wingKey,
          name,
          building: 'IPEB'
        };
      }
    }
  }
  return null;
}

function resolveExceptionalDestination(dest) {
  const parsed = parseExceptionalDestination(dest);
  if (!parsed) {
    return {
      item: null,
      raw: String(dest || '').trim()
    };
  }
  if (parsed.tower === 'IPEB' || parsed.tower === 'MCBTC2030') {
    return {
      item: findRightSpaceRef(parsed.tower, parsed.floor, parsed.name),
      raw: String(dest || '').trim()
    };
  }
  return {
    item: findLeftSpaceRef(parsed.tower, parsed.floor, parsed.name),
    raw: String(dest || '').trim()
  };
}

function getExceptionalListGroupKey(migration, move) {
  const year = String(move && move.year || '').trim();
  if (year === '2030') return 'mcbtc2030';
  return 'ipeb';
}

function getExceptionalListEntryLabel(migration, move) {
  const title = String(migration && migration.title || '').trim();
  const year = String(move && move.year || '').trim();
  const special2027Titles = new Set([
    'PRIVATE WARD 搬遷記錄',
    'BURNS CENTRE 搬遷記錄',
    'SKIN BANK 搬遷記錄',
    '4B INTEGRATED WARD 搬遷記錄',
    'DEPT OF A&IC, CUHK 搬遷記錄'
  ]);
  if (title === 'SPIRITUAL 搬遷記錄' && year === '2027') {
    return '4F Spiritual (Block B,SQ North)';
  }
  if (special2027Titles.has(title) && year === '2027') {
    return String(migration && migration.from || '').trim();
  }
  if (title === 'PRIVATE WARD 搬遷記錄' && year === '2027') {
    return 'MCBTC 6/F Private Ward';
  }
  if (title === 'PRIVATE WARD 搬遷記錄' && year === '2030') {
    return 'SB 9/F 9E Private Ward';
  }
  const destinations = Array.isArray(move && move.destinations) ? move.destinations.map((dest) => String(dest || '').trim()).filter(Boolean) : [];
  if (year === '2030') {
    if (title === 'INTEGRATED SLEEP UNIT 搬遷記錄' || title === 'COMBINED HAEMATOLOGY DAY WARD AND CLINIC 搬遷記錄' || title === 'GENERAL HAEMATOLOGY WARD 搬遷記錄' || title === 'HAEMATOLOGY AND ONCOLOGY WARD 搬遷記錄') {
      return String(migration && migration.from || '').trim();
    }
    if (title === 'PSYCHI WARD (F) 搬遷記錄' || title === 'PSYCHI WARD (M) 搬遷記錄') {
      return 'SH Psychi Ward';
    }
    if (title === 'THE NETHERSOLE SCHOOL OF NURSING 搬遷記錄') {
      return 'Block B SQ, South 7/F The Nethersole School of Nursing';
    }
    if (title === 'MSSU (PSY) 搬遷記錄') {
      return 'Block B SQ, North 3/F MSSU (Psy)';
    }
    if (title === 'CLINICAL PSYCHOLOGY 搬遷記錄') {
      return 'Block B SQ, North 3/F Clinical Psychology';
    }
    if (title === 'EYE CENTRE 搬遷記錄') {
      return 'Eye Centre';
    }
  }
  if (special2027Titles.has(title) && year === '2030') {
    const source2027Move = (migration && migration.moves || []).find((item) => String(item && item.year || '').trim() === '2027');
    const source2027Destinations = Array.isArray(source2027Move && source2027Move.destinations)
      ? source2027Move.destinations.map((dest) => String(dest || '').trim()).filter(Boolean)
      : [];
    if (title === 'DEPT OF A&IC, CUHK 搬遷記錄' && source2027Destinations.length > 0) {
      return 'MCBTC2030 4/F A&IC Office';
    }
    if (title === 'PRIVATE WARD 搬遷記錄' && source2027Destinations.length > 0) {
      return 'SB 9/F 9E Private Ward';
    }
    if (title === 'SKIN BANK 搬遷記錄' && source2027Destinations.length > 0) {
      return 'SB 1/F 1F Skin Bank';
    }
    if (title === '4B INTEGRATED WARD 搬遷記錄' && source2027Destinations.length > 0) {
      return 'SB 5/F 5E & 5F Integrated Ward';
    }
    if (source2027Destinations.length === 1) return source2027Destinations[0];
    if (source2027Destinations.length > 1) return source2027Destinations.join(' / ');
  }
  if (destinations.length === 0) {
    return String(migration && migration.from || '').trim() || title || 'Exceptional Case';
  }
  if (destinations.length === 1) return destinations[0];
  return destinations.join(' / ');
}

function buildExceptionalListEntries() {
  const entries = [];
  (exceptionalCaseMigrations || []).forEach((migration) => {
    (migration.moves || []).forEach((move, moveIndex) => {
      entries.push({
        migration,
        moveIndex,
        groupKey: getExceptionalListGroupKey(migration, move),
        label: getExceptionalListEntryLabel(migration, move),
        subtitle: String(migration.from || '')
      });
    });
  });
  return entries;
}

function isSpecialExceptionalLegacyTitle(title) {
  return new Set([
    'PRIVATE WARD 搬遷記錄',
    'BURNS CENTRE 搬遷記錄',
    'SKIN BANK 搬遷記錄',
    '4B INTEGRATED WARD 搬遷記錄',
    'DEPT OF A&IC, CUHK 搬遷記錄'
  ]).has(String(title || '').trim());
}

function getExceptionalMoveDestinations(migration, move, activeYear) {
  return Array.isArray(move && move.destinations) ? move.destinations : [];
}

function resolveExceptionalTriggerItem(trigger) {
  if (!trigger) return null;
  if (String(trigger.tower || '') === 'left') {
    const buildingName = leftBuildingsData[Number(trigger.buildingIndex)] && leftBuildingsData[Number(trigger.buildingIndex)].name;
    return findLeftSpaceRef(buildingName, trigger.floor, getSpaceInfo('left', trigger.floor, trigger.index, trigger.buildingIndex)?.name || '');
  }
  const triggerInfo = getSpaceInfo('right', trigger.floor, trigger.index, null, trigger.wing || '');
  if (!triggerInfo) return null;
  return {
    tower: 'right',
    floor: String(trigger.floor),
    index: Number(trigger.index),
    buildingIndex: null,
    wing: String(trigger.wing || ''),
    name: triggerInfo.name,
    building: String(trigger.wing || '') === 'mcbtc2030' ? 'MCBTC2030' : 'IPEB'
  };
}

function getExceptionalSourcePresentation(migration, move, activeYear) {
  const title = String(migration && migration.title || '').trim();
  if (String(activeYear || '').trim() !== '2030') {
    return { items: [], notes: [] };
  }
  const sourceItems = [];
  const sourceNotes = [];
  const source2027Move = (migration && migration.moves || []).find((item) => String(item && item.year || '').trim() === '2027');
  const sourceDestinations = isSpecialExceptionalLegacyTitle(title)
    ? ((source2027Move && source2027Move.destinations) || [])
    : (((move && move.destinations) || []));
  sourceDestinations.forEach((dest) => {
    const resolved = resolveExceptionalDestination(dest);
    if (resolved.item) sourceItems.push(resolved.item);
    else if (resolved.raw) sourceNotes.push(resolved.raw);
  });
  if (title === 'PRIVATE WARD 搬遷記錄') {
    sourceItems.forEach((item) => {
      item.displayName = '9E Private Ward';
      item.metaOverride = '9/F';
    });
    return { items: sourceItems, notes: sourceNotes };
  }
  if (title === 'SKIN BANK 搬遷記錄') {
    sourceItems.forEach((item) => {
      item.displayName = '1F Skin Bank';
      item.metaOverride = '1/F';
    });
    return { items: sourceItems, notes: sourceNotes };
  }
  if (title === '4B INTEGRATED WARD 搬遷記錄') {
    sourceItems.forEach((item, index) => {
      if (index === 0) {
        item.displayName = '5E & 5F Integrated Ward';
        item.metaOverride = '5/F';
      } else {
        item.suppressDisplay = true;
      }
    });
    return { items: sourceItems, notes: sourceNotes };
  }
  if (title === 'EYE CENTRE 搬遷記錄') {
    sourceItems.forEach((item) => {
      item.displayName = 'Eye Centre';
    });
  }
  return { items: sourceItems, notes: sourceNotes };
}

function getExceptionalMovePresentation(migration, move, activeYear) {
  if (String(activeYear || '').trim() !== '2030') {
    const items = [];
    const notes = [];
    getExceptionalMoveDestinations(migration, move, activeYear).forEach((dest) => {
      const resolved = resolveExceptionalDestination(dest);
      if (resolved.item) items.push(resolved.item);
      else if (resolved.raw) notes.push(resolved.raw);
    });
    return { items, notes };
  }
  const items = [];
  (((migration && migration.triggers) || []).filter((trigger) => String(trigger && trigger.tower || '') === 'right')).forEach((trigger) => {
    const resolved = resolveExceptionalTriggerItem(trigger);
    if (resolved) items.push(resolved);
  });
  return { items, notes: [] };
}

function buildExceptionalConnectionGroup(migration, activeMoveIndex = null) {
  const group = {
    title: String(migration && migration.title || ''),
    from: String(migration && migration.from || ''),
    activeYear: '',
    sourceItems: [],
    sourceNotes: [],
    moveGroups: []
  };
  const moves = migration && migration.moves || [];
  const activeMove = activeMoveIndex !== null ? moves[Number(activeMoveIndex)] : null;
  const activeYear = String(activeMove && activeMove.year || '').trim();
  group.activeYear = activeYear;
  const allTriggers = migration && migration.triggers || [];
  let sourceTriggers = allTriggers.slice();
  if (activeMove) {
    if (activeYear === '2030') {
      const rightOnly = allTriggers.filter((trigger) => String(trigger && trigger.tower || '') === 'right');
      if (rightOnly.length) sourceTriggers = rightOnly;
    } else {
      const leftOnly = allTriggers.filter((trigger) => String(trigger && trigger.tower || '') === 'left');
      if (leftOnly.length) sourceTriggers = leftOnly;
    }
  }
  const sourcePresentation = getExceptionalSourcePresentation(migration, activeMove, activeYear);
  if ((sourcePresentation.items || []).length || (sourcePresentation.notes || []).length) {
    group.sourceItems = sourcePresentation.items || [];
    group.sourceNotes = sourcePresentation.notes || [];
  } else {
    sourceTriggers.forEach((trigger) => {
      const resolved = resolveExceptionalTriggerItem(trigger);
      if (resolved) group.sourceItems.push(resolved);
    });
  }
  moves.forEach((move, moveIndex) => {
    if (activeMoveIndex !== null && Number(activeMoveIndex) !== Number(moveIndex)) return;
    const moveGroup = {
      year: String(move.year || ''),
      label: String(move.label || ''),
      items: [],
      notes: []
    };
    const movePresentation = getExceptionalMovePresentation(migration, move, activeYear);
    moveGroup.items = movePresentation.items || [];
    moveGroup.notes = movePresentation.notes || [];
    group.moveGroups.push(moveGroup);
  });
  return group;
}

function activateExceptionalCase(migration, moveIndex = null) {
  selectedSpaces.clear();
  currentLinkedGroup = null;
  currentClickedSpace = null;
  currentExceptionalLinkGroup = buildExceptionalConnectionGroup(migration, moveIndex);
  document.querySelectorAll('.timeline-period').forEach(period => period.classList.remove('active'));
  selectedTimePeriod = null;
  (currentExceptionalLinkGroup.sourceItems || []).forEach((item) => {
    const key = item.tower === 'right'
      ? `right-${item.floor}-${item.wing}-${item.index}`
      : `left-${item.buildingIndex}-${item.floor}--${item.index}`;
    selectedSpaces.add(key);
  });
  (currentExceptionalLinkGroup.moveGroups || []).forEach((move) => {
    (move.items || []).forEach((item) => {
      const key = item.tower === 'right'
        ? `right-${item.floor}-${item.wing}-${item.index}`
        : `left-${item.buildingIndex}-${item.floor}--${item.index}`;
      selectedSpaces.add(key);
    });
  });
  showExceptionalCaseInfo(migration);
  updateDisplay();
  updateLinkDisplay();
  focusExceptionalConnectionGroup(currentExceptionalLinkGroup);
}

function formatExceptionalNoteDisplay(group, move, noteText) {
  const title = String(group && group.title || '').trim();
  const raw = String(noteText || '').trim();
  if (title === 'SPIRITUAL 搬遷記錄' && String(move && move.year || '').trim() === '2027') {
    return {
      building: 'IPEB',
      meta: '4F',
      name: 'Spiritual (Block B,SQ North)'
    };
  }
  if (title === 'DEPT OF A&IC, CUHK 搬遷記錄' && raw.toLowerCase() === 'pending arrangement') {
    return {
      building: 'Pending',
      meta: String(move && move.year || '').trim(),
      name: 'Pending arrangement'
    };
  }
  if (/^pending arrangement\.?$/i.test(raw)) {
    return {
      building: '',
      meta: '',
      name: 'Pending arrangement'
    };
  }
  if (/^pending m&t arrangement\.?$/i.test(raw)) {
    return {
      building: '',
      meta: '',
      name: 'Pending M&T arrangement'
    };
  }
  if (/^from sh psychi ward\.?$/i.test(raw)) {
    return {
      building: '',
      meta: '',
      name: 'SH Psychi Ward'
    };
  }
  if (/^from 7\/f block b,sq\.?$/i.test(raw)) {
    return {
      building: '',
      meta: '',
      name: 'Block B SQ, South 7/F The Nethersole School of Nursing'
    };
  }
  if (/^from 3\/f,?\s*block b,?\s*sq\.?$/i.test(raw)) {
    return {
      building: '',
      meta: '',
      name: 'Block B SQ, North 3/F MSSU (Psy)'
    };
  }
  if (/^from 4\/f,?\s*block b,?\s*sq\.?$/i.test(raw)) {
    return {
      building: '',
      meta: '',
      name: 'Block B SQ, North 3/F Clinical Psychology'
    };
  }
  return {
    building: '',
    meta: String(move && move.year || '').trim(),
    name: raw
  };
}

function focusExceptionalConnectionGroup(group) {
  if (!group) return;
  const activeYear = String(group.activeYear || '').trim();
  const move = Array.isArray(group.moveGroups) ? group.moveGroups[0] : null;
  const moveItems = move && Array.isArray(move.items) ? move.items : [];
  const sourceItems = Array.isArray(group.sourceItems) ? group.sourceItems : [];
  const sourceLeft = sourceItems.find((item) => item && item.tower === 'left') || null;
  const sourceRight = sourceItems.find((item) => item && item.tower === 'right') || null;
  const moveLeft = moveItems.find((item) => item && item.tower === 'left') || null;
  const moveRight = moveItems.find((item) => item && item.tower === 'right') || null;
  const leftTarget = moveLeft || sourceLeft || null;
  const rightTarget = moveRight || sourceRight || null;

  if (leftTarget && Number.isFinite(leftTarget.buildingIndex) && leftTarget.buildingIndex !== currentLeftBuilding) {
    switchLeftBuilding(leftTarget.buildingIndex);
  }
  if (rightTarget) {
    const desiredRight = rightTarget.wing === 'mcbtc2030' ? 1 : 0;
    if (currentRightBuilding !== desiredRight) {
      switchRightBuilding(desiredRight);
    }
  } else if (activeYear === '2027' && currentRightBuilding !== 0) {
    switchRightBuilding(0);
  }

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      if (leftTarget) {
        scrollToSpace(leftTarget.tower, leftTarget.floor, leftTarget.index, leftTarget.buildingIndex, leftTarget.wing, false);
      }
      if (rightTarget) {
        scrollToSpace(rightTarget.tower, rightTarget.floor, rightTarget.index, rightTarget.buildingIndex, rightTarget.wing, false);
      }
    });
  });
}

function shouldPreserveCurrentView() {
  if (!buildingContainer) return false;
  const defaultPan = getDefaultPanOffsets();
  const movedPan = Math.abs(panX - defaultPan.x) > 2 || Math.abs(panY - defaultPan.y) > 2;
  const movedScroll = Math.abs(buildingContainer.scrollLeft || 0) > 2 || Math.abs(buildingContainer.scrollTop || 0) > 2;
  return movedPan || movedScroll;
}

// 創建空間元素的輔助函數
function createSpaceElement(space, tower, floor, index, buildingIndex) {
  const spaceDiv = document.createElement('div');
  spaceDiv.className = 'space';
  if (isExceptionalCaseSpace({ tower, floor, index, buildingIndex })) {
    spaceDiv.classList.add('exceptional-case');
  }
  
  if (space.specialClass) {
    spaceDiv.classList.add(space.specialClass);
  }
  
  if (space.multiline && space.lines) {
    const wardText = document.createElement('div');
    wardText.className = 'ward-text';
    
    space.lines.forEach(line => {
      const lineDiv = document.createElement('span');
      lineDiv.className = 'line';
      lineDiv.textContent = line;
      wardText.appendChild(lineDiv);
    });
    
    spaceDiv.appendChild(wardText);
    spaceDiv.classList.add('multiline');
  } else {
    spaceDiv.textContent = space.name;
  }
  
  if (space.widthClass) {
    spaceDiv.classList.add(space.widthClass);
  } else {
    spaceDiv.classList.add('normal');
  }
  
  spaceDiv.dataset.tower = tower;
  spaceDiv.dataset.floor = floor;
  spaceDiv.dataset.index = index;
  spaceDiv.dataset.building = buildingIndex;
  spaceDiv.onclick = () => {
    if (suppressSpaceClickOnce) {
      suppressSpaceClickOnce = false;
      return;
    }
    toggleSpace(tower, floor, index, buildingIndex);
  };
  
  return spaceDiv;
}

    ? floorOrder.filter(f => f !== '19' && f !== '18')

  // Calculate actual top/bottom floors for each tower
  const getBounds = (floorsObj) => {
    const floors = Object.keys(floorsObj).filter(f => {
        const d = floorsObj[f];
        if (Array.isArray(d)) return d.length > 0;
        // Check for special structures like CSB 3F or Right Tower wings

            if (d.upper && d.upper.length > 0) return true;
            if (d.lower && d.lower.length > 0) return true;
            if (d.nwing && d.nwing.length > 0) return true;
            if (d.sewing && d.sewing.length > 0) return true;
            if (d.swwing && d.swwing.length > 0) return true;
        }
        return false;
    });
    // Sort floors according to floorOrder to find true top/bottom
    const sorted = floorOrder.filter(f => floors.includes(f));
    if (sorted.length === 0) return { top: null, bottom: null };
    return { top: sorted[0], bottom: sorted[sorted.length-1] };

            if (typeof space === 'object') {

function sortDeptKeys(keys) {
  return (keys || []).slice().sort((a, b) => {
    const getTailPriority = (value) => {
      const key = String(value || '').trim().toUpperCase();
      if (key === 'THE NETHERSOLE SCHOOL OF NURSING') return 2;
      if (key === 'CUHK') return 1;
      return 0;
    };
    const priorityDiff = getTailPriority(a) - getTailPriority(b);
    if (priorityDiff !== 0) return priorityDiff;
    const aIsCuhk = String(a || '').trim().toUpperCase() === 'CUHK';
    const bIsCuhk = String(b || '').trim().toUpperCase() === 'CUHK';
    if (aIsCuhk !== bIsCuhk) return aIsCuhk ? 1 : -1;
    return String(a || '').localeCompare(String(b || ''));
  });
}

function populateDeptList(side) {
  const currentList = document.getElementById(side === 'clinical' ? 'clinicalList' : 'nonList');
  if (!currentList) return;
  currentList.innerHTML = '';
  const catalog = (deptCatalog && deptCatalog[side]) ? deptCatalog[side] : {};
  sortDeptKeys(Object.keys(catalog)).forEach((deptKey) => {
    const btn = document.createElement('div');
    btn.className = 'dept-item';
    btn.textContent = deptKey;
    btn.onclick = () => renderDept(deptKey);

function applyDeptFilter(e) {
  const input = document.getElementById('deptFilter');
  const q = (input ? input.value : '').trim().toLowerCase();
  const tokens = q.split(/[\s,;，、]+/).filter(Boolean);
  if (e && e.type === 'input') {
    deptSearchForceHidden = false;
  }
  const normalize = (() => {
    try {
      new RegExp('[^\\p{L}\\p{N}]+', 'gu');
      return (s) => String(s || '').toLowerCase().replace(/[^\p{L}\p{N}]+/gu, '');
    } catch (e) {
      return (s) => String(s || '').toLowerCase().replace(/[^a-z0-9\u00C0-\uFFFF]+/g, '');
    }
  })();
  const tokensNorm = tokens.map(normalize).filter(Boolean);
  updateDeptSearchResults(tokensNorm);
  return;
  const matchAny = (text) => {
    if (tokensNorm.length === 0) return true;
    const raw = String(text || '').toLowerCase();
    const norm = normalize(text);
    return tokensNorm.some(t => raw.includes(t) || norm.includes(t));
  };

  document.querySelectorAll('#clinicalList .dept-item, #nonList .dept-item').forEach(el => {
    const text = (el.textContent || '').toLowerCase();
    el.style.display = matchAny(text) ? '' : 'none';
  });

  const wardButtons = document.getElementById('wardButtons');
  if (wardButtons) {
    wardButtons.querySelectorAll('.ward-btn').forEach(el => {
      const text = (el.textContent || '').toLowerCase();
      el.style.display = matchAny(text) ? '' : 'none';
    });

    wardButtons.querySelectorAll('.ward-items-container').forEach(container => {
      const children = Array.from(container.children);
      for (let i = 0; i < children.length; i += 2) {
        const label = children[i];
        const grid = children[i + 1];
        if (!label || !grid) break;
        const anyVisible = Array.from(grid.querySelectorAll('.ward-btn')).some(btn => btn.style.display !== 'none');
        const show = tokens.length === 0 || anyVisible;
        label.style.display = show ? '' : 'none';
        grid.style.display = show ? '' : 'none';
      }
    });
  }

  updateDeptSearchResults(tokensNorm);
}

function applyWardFilter() {
  applyDeptFilter();
  scheduleWardButtonNormalization();
}

let deptSearchIndex = null;
function formatRightWingLabel(wing) {
  const w = String(wing || '');
  if (w === 'nwing' || w === 'sewing' || w === 'swwing' || w === 'mcbtc2030') return '';
  return w;
}

function getPreferredRightWing() {
  if (currentDeptTarget === 'mcbtc2030') return 'mcbtc2030';
  if (currentDeptTarget === 'ipeb') return '';
  return currentRightBuilding === 1 ? 'mcbtc2030' : '';
}

function sortRightSpacesByPreferredTarget(spaces) {
  const preferredWing = getPreferredRightWing();
  return (spaces || []).slice().sort((a, b) => {
    const aPriority = String(a && a.wing || '') === preferredWing ? 0 : 1;
    const bPriority = String(b && b.wing || '') === preferredWing ? 0 : 1;
    if (aPriority !== bPriority) return aPriority - bPriority;
    const aFloor = parseInt(String(a && a.floor || '0').replace(/[^\d-]/g, ''), 10) || 0;
    const bFloor = parseInt(String(b && b.floor || '0').replace(/[^\d-]/g, ''), 10) || 0;
    if (aFloor !== bFloor) return bFloor - aFloor;
    return (parseInt(a && a.index, 10) || 0) - (parseInt(b && b.index, 10) || 0);
  });
}

function buildDeptSearchIndex() {
  const entries = [];
  const addLeftSpace = (buildingIndex, buildingName, floor, index, name) => {
    const key = `left|${buildingIndex}|${floor}|${index}`;
    entries.push({
      key,
      type: 'space',
      tower: 'left',
      buildingIndex,
      buildingName,
      floor: String(floor),
      wing: '',
      index,
      name: String(name || ''),
      search: `${name} ${buildingName} ${floor} left`.toLowerCase()
    });
  };
  const addRightSpace = (floor, wing, index, name) => {
    const rightBuildingName = wing === 'mcbtc2030' ? 'MCBTC2030' : 'IPEB';
    const key = `right|${floor}|${wing}|${index}`;
    entries.push({
      key,
      type: 'space',
      tower: 'right',
      buildingIndex: null,
      buildingName: rightBuildingName,
      floor: String(floor),
      wing: String(wing || ''),
      index,
      name: String(name || ''),
      search: `${name} ${rightBuildingName} ${floor} ${wing} right`.toLowerCase()
    });
  };

  (leftBuildingsData || []).forEach((b, bIndex) => {
    const buildingName = (b && b.name) ? b.name : `LEFT-${bIndex}`;
    const floors = (b && b.floors) ? b.floors : {};
    Object.entries(floors).forEach(([floor, spaces]) => {
      if (Array.isArray(spaces)) {
        spaces.forEach((space, idx) => {
          if (!space) return;
          const name = (typeof space === 'object' && space.name) ? space.name : String(space);
          addLeftSpace(bIndex, buildingName, floor, idx, name);
        });
        return;
      }
      if (spaces && typeof spaces === 'object' && (Array.isArray(spaces.upper) || Array.isArray(spaces.lower))) {
        const upper = Array.isArray(spaces.upper) ? spaces.upper : [];
        const lower = Array.isArray(spaces.lower) ? spaces.lower : [];
        upper.forEach((space, idx) => {
          if (!space) return;
          const name = (typeof space === 'object' && space.name) ? space.name : String(space);
          addLeftSpace(bIndex, buildingName, floor, idx, name);
        });
        lower.forEach((space, idx) => {
          if (!space) return;
          const name = (typeof space === 'object' && space.name) ? space.name : String(space);
          addLeftSpace(bIndex, buildingName, floor, idx + upper.length, name);
        });
      }
    });
  });

  Object.entries(rightTowerData || {}).forEach(([floor, data]) => {
    ['nwing', 'sewing', 'swwing'].forEach(wing => {
      const arr = data && data[wing];
      (arr || []).forEach((space, idx) => {
        if (!space) return;
        const name = (typeof space === 'object' && space.name) ? space.name : String(space);
        addRightSpace(floor, wing, idx, name);
      });
    });
  });

  Object.entries(mcbtc2030Floors || {}).forEach(([floor, spaces]) => {
    (spaces || []).forEach((space, idx) => {
      if (!space) return;
      const name = (typeof space === 'object' && space.name) ? space.name : String(space);
      addRightSpace(floor, 'mcbtc2030', idx, name);
    });
  });

  const seenSpace = new Set();
  deptSearchIndex = entries.filter(e => {
    if (seenSpace.has(e.key)) return false;
    seenSpace.add(e.key);
    return true;
  });
  return;
  const addWard = (side, deptKey, buildingKey, item, kind) => {
    const key = `${side}|${deptKey}|${buildingKey}|${item}|${kind}`;
    entries.push({
      key,
      type: 'ward',
      side,
      deptKey,
      buildingKey,
      item,
      kind,
      search: `${deptKey} ${buildingKey} ${item} ${kind}`.toLowerCase()
    });
  };
  const addDept = (side, deptKey) => {
    entries.push({
      key: `${side}|dept|${deptKey}`,
      type: 'dept',
      side,
      deptKey,
      search: `${deptKey} ${side}`.toLowerCase()
    });
  };

  ['clinical', 'nonClinical'].forEach(side => {
    const catalog = deptCatalog[side] || {};
    Object.keys(catalog).forEach(deptKey => {
      addDept(side, deptKey);
      const data = catalog[deptKey] || {};
      if (data.groups) {
        Object.entries(data.groups).forEach(([groupName, group]) => {
          if (group && group.direct) {
            Object.entries(group.direct).forEach(([buildingKey, items]) => {
              (items || []).forEach(item => addWard(side, deptKey, buildingKey, item, groupName));
            });
          }
        });
      }
      if (data.direct) {
        Object.entries(data.direct).forEach(([buildingKey, items]) => {
          (items || []).forEach(item => addWard(side, deptKey, buildingKey, item, 'direct'));
        });
      }
      ['ward', 'day'].forEach(kind => {
        const byBuilding = data[kind];
        if (byBuilding) {
          Object.entries(byBuilding).forEach(([buildingKey, items]) => {
            (items || []).forEach(item => addWard(side, deptKey, buildingKey, item, kind));
          });
        }
      });
    });
  });

  const seen = new Set();
  deptSearchIndex = entries.filter(e => {
    if (seen.has(e.key)) return false;
    seen.add(e.key);
    return true;
  });
}

function updateDeptSearchResults(tokensNorm) {
  const resultsEl = document.getElementById('deptSearchResults');
  if (!resultsEl) return;
  if (deptSearchForceHidden) {
    hideDeptSearchResults();
    return;
  }
  if (!tokensNorm || tokensNorm.length === 0) {
    hideDeptSearchResults();
    return;
  }

  if (!deptSearchIndex || !deptSearchIndex[0] || deptSearchIndex[0].type !== 'space') {
    deptSearchIndex = null;
    buildDeptSearchIndex();
  }

  const normalize = (() => {
    try {
      new RegExp('[^\\p{L}\\p{N}]+', 'gu');
      return (s) => String(s || '').toLowerCase().replace(/[^\p{L}\p{N}]+/gu, '');
    } catch (e) {
      return (s) => String(s || '').toLowerCase().replace(/[^a-z0-9\u00C0-\uFFFF]+/g, '');
    }
  })();
  const matches = (text) => {
    const raw = String(text || '').toLowerCase();
    const norm = normalize(text);
    return tokensNorm.some(t => raw.includes(t) || norm.includes(t));
  };

  const floorSort = (floor) => {
    const s = String(floor || '').trim();
    if (/^B\d+$/i.test(s)) return -parseInt(s.slice(1), 10);
    const n = parseInt(s, 10);
    if (Number.isFinite(n)) return n;
    return -9999;
  };
  const wingOrder = { nwing: 0, sewing: 1, swwing: 2 };

  const leftHits = [];
  const rightHits = [];
  for (const e of deptSearchIndex || []) {
    if (!matches(e.search) && !matches(e.name)) continue;
    if (e.tower === 'left') leftHits.push(e);
    else if (e.tower === 'right') rightHits.push(e);
  }

  leftHits.sort((a, b) => {
    const bn = String(a.buildingName || '').localeCompare(String(b.buildingName || ''));
    if (bn !== 0) return bn;
    const af = floorSort(a.floor);
    const bf = floorSort(b.floor);
    if (af !== bf) return bf - af;
    return String(a.name || '').localeCompare(String(b.name || ''));
  });
  rightHits.sort((a, b) => {
    const af = floorSort(a.floor);
    const bf = floorSort(b.floor);
    if (af !== bf) return bf - af;
    const aw = wingOrder[String(a.wing || '')] ?? 99;
    const bw = wingOrder[String(b.wing || '')] ?? 99;
    if (aw !== bw) return aw - bw;
    return String(a.name || '').localeCompare(String(b.name || ''));
  });

  const maxLeft = 30;
  const maxRight = 30;
  resultsEl.innerHTML = '';
  resultsEl.style.display = 'block';

  const addRow = (e, meta) => {
    const row = document.createElement('div');
    row.className = 'dept-search-item';
    row.innerHTML = `<span class="label">${e.name}</span><span class="meta">${meta}</span>`;
    row.onclick = () => selectSpaceFromSearch(e);
    resultsEl.appendChild(row);
  };

  if (leftHits.length > 0) {
    const h = document.createElement('div');
    h.className = 'dept-search-header';
    h.textContent = '左塔空間';
    resultsEl.appendChild(h);
    leftHits.slice(0, maxLeft).forEach(e => addRow(e, `${e.buildingName} · ${e.floor}F`));
  }

  if (rightHits.length > 0) {
    const h = document.createElement('div');
    h.className = 'dept-search-header';
    h.textContent = '右塔空間';
    resultsEl.appendChild(h);
    rightHits.slice(0, maxRight).forEach(e => {
      const wingText = formatRightWingLabel(e.wing);
      const label = wingText ? `${e.buildingName} · ${e.floor}F · ${wingText}` : `${e.buildingName} · ${e.floor}F`;
      addRow(e, label);
    });
  }

  if (leftHits.length === 0 && rightHits.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'ward-empty';
    empty.textContent = '沒有結果';
    resultsEl.appendChild(empty);
  }
  positionMobileDeptSearchResults();
}

function selectSpaceFromSearch(entry) {
  const input = document.getElementById('deptFilter');
  const isPhoneSearchSelection = isPhoneLayoutMode();
  const viewportScrollY = isPhoneSearchSelection ? (window.scrollY || window.pageYOffset || 0) : 0;
  hideDeptSearchResults();
  deptSearchForceHidden = true;
  if (input) {
    input.value = '';
    if (isPhoneSearchSelection) {
      dismissDeptFilterKeyboard(input);
    } else {
      input.focus();
      try { input.setSelectionRange(0, 0); } catch (e) {}
    }
  }

  if (!entry) return;
  const preserveView = isPhoneSearchSelection ? true : shouldPreserveCurrentView();
  const restoreViewport = () => {
    if (!isPhoneSearchSelection) return;
    const resetScroll = () => {
      try {
        window.scrollTo({ top: viewportScrollY, left: 0, behavior: 'auto' });
      } catch (e) {
        window.scrollTo(0, viewportScrollY);
      }
    };
    if (typeof requestAnimationFrame === 'function') {
      requestAnimationFrame(() => {
        requestAnimationFrame(resetScroll);
      });
    } else {
      setTimeout(resetScroll, 0);
    }
    setTimeout(resetScroll, 180);
  };
  if (entry.tower === 'left') {
    const bIndex = entry.buildingIndex;
    const run = () => {
      toggleSpace('left', entry.floor, entry.index, bIndex);
      scrollToSpace('left', entry.floor, entry.index, bIndex, '', true, preserveView);
      restoreViewport();
    };
    if (typeof bIndex === 'number' && bIndex !== currentLeftBuilding) {
      switchLeftBuilding(bIndex, { preservePan: preserveView });
      setTimeout(run, 350);
    } else {
      run();
    }
  } else {
    toggleSpace('right', entry.floor, entry.index, null, entry.wing);
    scrollToSpace('right', entry.floor, entry.index, null, entry.wing, true, preserveView);
    restoreViewport();
  }
}

function sortMenuItems(items) {
  return (items || []).slice().sort((a, b) => {
    const aLabel = getMenuItemLabel(a);
    const bLabel = getMenuItemLabel(b);
    const aNum = parseInt(String(aLabel).match(/\d+/)?.[0] || '0', 10);
    const bNum = parseInt(String(bLabel).match(/\d+/)?.[0] || '0', 10);
    if (aNum !== bNum) return aNum - bNum;
    const aStr = String(aLabel).replace(/\d+/g, '');
    const bStr = String(bLabel).replace(/\d+/g, '');
    return aStr.localeCompare(bStr);
  });
}

function normalizeWardButtonSizes(root = document.getElementById('wardButtons')) {
  if (!root) return;
  const getTextWidth = (() => {
    let canvas = null;
    let ctx = null;
    return (btn) => {
      if (!canvas) {
        canvas = document.createElement('canvas');
        ctx = canvas.getContext('2d');
      }
      if (!ctx) return 0;
      const style = window.getComputedStyle(btn);
      ctx.font = `${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;
      return Math.ceil(ctx.measureText(String(btn.textContent || '').trim()).width || 0);
    };
  })();
  const getInnerWidth = (btn) => {
    const style = window.getComputedStyle(btn);
    const paddingLeft = parseFloat(style.paddingLeft) || 0;
    const paddingRight = parseFloat(style.paddingRight) || 0;
    return Math.max(0, btn.clientWidth - paddingLeft - paddingRight);
  };
  root.querySelectorAll('.ward-btn').forEach((btn) => {
    btn.classList.remove('ward-btn-fit-wide', 'ward-btn-fit-two-line');
    if (btn.offsetParent === null || btn.clientWidth <= 0) return;
    if (btn.classList.contains('ward-btn-force-single-line')) return;
    const textWidth = getTextWidth(btn);
    if (textWidth <= getInnerWidth(btn) + 1) return;
    btn.classList.add('ward-btn-fit-wide');
    if (textWidth <= getInnerWidth(btn) + 1) return;
    btn.classList.add('ward-btn-fit-two-line');
  });

  root.querySelectorAll('.ward-items-grid').forEach((grid) => {
    const buttons = Array.from(grid.children).filter((el) => el && el.classList && el.classList.contains('ward-btn'));
    const priority = (btn) => {
      if ((btn.textContent || '').trim() === 'ALL') return -1;
      if (btn.classList.contains('ward-btn-fit-two-line')) return 2;
      if (btn.classList.contains('ward-btn-fit-wide') || btn.classList.contains('ward-btn-force-single-line')) return 1;
      return 0;
    };
    buttons
      .slice()
      .sort((a, b) => {
        const p = priority(a) - priority(b);
        if (p !== 0) return p;
        const len = String(a.textContent || '').trim().length - String(b.textContent || '').trim().length;
        if (len !== 0) return len;
        return String(a.textContent || '').localeCompare(String(b.textContent || ''));
      })
      .forEach((btn) => grid.appendChild(btn));
  });
}

function scheduleWardButtonNormalization() {
  if (typeof requestAnimationFrame === 'function') {
    requestAnimationFrame(() => normalizeWardButtonSizes());
    return;
  }
  setTimeout(() => normalizeWardButtonSizes(), 0);
}

function buildMenuItemsContainer(entries, options = {}) {
  const container = document.createElement('div');
  container.className = 'ward-items-container ward-buildings-grid';
  const blocks = Object.entries(entries || {});
  if (blocks.length <= 1) container.classList.add('single-col');
  const defaultColsPerBlock = blocks.length <= 1 ? 4 : 2;
  blocks.forEach(([buildingKey, items]) => {
    const block = document.createElement('div');
    block.className = 'ward-building-block';
    const isWideBlock = options.dayMode && String(buildingKey).toUpperCase() === 'HKLM';
    if (isWideBlock) block.classList.add('span-2');
    const label = document.createElement('div');
    label.className = 'ward-building-label';
    label.textContent = `${getMenuBuildingLabel(buildingKey)}:`;
    const grid = document.createElement('div');
    const upperBuildingKey = String(buildingKey).toUpperCase();
    const dayGridClass = (options.dayMode && upperBuildingKey !== 'HKLM') ? 'ward-items-grid-day' : 'ward-items-grid-2col';
    grid.className = `ward-items-grid ${dayGridClass}`;
    grid.style.setProperty('--ward-grid-cols', String(isWideBlock ? 4 : defaultColsPerBlock));
    const sortedItems = sortMenuItems(items);
    if (sortedItems.length > 1) {
      const allBtn = document.createElement('button');
      allBtn.className = 'ward-btn ' + getThemeClass(buildingKey);
      allBtn.textContent = 'ALL';
      allBtn.onclick = () => handleAllSelection(buildingKey, sortedItems);
      grid.appendChild(allBtn);
    }
    sortedItems.forEach((item) => {
      const btn = document.createElement('button');
      const labelText = getMenuItemLabel(item);
      btn.className = 'ward-btn ' + getThemeClass(buildingKey);
      if (labelText === 'Doctor Lounge') btn.classList.add('ward-btn-force-single-line');
      btn.textContent = labelText;
      btn.dataset.menuKey = getMenuItemKey(item, buildingKey);
      btn.onclick = () => handleDeptItemClick(buildingKey, item);
      grid.appendChild(btn);
    });
    block.appendChild(label);
    block.appendChild(grid);
    container.appendChild(block);
  });
  return container;
}

function resolveDeptItem(buildingKey, item) {
  const normalizedBuildingKey = normalizeMenuBuildingKey(buildingKey);
  const bIndex = buildingMap[normalizedBuildingKey];
  if (item && typeof item === 'object') {
    if (String(item.tower || 'left') === 'right') {
      const itemIndex = Number(item.index);
      if (!Number.isFinite(itemIndex)) return null;
      return {
        tower: 'right',
        floor: String(item.floor),
        index: itemIndex,
        wing: String(item.wing || '')
      };
    }
    const itemBuildingKey = normalizeMenuBuildingKey(item.buildingKey || normalizedBuildingKey);
    const itemBuildingIndex = buildingMap[itemBuildingKey];
    const order = Number(item.order);
    if (!Number.isFinite(itemBuildingIndex) || !Number.isFinite(order) || order < 1) return null;
    return {
      tower: 'left',
      floor: String(item.floor),
      index: order - 1,
      buildingIndex: itemBuildingIndex
    };
  }

  if (!Number.isFinite(bIndex)) return null;
  const left = findLeftByName(bIndex, String(item || ''));
  if (left) {
    return { tower: 'left', floor: left.floor, index: left.index, buildingIndex: bIndex };
  }
  const right = findRightByName(String(item || ''));
  if (right) {
    return { tower: 'right', floor: right.floor, index: right.index, wing: right.wing };
  }
  return null;
}
function handleAllSelection(buildingKey, items) {
  hideDeptSearchResults();
  deptSearchForceHidden = true;
  selectedSpaces.clear();
  currentLinkedGroup = null;
  currentClickedSpace = null;
  const bIndex = buildingMap[normalizeMenuBuildingKey(buildingKey)];
  if (typeof bIndex === 'number' && bIndex !== currentLeftBuilding) {
    switchLeftBuilding(bIndex);
  }
  (items || []).forEach(item => {
    const resolved = resolveDeptItem(buildingKey, item);
    if (resolved) {
      if (resolved.tower === 'left') {
        const key = `left-${resolved.buildingIndex}-${resolved.floor}-${''}-${resolved.index}`;
        selectedSpaces.add(key);
      } else if (resolved.tower === 'right') {
        const key = `right-${resolved.floor}-${resolved.wing || ''}-${resolved.index}`;
        selectedSpaces.add(key);
      }
    }
  });
  updateDisplay();
  updateLinkDisplay();
}
function handleDeptItemClick(buildingKey, item) {
  hideDeptSearchResults();
  deptSearchForceHidden = true;
  selectedSpaces.clear();
  currentLinkedGroup = null;
  currentClickedSpace = null;
  const resolved = resolveDeptItem(buildingKey, item);
  if (resolved) {
    if (resolved.tower === 'left') {
      toggleSpace('left', resolved.floor, resolved.index, resolved.buildingIndex);
      scrollToSpace('left', resolved.floor, resolved.index, resolved.buildingIndex);
    } else {
      toggleSpace('right', resolved.floor, resolved.index, null, resolved.wing);
      scrollToSpace('right', resolved.floor, resolved.index, null, resolved.wing);
    }
  }
  const activeKey = getMenuItemKey(item, buildingKey);
  document.querySelectorAll('#wardButtons .ward-btn').forEach(btn => {
    if ((btn.dataset.menuKey || '') === activeKey) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
  updateDisplay();
  updateLinkDisplay();
}

function findLeftByName(buildingIndex, name) {
  const floors = leftBuildingsData[buildingIndex].floors;
  for (const [floor, spaces] of Object.entries(floors)) {
    for (let i = 0; i < spaces.length; i++) {
      const s = spaces[i];
      if (typeof s === 'object' && s.name && s.name.toUpperCase().includes(name.toUpperCase())) {
        return { floor, index: i };
      }
    }
  }
  return null;
}

function findRightByName(name) {
  for (const [floor, data] of Object.entries(rightTowerData)) {
    if (data.nwing) {
      for (let i = 0; i < data.nwing.length; i++) {
        const s = data.nwing[i];
        if (s.name && s.name.toUpperCase().includes(name.toUpperCase())) {
          return { floor, index: i, wing: 'nwing' };
        }
      }
    }
    if (data.sewing) {
      for (let i = 0; i < data.sewing.length; i++) {
        const s = data.sewing[i];
        if (s.name && s.name.toUpperCase().includes(name.toUpperCase())) {
          return { floor, index: i, wing: 'sewing' };
        }
      }
    }
    if (data.swwing) {
      for (let i = 0; i < data.swwing.length; i++) {
        const s = data.swwing[i];
        if (s.name && s.name.toUpperCase().includes(name.toUpperCase())) {
          return { floor, index: i, wing: 'swwing' };
        }
      }
    }
  }
  for (const [floor, spaces] of Object.entries(mcbtc2030Floors || {})) {
    for (let i = 0; i < (spaces || []).length; i++) {
      const s = spaces[i];
      const candidate = typeof s === 'object' ? s.name : s;
      if (candidate && String(candidate).toUpperCase().includes(name.toUpperCase())) {
        return { floor, index: i, wing: 'mcbtc2030' };
      }
    }
  }
  return null;
}

function buildCalendarMonths() {
  const months = [];
  const start = new Date(2027, 5, 1);
  const end = new Date(2028, 3, 1);
  let cursor = new Date(start.getTime());
  while (cursor <= end) {
    months.push({ year: cursor.getFullYear(), month: cursor.getMonth() });
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  }
  return months;
}

function formatCalendarMonthLabel(year, month) {
  const mm = String(month + 1).padStart(2, '0');
  return `${mm}/${year}`;
}

function formatCalendarDate(year, month, day) {
  const mm = String(month + 1).padStart(2, '0');
  const dd = String(day).padStart(2, '0');
  return `${year}-${mm}-${dd}`;
}

function formatAgendaDate(dateStr) {
  if (!dateStr || typeof dateStr !== 'string') return '';
  const parts = dateStr.split('-');
  if (parts.length !== 3) return dateStr;
  const yyyy = parts[0];
  const mm = parts[1];
  const dd = parts[2];
  return `${dd}/${mm}/${yyyy}`;
}

function setCalendarViewMode(mode) {
  calendarViewMode = mode === 'list' ? 'list' : 'month';
  const split = document.getElementById('calendarSplit');
  const agenda = document.getElementById('calendarAgenda');
  const toggleBtn = document.getElementById('calendarViewToggle');
  const monthLabel = document.getElementById('calendarMonthLabel');
  const prevBtn = document.getElementById('calendarPrev');
  const nextBtn = document.getElementById('calendarNext');
  if (split) split.classList.toggle('hidden', calendarViewMode !== 'month');
  if (agenda) agenda.classList.toggle('hidden', calendarViewMode !== 'list');
  if (toggleBtn) toggleBtn.textContent = calendarViewMode === 'month' ? 'List' : 'Month';
  if (calendarViewMode === 'month') {
    if (prevBtn) prevBtn.disabled = calendarMonthIndex <= 0;
    if (nextBtn) nextBtn.disabled = calendarMonthIndex >= calendarMonths.length - 1;
    renderCalendarMonth();

function updateCalendarLeftTowerBox(dateStr) {
  const empty = document.getElementById('calendarLeftTowerEmpty');
  const list = document.getElementById('calendarLeftTowerList');
  if (!list || !empty) return;

  }

  empty.style.display = 'none';

  items.forEach((item) => {

function renderCalendarMonth() {
  const monthMeta = calendarMonths[calendarMonthIndex];
  if (!monthMeta) return;
  
  const monthLabel = document.getElementById('calendarMonthLabel');
  const grid = document.getElementById('calendarGrid');
  const prevBtn = document.getElementById('calendarPrev');
  const nextBtn = document.getElementById('calendarNext');
  if (!monthLabel || !grid || !prevBtn || !nextBtn) return;
  
  const { year, month } = monthMeta;
  monthLabel.textContent = formatCalendarMonthLabel(year, month);
  prevBtn.disabled = calendarMonthIndex <= 0;
  nextBtn.disabled = calendarMonthIndex >= calendarMonths.length - 1;
  
  grid.innerHTML = '';
  
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const jsDow = firstDay.getDay();
  const mondayBasedOffset = (jsDow + 6) % 7;
  
  for (let i = 0; i < mondayBasedOffset; i++) {
    const empty = document.createElement('button');
    empty.type = 'button';
    empty.className = 'calendar-day empty';
    empty.disabled = true;
    empty.textContent = '';
    grid.appendChild(empty);
  }
  
  for (let d = 1; d <= daysInMonth; d++) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'calendar-day';
    btn.textContent = String(d);
    const dateStr = formatCalendarDate(year, month, d);
    btn.dataset.date = dateStr;
    if (selectedCalendarDate === dateStr) btn.classList.add('active');
    btn.addEventListener('click', function() {
      selectCalendarDate(dateStr);
    });
    grid.appendChild(btn);
  }
  
  updateCalendarLeftTowerBox(selectedCalendarDate);
}

function initCalendar() {
  calendarMonths = buildCalendarMonths();
  calendarMonthIndex = 0;
  selectedCalendarDate = null;
  calendarViewMode = 'month';
  
  const prevBtn = document.getElementById('calendarPrev');
  const nextBtn = document.getElementById('calendarNext');
  const viewToggle = document.getElementById('calendarViewToggle');
  
  if (prevBtn) {
    prevBtn.addEventListener('click', function() {
      calendarMonthIndex = Math.max(0, calendarMonthIndex - 1);
      renderCalendarMonth();
    });
  }
  
  if (nextBtn) {
    nextBtn.addEventListener('click', function() {
      calendarMonthIndex = Math.min(calendarMonths.length - 1, calendarMonthIndex + 1);
      renderCalendarMonth();
    });
  }

  if (viewToggle) {

}

function isPhoneLayoutMode() {

  const h = window.innerHeight || 0;
  const minSide = Math.min(w, h);
  const maxSide = Math.max(window.innerWidth || 0, window.innerHeight || 0);
  return minSide > 0 && minSide <= 600 && maxSide <= 960;
}

function getDefaultPanOffsets() {

function ensurePanelPlaceholder(placeholderId, panel) {
  if (!panel) return null;
  let placeholder = document.getElementById(placeholderId);
  if (!placeholder) {
    placeholder = document.createElement('div');
    placeholder.id = placeholderId;
    placeholder.style.display = 'none';
  }
  if (panel.parentElement && placeholder.parentElement !== panel.parentElement) {
    panel.parentElement.insertBefore(placeholder, panel);
  }
  return placeholder;
}

function restorePanelFromPlaceholder(placeholderId, panel) {
  const placeholder = document.getElementById(placeholderId);
  if (!panel || !placeholder || !placeholder.parentElement) return;
  placeholder.parentElement.insertBefore(panel, placeholder);
  placeholder.remove();
}

function getMobileConnectionPanelFixedHeight() {
  const groups = [];
  (linkedSpaces || []).forEach(group => groups.push(group));
  (mcbtc2030Links || []).forEach(group => {
    if (Array.isArray(group && group.left) && group.left.length > 0) groups.push(group);
  });
  let maxItems = 0;
  let maxSections = 0;
  groups.forEach((group) => {
    const left = Array.isArray(group && group.left) ? group.left : [];
    const right = Array.isArray(group && group.right) ? group.right : [];
    const leftSections = new Set(left.map((space) => {
      const idx = Number(space && space.building);
      return Number.isFinite(idx) && leftBuildingsData[idx] ? leftBuildingsData[idx].name : '';
    }).filter(Boolean));
    const rightSections = new Set(right.map((space) => String(space && space.wing || '') === 'mcbtc2030' ? 'MCBTC2030' : 'IPEB'));
    maxItems = Math.max(maxItems, left.length + right.length);
    maxSections = Math.max(maxSections, leftSections.size + rightSections.size);
  });
  const baseHeight = 44;
  const sectionHeight = 22;
  const itemHeight = 26;
  const raw = baseHeight + (maxSections * sectionHeight) + (maxItems * itemHeight);
  const viewportCap = Math.round((window.innerHeight || 640) * 0.42);
  return Math.max(150, Math.min(raw || 220, viewportCap || 260));
}

function dismissDeptFilterKeyboard(input) {
  if (!input) return;
  const blurActiveElement = () => {
    const activeEl = document.activeElement;
    if (activeEl && typeof activeEl.blur === 'function') {
      try {
        activeEl.blur();
      } catch (e) {}
    }
    try {
      input.blur();
    } catch (e) {}
  };
  blurActiveElement();
  // Keep the field temporarily readonly so the mobile viewport can settle without reopening the keyboard.
  input.setAttribute('readonly', 'readonly');
  setTimeout(() => {
    blurActiveElement();
    input.removeAttribute('readonly');
  }, 160);
}

function focusDeptFilterFromUserGesture() {
  if (!isPhoneLayoutMode()) return;
  const input = document.getElementById('deptFilter');
  if (!input) return;
  const focusInput = () => {
    try {
      input.focus({ preventScroll: true });
    } catch (e) {
      input.focus();
    }
    positionMobileDeptSearchResults();
  };
  if (typeof requestAnimationFrame === 'function') {
    requestAnimationFrame(focusInput);
  } else {
    setTimeout(focusInput, 0);
  }
}

function stabilizePhoneLayoutVisibility() {
  const mainView = document.querySelector('.main-view');
  const isPhoneLayout = !!(mainView && mainView.classList.contains('phone-layout'));
  const tabs = document.getElementById('mobileTopTabs');
  const mobileSelectors = document.getElementById('mobileBuildingSelectors');
